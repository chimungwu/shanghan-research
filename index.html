const DATA=[{"n":"桂枝湯","c":"太陽病","tw":14.6,"fp":{"辛":41.1,"甘":58.9,"苦":20.5},"pf":"甘","fr":["甘","辛","苦"],"ns":0.62,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":41.1,"平":38.4},"hd":[{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":""},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"太陽病上","t":"太陽中風，陽浮而陰弱，陽浮者，熱自發，陰弱者，汗自出。嗇嗇惡寒，淅淅惡風，翕翕發熱，鼻鳴乾嘔者，桂枝湯主之。"},{"s":"太陽病上","t":"太陽病，頭痛，發熱，汗出，惡風，桂枝湯主之。"},{"s":"太陽病上","t":"太陽病，下之後，其氣上衝者，可與桂枝湯，方用前法；若不上衝者，不得與之。"},{"s":"太陽病上","t":"若酒客病，不可與桂枝湯，得之則嘔，以酒客不喜甘故也。"},{"s":"太陽病上","t":"喘家作，桂枝湯加厚朴、杏子佳。"},{"s":"太陽病上","t":"凡服桂枝湯吐者，其後必吐膿血也。"},{"s":"太陽病上","t":"太陽病，初服桂枝湯，反煩不解者，先刺風池、風府，卻與桂枝湯則愈。"},{"s":"太陽病上","t":"服桂枝湯，大汗出，脈洪大者，與桂枝湯，如前法。若形似瘧，一日再發者，汗出必解，宜桂枝二麻黃一湯。"},{"s":"太陽病上","t":"服桂枝湯，大汗出後，大煩渴不解，脈洪大者，白虎加人參湯主之。"},{"s":"太陽病上","t":"服桂枝湯，或下之，仍頭項強痛，翕翕發熱，無汗，心下滿微痛，小便不利者，桂枝去桂加茯苓白朮湯主之。"},{"s":"太陽病中","t":"太陽病，外證未解，脈浮弱者，當以汗解，宜桂枝湯。"},{"s":"太陽病中","t":"太陽病，外證未解，不可下也，下之為逆。欲解外者，宜桂枝湯。"},{"s":"太陽病中","t":"太陽病，先發汗不解，而復下之，脈浮者不愈。浮為在外，而反下之，故令不愈。今脈浮，故在外，當須解外則愈，宜桂枝湯。"},{"s":"太陽病中","t":"病常自汗出者，此為榮氣和，榮氣和者，外不諧，以衛氣不共榮氣諧和故爾。以榮行脈中，衛行脈外，復發其汗，榮衛和則愈，宜桂枝湯。"},{"s":"太陽病中","t":"病人藏無他病，時發熱、自汗出而不愈者，此衛氣不和也。先其時發汗則愈，宜桂枝湯。"},{"s":"太陽病中","t":"傷寒不大便六七日，頭痛有熱者，與承氣湯；其小便清者，知不在裏，仍在表也，當須發汗，若頭痛者，必衄，宜桂枝湯。"},{"s":"太陽病中","t":"傷寒發汗已解，半日許復煩，脈浮數者，可更發汗，宜桂枝湯。"},{"s":"太陽病中","t":"發汗後，不可更行桂枝湯，汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。"},{"s":"太陽病中","t":"傷寒，醫下之，續得下利清穀不止，身疼痛者，急當救裏；後身疼痛，清便自調者，急當救表。救裏宜四逆湯，救表宜桂枝湯。"},{"s":"太陽病中","t":"太陽病，發熱汗出者，此為榮弱衛強，故使汗出。欲救邪風者，宜桂枝湯。"},{"s":"太陽病下","t":"傷寒六七日，發熱，微惡寒，支節煩疼，微嘔，心下支結，外證未去者，柴胡桂枝湯主之。"},{"s":"太陽病下","t":"下後，不可更行桂枝湯，若汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。"},{"s":"太陽病下","t":"傷寒大下後，復發汗，心下痞，惡寒者，表未解也。不可攻痞，當先解表，表解乃可攻痞。解表宜桂枝湯，攻痞宜大黃黃連瀉心湯。"},{"s":"陽明病","t":"陽明病，脈遲，汗出多，微惡寒者，表未解也，可發汗，宜桂枝湯。"},{"s":"陽明病","t":"病人煩熱，汗出則解，又如瘧狀，日晡所發熱者，屬陽明也。脈實者，宜下之；脈浮虛者，宜發汗。下之，與大承氣湯；發汗，宜桂枝湯。"},{"s":"太陰病","t":"太陰病，脈浮者，可發汗，宜桂枝湯。"},{"s":"厥陰病","t":"下利腹脹滿，身體疼痛者，先溫其裏，乃攻其表。溫裏宜四逆湯，攻表宜桂枝湯。"},{"s":"霍亂病","t":"吐利止而身痛不休者，當消息和解其外，宜桂枝湯小和之。"},{"s":"可發汗","t":"下利後，身疼痛，清便自調者，急當救表，宜桂枝湯發汗。"},{"s":"發汗後","t":"發汗多亡陽，譫語者，不可下，與柴胡桂枝湯。和其榮衛，以通津液，後自愈。"},{"s":"汗吐下後","t":"於桂枝湯方內，加厚朴二兩，杏仁五十個，去皮尖，餘依前法。"},{"s":"汗吐下後","t":"於桂枝湯方內，去芍藥，餘依前法。"},{"s":"汗吐下後","t":"於桂枝湯方內，去桂枝，加茯苓、白朮各三兩，餘依前法煎服。小便利則愈。"},{"s":"汗吐下後","t":"於第二卷桂枝湯方內，更加芍藥、生薑各一兩，人參三兩，餘依桂枝湯法服。"},{"s":"汗吐下後","t":"於第二卷桂枝湯方內，更加桂二兩，共五兩，餘依前法。"},{"s":"汗吐下後","t":"於第二卷桂枝湯方內，更加芍藥三兩，隨前共六兩，餘依桂枝湯法。"}],"hl":"桂枝（三兩，去皮）　芍藥（三兩）　甘草（二兩，炙）　生薑（三兩，切）　大棗（十二枚，擘）","cm":"右五味，㕮咀三味，以水七升，微火煮取三升，去滓，適寒溫，服一升。服已須臾，歠熱稀粥一升餘，以助藥力。溫覆令一時許，遍身漐漐微似有汗者益佳，不可令如水流漓，病必不除。若一服汗出病差，停後服，不必盡劑。若不汗，更服依前法。又不汗，後服小促其間，半日許令三服盡。若病重者，一日一夜服，周時觀之，服一劑盡，病證猶在者，更作服，若不汗出，乃服至二、三劑。禁生冷、黏滑、肉麵、五辛、酒酪、臭惡等物。"},{"n":"桂枝加葛根湯","c":"太陽病","tw":19.6,"fp":{"甘":59.2,"辛":25.5,"苦":25.5},"pf":"甘","fr":["甘","辛","苦"],"ns":0.66,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":40.8,"平":49.0},"hd":[{"n":"葛根","w":4,"f":["甘"],"t":"平","bt":"葛根　味甘平。主治消渴，身大熱，嘔吐，諸痺，起陰氣，解諸毒。葛谷，主下利十歲以上。一名雞齊根。生川谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":""},{"n":"芍藥","w":2,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"麻黃","w":3,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"}],"cl":[{"s":"太陽病上","t":"太陽病，項背強𠘧𠘧，反汗出惡風者，桂枝加葛根湯主之。"}],"hl":"葛根（四兩）　桂枝（二兩，去皮）　芍藥（二兩）　生薑（三兩，切）　甘草（二兩，炙）　大棗（十二枚，擘）　麻黃（三兩，去節）","cm":"右七味，以水一斗，先煮麻黃、葛根，減二升，去上沫，內諸藥，煮取三升，去滓。溫服一升。覆取微似汗，不須啜粥，餘如桂枝法將息及禁忌。"},{"n":"桂枝加附子湯","c":"太陽病","tw":15.9,"fp":{"辛":39.6,"甘":60.4,"苦":18.9},"pf":"甘","fr":["甘","辛","苦"],"ns":0.6,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":39.6,"平":41.5},"hd":[{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":""},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便， ：證象陽旦，按法治之而增劇，厥逆，咽中乾，兩脛拘急而譫語。師曰：言夜半手足當溫，兩腳當伸。後如師言。何以知此？答曰：寸口脈浮而大，浮為風，大為虛，風則生微熱，虛則兩脛攣，病形象桂枝，因加附子參其間，增桂令汗出，附子溫經，亡陽故也。厥逆，咽中乾，煩躁，陽明內結，譫語煩亂，更飲甘草乾薑湯，夜半陽氣還，兩足當熱，脛尚微拘急，重與芍藥甘草湯，爾乃脛伸。以承氣湯微溏，則止其譫語，故知病可愈。"}],"hl":"芍藥　甘草（炙，各四兩）","cm":"右二味，以水三升，煮取一升五合，去滓，分溫再服。"},{"n":"調胃承氣湯","c":"太陽病","tw":8.5,"fp":{"甘":23.5,"苦":76.5},"pf":"苦","fr":["苦","甘"],"ns":-1.53,"nt":"大寒","ng":{"寒涼":76.5,"溫熱":0.0,"平":23.5},"hd":[{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"芒硝","w":2.5,"f":["苦"],"t":"寒","bt":"消石　味苦寒。主治五臟積熱，胃脹閉。滌去畜結飲食，推陳致新，除邪氣。煉之如膏，久服輕身。一名芒硝。生山谷。"},{"n":"大黃","w":4,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"}],"cl":[{"s":"太陽病上","t":"傷寒，脈浮，自汗出，小便數，心煩，微惡寒，腳攣急，反與桂枝欲攻其表，此誤也。得之便厥，咽中乾，煩躁吐逆者，作甘草乾薑湯與之，以復其陽。若厥愈足溫者，更作芍藥甘草湯與之，其腳即伸。若胃氣不和，譫語者，少與調胃承氣湯。若重發汗，復加燒針者，四逆湯主之。"},{"s":"太陽病中","t":"發汗後惡寒者，虛故也。不惡寒但熱者，實也。當和胃氣，與調胃承氣湯。"},{"s":"太陽病中","t":"太陽病未解，脈陰陽俱停，必先振慄汗出而解。但陽脈微者，先汗出而解；但陰脈微者，下之而解。若欲下之，宜調胃承氣湯。"},{"s":"太陽病中","t":"傷寒十三日，過經，譫語者，以有熱也，當以湯下之。若小便利者，大便當鞕，而反下利，脈調和者，知醫以丸藥下之，非其治也。若自下利者，脈當微厥，今反和者，此為內實也，調胃承氣湯主之。"},{"s":"太陽病中","t":"太陽病，過經十餘日，心下溫溫欲吐，而胸中痛，大便反溏，腹微滿，鬱鬱微煩，先此時自極吐下者，與調胃承氣湯。若不爾者，不可與。但欲嘔，胸中痛，微溏者，此非柴胡湯證，以嘔，故知極吐下也。調胃承氣湯。"},{"s":"陽明病","t":"陽明病，不吐不下，心煩者，可與調胃承氣湯。"},{"s":"陽明病","t":"太陽病三日，發汗不解，蒸蒸發熱者，屬胃也，調胃承氣湯主之。"},{"s":"陽明病","t":"傷寒吐後，腹脹滿者，與調胃承氣湯。"}],"hl":"甘草（二兩，炙）　芒硝（半升）　大黃（四兩，清酒洗）","cm":"右三味，以水三升，煮取一升，去滓，內芒硝，更上火微煮令沸，少少溫服之。"},{"n":"四逆湯","c":"太陽病","tw":3.8,"fp":{"甘":52.6,"辛":47.4},"pf":"甘","fr":["甘","辛"],"ns":0.95,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":47.4,"平":52.6},"hd":[{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"乾薑","w":1.5,"f":["辛"],"t":"溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。久服去臭氣，通神明。生川谷。"},{"n":"附子","w":0.3,"f":["辛"],"t":"溫","bt":"附子　味辛溫有毒。主治風寒咳逆邪氣，溫中，金創，破癥堅積聚，血瘕寒濕，踒躄拘攣，膝痛不能行走。生山谷。"}],"cl":[{"s":"太陽病上","t":"傷寒，脈浮，自汗出，小便數，心煩，微惡寒，腳攣急，反與桂枝欲攻其表，此誤也。得之便厥，咽中乾，煩躁吐逆者，作甘草乾薑湯與之，以復其陽。若厥愈足溫者，更作芍藥甘草湯與之，其腳即伸。若胃氣不和，譫語者，少與調胃承氣湯。若重發汗，復加燒針者，四逆湯主之。"},{"s":"太陽病中","t":"發汗，若下之，病仍不解，煩躁者，茯苓四逆湯主之。"},{"s":"太陽病中","t":"傷寒，醫下之，續得下利清穀不止，身疼痛者，急當救裏；後身疼痛，清便自調者，急當救表。救裏宜四逆湯，救表宜桂枝湯。"},{"s":"太陽病中","t":"病發熱，頭痛，脈反沈，若不差，身體疼痛，當救其裏，宜四逆湯。"},{"s":"陽明病","t":"脈浮而遲，表熱裏寒，下利清穀者，四逆湯主之。"},{"s":"少陰病","t":"少陰病，下利清穀，裏寒外熱，手足厥逆，脈微欲絕，身反不惡寒。其人面色赤，或腹痛，或乾嘔，或咽痛，或利止脈不出者，通脈四逆湯主之。"},{"s":"少陰病","t":"少陰病，脈沈者，急溫之，宜四逆湯。"},{"s":"少陰病","t":"少陰病，飲食入口則吐，心中溫溫欲吐，復不能吐，始得之，手足寒，脈弦遲者，此胸中實，不可下也，當吐之。若膈上有寒飲，乾嘔者，不可吐也，當溫之，宜四逆湯。"},{"s":"厥陰病","t":"手足厥寒，脈細欲絕者，當歸四逆湯主之。"},{"s":"厥陰病","t":"大汗出，熱不去，內拘急，四肢疼，又下利厥逆而惡寒者，四逆湯主之。"},{"s":"厥陰病","t":"大汗，若大下利而厥冷者，四逆湯主之。"},{"s":"厥陰病","t":"下利清穀，裏寒外熱，汗出而厥者，通脈四逆湯主之。"},{"s":"厥陰病","t":"下利腹脹滿，身體疼痛者，先溫其裏，乃攻其表。溫裏宜四逆湯，攻表宜桂枝湯。"},{"s":"厥陰病","t":"嘔而脈弱，小便復利，身有微熱，見厥者難治，四逆湯主之。"},{"s":"霍亂病","t":"吐利，汗出，發熱，惡寒，四肢拘急，手足厥冷者，四逆湯主之。"},{"s":"霍亂病","t":"既吐且利，小便復利而大汗出，下利清穀，內寒外熱，脈微欲絕者，四逆湯主之。"},{"s":"不可下","t":"下利脈大者，虛也，以其強下之故也。設脈浮革，因爾腸鳴者，屬當歸四逆湯主之。"},{"s":"汗吐下後","t":"於四逆湯方內，加人參一兩，餘依四逆湯法服。"},{"s":"汗吐下後","t":"於四逆湯方內，加入豬膽汁半合，餘依前法服；如無豬膽，以羊膽代之。"}],"hl":"甘草（二兩，炙）　乾薑（一兩半）　附子（一枚，生用，去皮，破八片）","cm":"右三味，以水三升，煮取一升二合，去滓，分溫再服。強人可大附子一枚、乾薑三兩。"},{"n":"葛根湯","c":"太陽病","tw":19.6,"fp":{"甘":59.2,"苦":25.5,"辛":25.5},"pf":"甘","fr":["甘","苦","辛"],"ns":0.66,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":40.8,"平":49.0},"hd":[{"n":"葛根","w":4,"f":["甘"],"t":"平","bt":"葛根　味甘平。主治消渴，身大熱，嘔吐，諸痺，起陰氣，解諸毒。葛谷，主下利十歲以上。一名雞齊根。生川谷。"},{"n":"麻黃","w":3,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":""},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"芍藥","w":2,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"太陽病上","t":"太陽病，項背強𠘧𠘧，反汗出惡風者，桂枝加葛根湯主之。"},{"s":"太陽病中","t":"太陽病，項背強𠘧𠘧，無汗惡風，葛根湯主之。"},{"s":"太陽病中","t":"太陽與陽明合病者，必自下利，葛根湯主之。"}],"hl":"葛根（四兩）　麻黃（三兩，去節）　桂枝（二兩，去皮）　生薑（三兩，切）　甘草（二兩，炙）　芍藥（二兩）　大棗（十二枚，擘）","cm":"右七味，以水一斗，先煮麻黃、葛根，減二升，去白沫，內諸藥，煮取三升，去滓，溫服一升。覆取微似汗。餘如桂枝法將息及 },{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"杏仁","w":1.4,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世本草多以杏仁味苦，苦能降氣，故杏仁能止咳平喘下氣。《名醫別錄》載杏仁「味苦，溫，有毒」。臨床上杏仁多歸於苦味，與本草經記載有異，研究者宜留意此差異。"}],"cl":[{"s":"太陽病中","t":"太陽病，頭痛，發熱，身疼，腰痛，骨節疼痛，惡風，無汗而喘者，麻黃湯主之。"},{"s":"太陽病中","t":"太陽與陽明合病，喘而胸滿者，不可下，宜麻黃湯。"},{"s":"太陽病中","t":"太陽病，十日已去，脈浮細而嗜臥者，外已解也。設胸滿脇痛者，與小柴胡湯；脈但浮者，與麻黃湯。"},{"s":"太陽病中","t":"太陽病，脈浮緊，無汗，發熱，身疼痛，八九日不解，表證仍在，此當發其汗。服藥已微除，其人發煩目瞑，劇者必衄，衄乃解。所以然者，陽氣重故也，麻黃湯主之。"},{"s":"太陽病中","t":"脈浮者，病在表，可發汗，宜麻黃湯。"},{"s":"太陽病中","t":"脈浮而數者，可發汗，宜麻黃湯。"},{"s":"太陽病中","t":"傷寒脈浮緊，不發汗，因致衄者，麻黃湯主之。"},{"s":"陽明病","t":"脈但浮，無餘證者，與麻黃湯。若不尿，腹滿加噦者，不治。"},{"s":"陽明病","t":"陽明病，脈浮，無汗而喘者，發汗則愈，宜麻黃湯。"}],"hl":"麻黃（三兩，去節）　桂枝（二兩，去皮）　甘草（一兩，炙）　杏仁（七十個，去皮尖）","cm":"右四味，以水九升，先煮麻黃，減二升，去上沫，內諸藥，煮取二升半，去滓，溫服八合。覆取微似汗，不須啜粥。餘如桂枝法將息。"},{"n":"大青龍湯","c":"太陽病","tw":31.0,"fp":{"苦":19.4,"辛":25.8,"甘":61.3},"pf":"甘","fr":["甘","辛","苦"],"ns":1.29,"nt":"偏溫","ng":{"寒涼":9.7,"溫熱":74.2,"平":16.1},"hd":[{"n":"麻黃","w":6,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"杏仁","w":12.0,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世本草多以杏仁味苦，苦能降氣，故杏仁能止咳平喘下氣。《名醫別錄》載杏仁「味苦，溫，有毒」。臨床上杏仁多歸於苦味，與本草經記載有異，研究者宜留意此差異。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"大棗","w":3.0,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"石膏","w":3,"f":["辛"],"t":"微寒","bt":"石膏　味辛微寒。主治中風寒熱，心下逆氣驚喘，口乾舌焦不得息，腹中堅痛，除邪鬼，產乳，金創。生山谷。"}],"cl":[{"s":"太陽病中","t":"太陽中風，脈浮緊，發熱惡寒，身疼痛，不汗出而煩躁者，大青龍湯主之。若脈微弱，汗出惡風者，不可服之，服之則厥逆，筋惕肉瞤，此為逆也。"},{"s":"太陽病中","t":"傷寒脈浮緩，身不疼，但重，乍有輕時，無少陰證者，大青龍湯發之。"}],"hl":"麻黃（六兩，去節）　桂枝（二兩，去皮）　甘草（二兩，炙）　杏仁（四十枚，去皮尖）　生薑（三兩，切）　大棗（十枚，擘）　石膏（如雞子大，碎）","cm":"右七味，以水九升，先煮麻黃，減二升，去上沫，內諸藥，煮取三升，去滓，溫服一升，取微似汗。汗出多者，溫粉撲之。一服汗者，停後服。若復服，汗多亡陽，遂虛，惡風、煩躁、不得眠也。"},{"n .75,"f":["甘"],"t":"平","bt":"豬苓　味甘平。主治痎瘧，解毒，蠱毒、蠱注，不祥，利水道。久服輕身耐老。一名叚（犬旁）豬矢。生山谷。"},{"n":"澤瀉","w":1,"f":["甘"],"t":"寒","bt":"澤瀉　味甘寒。主治風寒濕痺，乳難，消水，養五臟，益氣力，肥健。久服耳目聰明，不饑，延年輕身，面生光，能行水上。一名水瀉，一名芒芋，一名鵠瀉。生池澤。"},{"n":"白朮","w":0.75,"f":["苦"],"t":"溫","bt":"术 　味苦溫。主治濕痺、死肌、痙疸，止汗除熱，消食，化煎餌。久服輕身、延年不饑。一名山薊。生鄭山山谷。"},{"n":"茯苓","w":0.75,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"桂枝","w":1.0,"f":["辛","甘"],"t":"溫","bt":""}],"cl":[{"s":"太陽病中","t":"太陽病，發汗後，大汗出，胃中乾，煩躁不得眠，欲得飲水者，少少與飲之，令胃氣和則愈。若脈浮，小便不利，微熱消渴者，五苓散主之。"},{"s":"太陽病中","t":"發汗已，脈浮數，煩渴者，五苓散主之。"},{"s":"太陽病中","t":"傷寒汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"s":"太陽病中","t":"中風發熱，六七日不解而煩，有表裏證，渴欲飲水，水入則吐者，名曰水逆，五苓散主之。"},{"s":"太陽病下","t":"病在陽，應以汗解之，反以冷水潠之，若灌之，其熱被劫，不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散。寒實結胸，無熱證者，與三物小陷胸湯。（用前第六方）"},{"s":"太陽病下","t":"本以下之，故心下痞，與瀉心湯，痞不解，其人渴而口燥，煩，小便不利者，五苓散主之。"},{"s":"陽明病","t":"太陽病，寸緩、關浮、尺弱，其人發熱汗出，復惡寒，不嘔，但心下痞者，此以醫下之也。如其不下者，病人不惡寒而渴者，此轉屬陽明也，小便數者，大便必鞕，不更衣十日，無所苦也。渴欲飲水，少少與之，但以法救之，渴者，宜五苓散。"},{"s":"霍亂病","t":"霍亂，頭痛，發熱，身疼痛，熱多欲飲水者，五苓散主之。寒多不用水者，理中丸主之。"}],"hl":"豬苓（十八銖，去皮）　澤瀉（一兩六銖）　白朮（十八銖）　茯苓（十八銖）　桂枝（半兩，去皮）","cm":"右五味，搗為散，以白飲和服方寸匕，日三服。多飲暖水，汗出愈。如法將息。"},{"n":"茯苓甘草湯","c":"太陽病","tw":8,"fp":{"甘":62.5,"辛":62.5},"pf":"甘","fr":["甘","辛"],"ns":0.88,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":62.5,"平":37.5},"hd":[{"n":"茯苓","w":2,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":""},{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""}],"cl":[{"s":"太陽病中","t":"傷寒汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"s":"厥陰病","t":"傷寒，厥而心下悸，宜先治水，當服茯苓甘草湯，卻治其厥。不爾，水漬入胃，必作利也。"}],"hl":"茯苓（二兩）　桂枝（二兩，去皮）　甘草（一兩，炙）　生薑（三兩，切）","cm":"右四味，以水四升，煮取二升，去滓，分溫三服。"},{"n":"梔子豉湯","c":"太陽病","tw":3.4,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-2.0,"nt":"大寒","ng":{"寒涼":100.0,"溫熱":0.0,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒","bt":""}],"cl":[{"s":"太陽病中","t":"發汗後，水藥不得入口，為逆；若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"},{"s":"太陽病中","t":"發汗，若下之，而煩熱，胸中窒者，梔子豉湯主之。"},{"s":"太陽病中","t":"傷寒五六日，大下之後，身熱不去，心中結痛者，未欲解也，梔子豉湯主之。"},{"s":"陽明病","t":"陽明病，脈浮而緊，咽燥，口苦，腹滿而喘，發熱汗出，不惡寒，反惡熱，身重。若發汗則躁，心憒憒，反譫語，若加溫針，必怵惕，煩躁不得眠。若下之，則胃中空虛，客氣動膈，心中懊憹，舌上胎者，梔子豉湯主之。"},{"s":"陽明病","t":"陽明病，下之，其外有熱，手足溫，不結胸，心中懊憹，飢不能食，但頭汗出者，梔子豉湯主之。"},{"s":"厥陰病","t":"下利後，更煩，按之心下濡者，為虛煩也，宜梔子豉湯。"},{"s":"差後病","t":"大病差後，勞復者，枳實梔子豉湯主之。"},{"s":"汗吐下後","t":"於梔子豉湯方內，加入甘草二兩，餘依前法。得吐，止後服。"},{"s":"汗吐下後","t":"於梔子豉湯方內，加生薑五兩，餘依前法。得吐，止後服。"}],"hl":"梔子（十四個，擘）　香豉（四合，綿裹）","cm":"右二味，以水四升，先煮梔子得二升半，內豉，煮取一升半，去滓，分為二服，溫進一服。得吐者，止後服。"},{"n":"梔子甘草豉湯","c":"太陽病","tw":5.4,"fp":{"苦":63.0,"甘":37.0},"pf":"苦","fr":["苦","甘"],"ns":-1.26,"nt":"偏寒","ng":{"寒涼":63.0,"溫熱":0.0,"平":37.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒","bt":""}],"cl":[{"s":"太陽病中","t":"發汗後，水藥不得入口，為逆；若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"}],"hl":"梔子（十四個，擘）　甘草（二兩，炙）　香豉（四合，綿裹）","cm":"右三味，以水四升，先煮梔子、甘草取二升半，內豉，煮取一升半，去滓，分二服，溫進一服。得吐者，止後服。"},{"n":"梔子生薑豉湯","c":"太陽病","tw":8.4,"fp":{"苦":40.5,"辛":59.5},"pf":"辛","fr":["辛","苦"],"ns":-0.21,"nt":"平性","ng":{"寒涼":40.5,"溫熱":59.5,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"生薑","w":5,"f":["辛"],"t":"微溫","bt":""},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒","bt":""}],"cl":[{"s":"太陽病中","t":"發汗後，水藥不得入口，為逆；若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"}],"hl":"梔子（十四個，擘）　生薑（五兩，切）　香豉（四合，綿裹）","cm":"右三味，以水四升，先煮梔子、生薑取二升半，內豉，煮取一升半，去滓，分二服，溫進一服。得吐者，止後服。"},{"n":"梔子厚朴湯","c":"太陽病","tw":6.6,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":0.42,"nt":"平性","ng":{"寒涼":39.4,"溫熱":60.6,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"厚朴","w":4,"f":["苦"],"t":"溫","bt":"厚樸　味苦溫無毒。主治中風、傷寒、頭痛，寒熱驚氣，血痺死肌，去三蟲。生山谷。"},{"n":"枳實","w":1.2,"f":["苦"],"t":"寒","bt":"枳實　味苦寒。主治大風在皮膚中如麻豆苦癢，除寒熱熱結，止利。長肌肉，利五臟，益氣輕身。生川澤。"}],"cl":[{"s":"太陽病中","t":"傷寒下後，心煩腹滿，臥起不安者，梔子厚朴湯主之。"}],"hl":"梔子（十四個，擘）　厚朴（四兩，炙，去皮）　枳實（四枚，水浸，炙令黃）","cm":"右三味，以水三升半，煮取一升半，去滓，分二服，溫進一服。得吐者，止後服。"},{"n":"梔子乾薑湯","c":"太陽病","tw":3.4,"fp":{"苦":41.2,"辛":58.8},"pf":"辛","fr":["辛","苦"],"ns":0.35,"nt":"平性","ng":{"寒涼":41.2,"溫熱":58.8,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"乾薑","w":2,"f":["辛"],"t":"溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。久服去臭氣，通神明。生川谷。"}],"cl":[{"s":"太陽病中","t":"傷寒，醫以丸藥大下之，身熱不去，微煩者，梔子乾薑湯主之。"}],"hl":"梔子（十四個，擘）　乾薑（二兩）","cm":"右二味，以水三升半，煮取一升半，去滓，分二服，溫進一服。得吐者，止後服。"},{"n":"真武湯","c":"太陽病","tw":11.3,"fp":{"甘":26.5,"苦":44.2,"辛":29.2},"pf":"苦","fr":["苦","辛","甘"],"ns":0.67,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":46.9,"平":26.5},"hd":[{"n":"茯苓","w":3,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"白朮","w":2,"f":["苦"],"t":"溫","bt":"术 　味苦溫。主治濕痺、死肌、痙疸，止汗除熱，消食，化煎餌。久服輕身、延年不饑。一名山薊。生鄭山山谷。"},{"n":"附子","w":0.3,"f":["辛"],"t":"溫","bt":"附子　味辛溫有毒。主治風寒咳逆邪氣，溫中，金創，破癥堅積聚，血瘕寒濕，踒躄拘攣，膝痛不能行走。生山谷。"}],"cl":[{"s":"太陽病中","t":"太陽病發汗，汗出不解，其人仍發熱，心下悸，頭眩，身瞤動，振振欲擗地者，真武湯主之。"},{"s":"少陰病","t":"少陰病，二三日不已，至四五日，腹痛，小便不利，四肢沈重疼痛，自下利者，此為有水氣。其人或欬，或小便利，或下利，或嘔者，真武湯主之。"},{"s":"少陰病","t":"真武湯方（附加減法）"}],"hl":"茯苓　芍藥　生薑（切，各三兩）　白朮（二兩）　附子（一枚，炮，去皮，破八片）","cm":"右五味，以水八升，煮取三升，去滓，溫服七合，日三服。"},{"n":"小柴胡湯","c":"太陽病","tw":26.1,"fp":{"苦":42.1,"甘":36.8,"辛":21.1},"pf":"苦","fr":["苦","甘","辛"],"ns":0.0,"nt":"平性","ng":{"寒涼":11.5,"溫熱":11.5,"平":77.0},"hd":[{"n":"柴胡","w":8,"f":["苦"],"t":"平","bt":"茨胡　味苦平。主治心腹腸胃中結氣、飲食積聚、寒熱邪氣，推陳致新，久服輕身、明目、益精。一名地薰。生川谷。"},{"n":"黃芩","w":3,"f":["苦"],"t":"平","bt":"黃芩　味苦平。主治諸熱黃疸，腸澼洩利，逐水，下血閉，惡瘡疽蝕，火瘍。一名腐腸。生川谷。"},{"n":"人參","w":3,"f":["甘"],"t":"小寒","bt":"人參　味甘小寒。主補五臟，安精神，定魂魄，止驚悸，除邪氣，明目，開心益智。一名人銜，一名鬼蓋。生山谷。"},{"n":"半夏","w":2.5,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"},{"n":"甘草","w":3,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"太陽病中","t":"太陽病，十日已去，脈浮細而嗜臥者，外已解也。設胸滿脇痛者，與小柴胡湯；脈但浮者，與麻黃湯。"},{"s":"太陽病中","t":"傷寒五六日，中風，往來寒熱，胸脇苦滿，嘿嘿不欲飲食，心煩喜嘔。或胸中煩而不嘔，或渴，或腹中痛，或脇下痞鞕，或心下悸、小便不利，或不渴、身有微熱，或欬者，小柴胡湯主之。"},{"s":"太陽病中","t":"血弱氣盡，腠理開，邪氣因入，與正氣相摶，結於脇下，正邪分爭，往來寒熱，休作有時，嘿嘿不欲飲食，藏府相連，其痛必下，邪高痛下，故使嘔也，小柴胡湯主之。服柴胡湯已，渴者屬陽明，以法治之。"},{"s":"太陽病中","t":"傷寒四五日，身熱，惡風，頸項強，脇下滿，手足溫而渴者，小柴胡湯主之。"},{"s":"太陽病中","t":"傷寒，陽脈濇，陰脈弦，法當腹中急痛，先與小建中湯，不差者，與小柴胡湯主之。"},{"s":"太陽病中","t":"太陽病，過經十餘日，反二三下之。後四五日，柴胡證仍在者，先與小柴胡湯；嘔不止，心下急，鬱鬱微煩者，為未解也，與大柴胡湯下之則愈。"},{"s":"太陽病中","t":"傷寒十三日不解，胸脇滿而嘔，日晡所發潮熱，已而微利。此本柴胡證，下之以不得利，今反利者，知醫以丸藥下之，此非其治也。潮熱者，實也。先宜服小柴胡湯以解外，後以柴胡加芒硝湯主之。"},{"s":"太陽病下","t":"婦人中風，七八日續得寒熱，發作有時，經水適斷者，此為熱入血室，其血必結，故使如瘧狀，發作有時，小柴胡湯主之。"},{"s":"太陽病下","t":"傷寒五六日，頭汗出，微惡寒，手足冷，心下滿，口不欲食，大便鞕，脈細者，此為陽微結，必有表，復有裏也。脈沈，亦在裏也。汗出，為陽微。假令純陰結，不得復有外證，悉入在裏，此為半在裏半在外也。脈雖沈緊，不得為少陰病。所以然者，陰不得有汗，今頭汗出，故知非少陰也。可與小柴胡湯，設不了了者，得屎而解。"},{"s":"陽明病","t":"陽明病，發潮熱，大便溏，小便自可，胸脇滿不去者，與小柴胡湯。"},{"s":"陽明病","t":"陽明病，脇下鞕滿，不大便，而嘔，舌上白胎者，可與小柴胡湯。上焦得通，津液得下，胃氣因和，身濈然汗出而解。"},{"s":"陽明病","t":"陽明中風，脈弦浮大而短氣，腹都滿，脇下及心痛，久按之氣不通，鼻乾，不得汗，嗜臥，一身及目悉黃，小便難，有潮熱，時時噦，耳前後腫。刺之小差，外不解，病過十日，脈續浮者，與小柴胡湯。"},{"s":"少陽病","t":"本太陽病不解，轉入少陽者，脇下鞕滿，乾嘔不能食，往來寒熱，尚未吐下，脈沈緊者，與小柴胡湯。"},{"s":"厥陰病","t":"嘔而發熱者，小柴胡湯主之。"},{"s":"差後病","t":"傷寒差以後，更發熱，小柴胡湯主之。脈浮者，以汗解之；脈沈實者，以下解之。"},{"s":"汗吐下後","t":"於小柴胡湯方內，加芒硝六兩，餘依前法。服不解，更服。"}],"hl":"柴胡（半斤）　黃芩（三兩）　人參（三兩）　半夏（半升，洗）　甘草（炙）　生薑（切，各三兩）　大棗（十二枚，擘）","cm":"右七味，以水一斗二升，煮取六升，去滓，再煎取三升，溫服一升，日三服。若胸中煩而不嘔者，去半夏、人參，加栝蔞實一枚。若渴，去半夏，加人參合前成四兩半、栝蔞根四兩。若腹中痛者，去黃芩，加芍藥三兩。若脇下痞鞕，去大棗，加牡蠣四兩。若心下悸、小便不利者，去黃芩，加茯苓四兩。若不渴、外有微熱者，去人參，加桂枝三兩，溫服微汗愈。若欬者，去人參、大棗、生薑，加五味子半升、乾薑二兩。"},{"n":"小建中湯","c":"太陽病","tw":25.0,"fp":{"辛":24.0,"甘":64.0,"苦":24.0},"pf":"甘","fr":["甘","辛","苦"],"ns":0.76,"nt":"偏溫","ng":{"寒涼":0. ，洩利膿血，女子漏下，癥瘕堅結，小兒熱氣驚癇。齒，主治小兒大人驚癇癲疾狂走，心下結氣，不能喘息，諸痙。殺精物。久服輕身通神明延年。生山谷。"}],"cl":[{"s":"太陽病中","t":"傷寒，脈浮，醫以火迫劫之，亡陽，必驚狂，臥起不安者，桂枝去芍藥加蜀漆牡蠣龍骨救逆湯主之。"}],"hl":"桂枝（三兩，去皮）　甘草（二兩，炙）　生薑（三兩，切）　大棗（十二枚，擘）　牡蠣（五兩，熬）　蜀漆（三兩，洗去腥）　龍骨（四兩）","cm":"右七味，以水一斗二升，先煮蜀漆減二升，內諸藥，煮取三升，去滓，溫服一升。本云：桂枝湯，今去芍藥，加蜀漆、牡蠣、龍骨。"},{"n":"桂枝加桂湯","c":"太陽病","tw":16.6,"fp":{"辛":48.2,"甘":63.9,"苦":18.1},"pf":"甘","fr":["甘","辛","苦"],"ns":0.78,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":48.2,"平":33.7},"hd":[{"n":"桂枝","w":5,"f":["辛","甘"],"t":"溫","bt":""},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"太陽病中","t":"燒針令其汗，針處被寒，核起而赤者，必發奔豚。氣從少腹上衝心者，灸其核上各一壯，與桂枝加桂湯，更加桂二兩也。"}],"hl":"桂枝（五兩，去皮）　芍藥（三兩）　生薑（三兩，切）　甘草（二兩，炙）　大棗（十二枚，擘）","cm":"右五味，以水七升，煮取三升，去滓，溫服一升。本云：桂枝湯，今加桂滿五兩。所以加桂者，以泄奔豚氣也。"},{"n":"桂枝甘草龍骨牡蠣湯","c":"太陽病","tw":7,"fp":{"辛":14.3,"甘":71.4,"鹹":28.6},"pf":"甘","fr":["甘","鹹","辛"],"ns":0.29,"nt":"平性","ng":{"寒涼":0.0,"溫熱":14.3,"平":85.7},"hd":[{"n":"桂枝","w":1,"f":["辛","甘"],"t":"溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"牡蠣","w":2,"f":["鹹"],"t":"平","bt":"牡蠣　味咸平。主治傷寒寒熱，溫瘧灑灑，驚恚怒氣，除拘緩，鼠瘺，女子帶下赤白。久服強骨節，殺邪鬼，延年。一名蠣蛤。生池澤。"},{"n":"龍骨","w":2,"f":["甘"],"t":"平","bt":"龍骨　味甘平。主治心腹鬼注，精物老魅，咳逆，洩利膿血，女子漏下，癥瘕堅結，小兒熱氣驚癇。齒，主治小兒大人驚癇癲疾狂走，心下結氣，不能喘息，諸痙。殺精物。久服輕身通神明延年。生山谷。"}],"cl":[{"s":"太陽病中","t":"火逆下之，因燒針煩躁者，桂枝甘草龍骨牡蠣湯主之。"}],"hl":"桂枝（一兩，去皮）　甘草（二兩，炙）　牡蠣（二兩，熬）　龍骨（二兩）","cm":"右四味，以水五升，煮取二升半，去滓，溫服八合，日三服。"},{"n":"抵當湯","c":"太陽病","tw":11.0,"fp":{"鹹":27.3,"苦":72.7},"pf":"苦","fr":["苦","鹹"],"ns":-0.82,"nt":"偏寒","ng":{"寒涼":54.5,"溫熱":0.0,"平":45.5},"hd":[{"n":"水蛭","w":3.0,"f":["鹹"],"t":"平","bt":"水蛭　味咸平。主逐惡血瘀血月閉，破血瘕積聚，無子，利水道。生池澤。"},{"n":"虻蟲","w":3.0,"f":["苦"],"t":"微寒","bt":"蜚虻　味苦微寒。主逐瘀血，破下血積堅癖癥瘕寒熱，通利血脈及九竅。生川谷。"},{"n":"桃仁","w":2.0,"f":["苦"],"t":"平","bt":"桃核　味苦平。主治瘀血，血閉，瘕，邪氣，殺小蟲。桃華，殺注惡鬼。令人好顏色。桃梟，微溫，殺百鬼精物。桃毛，主下血瘕，寒熱積聚，無子。桃蠹，殺鬼邪惡不祥。生山谷。"},{"n":"大黃","w":3,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"}],"cl":[{"s":"太陽病中","t":"太陽病，六七日表證仍在，脈微而沈，反不結胸，其人發狂者，以熱在下焦，少腹當鞕滿，小便自利者，下血乃愈。所以然者，以太陽隨經，瘀熱在裏故也。抵當湯主之。"},{"s":"太陽病中","t":"太陽病，身黃，脈沈結，少腹鞕，小便不利者，為無血也。小便自利，其人如狂者，血證諦也，抵當湯主之。"},{"s":"陽明病","t":"陽明證，其人喜忘者，必有畜血。所以然者，本有久瘀血，故令喜忘，屎雖鞕，大便反易，其色必黑者，宜抵當湯下之。"},{"s":"陽明病","t":"病人無表裏證，發熱七八日，雖脈浮數者，可下之。假令已下，脈數不解，合熱則消穀善飢，至六七日，不大便者，有瘀血，宜抵當湯。"}],"hl":"水蛭（熬）　虻蟲（各三十個，去翅足，熬）　桃仁（二十個，去皮尖）　大黃（三兩，酒洗）","cm":"右四味，以水五升，煮取三升，去滓，溫服一升。不下，更服。"},{"n":"抵當丸","c":"太陽病","tw":9.5,"fp":{"鹹":21.1,"苦":78.9},"pf":"苦","fr":["苦","鹹"],"ns":-0.84,"nt":"偏寒","ng":{"寒涼":52.6,"溫熱":0.0,"平":47.4},"hd":[{"n":"水蛭","w":2.0,"f":["鹹"],"t":"平","bt":"水蛭　味咸平。主逐惡血瘀血月閉，破血瘕積聚，無子，利水道。生池澤。"},{"n":"虻蟲","w":2.0,"f":["苦"],"t":"微寒","bt":"蜚虻　味苦微寒。主逐瘀血，破下血積堅癖癥瘕寒熱，通利血脈及九竅。生川谷。"},{"n":"桃仁","w":2.5,"f":["苦"],"t":"平","bt":"桃核　味苦平。主治瘀血，血閉，瘕，邪氣，殺小蟲。桃華，殺注惡鬼。令人好顏色。桃梟，微溫，殺百鬼精物。桃毛，主下血瘕，寒熱積聚，無子。桃蠹，殺鬼邪惡不祥。生山谷。"},{"n":"大黃","w":3,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"}],"cl":[{"s":"太陽病中","t":"傷寒有熱，少腹滿，應小便不利，今反利者，為有血也，當下之，不可餘藥，宜抵當丸。"}],"hl":"水蛭（二十個，熬）　虻蟲（二十個，去翅足，熬）　桃仁（二十五個，去皮尖）　大黃（三兩）","cm":"右四味，搗分四丸，以水一升煮一丸，取七合服之。晬時當下血，若不下者，更服。"},{"n":"大陷胸丸","c":"太陽病","tw":15.5,"fp":{"苦":67.7,"辛":16.1,"甘":16.1},"pf":"苦","fr":["苦","辛","甘"],"ns":-1.35,"nt":"偏寒","ng":{"寒涼":83.9,"溫熱":16.1,"平":0.0},"hd":[{"n":"大黃","w":8,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"},{"n":"葶藶子","w":2.5,"f":["辛"],"t":"寒","bt":"亭歷　味辛寒。主治癥瘕積聚結氣，飲食寒熱，破堅逐邪，通利水道。一名大室，一名大適。生平澤及田野。"},{"n":"芒硝","w":2.5,"f":["苦"],"t":"寒","bt":"消石　味苦寒。主治五臟積熱，胃脹閉。滌去畜結飲食，推陳致新，除邪氣。煉之如膏，久服輕身。一名芒硝。生山谷。"},{"n":"杏仁","w":2.5,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世本草多以杏仁味苦，苦能降氣，故杏仁能止咳平喘下氣。《名醫別錄》載杏仁「味苦，溫，有毒」。臨床上杏仁多歸於苦味，與本草經記載有異，研究者宜留意此差異。"}],"cl":[{"s":"太陽病下","t":"病發於陽，而反下之，熱入因作結胸；病發於陰，而反下之，因作痞也。所以成結胸者，以下之太早故也。結胸者，項亦強，如柔痓狀，下之則和，宜大陷胸丸。"}],"hl":"大黃（半斤）　葶藶子（半升，熬）　芒硝（半升）　杏仁（半升，去皮尖，熬黑）","cm":"右四味，搗篩二味，內杏仁、芒硝，合研如脂，和散，取如彈丸一枚；別搗甘遂末一錢匕，白蜜二合，水二升，煮取一升，溫，頓服之。一宿乃下。如不下，更服，取下為效。禁如藥法。"},{"n":"大陷胸湯","c":"太陽病","tw":11.2,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-2.0,"nt":"大寒","ng":{"寒涼":100.0,"溫熱":0.0,"平":0.0},"hd":[{"n":"大黃","w":6,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"},{"n":"芒硝","w":5,"f":["苦"],"t":"寒","bt":"消石　味苦寒。主治五臟積熱，胃脹閉。滌去畜結飲食，推陳致新，除邪氣。煉之如膏，久服輕身。一名芒硝。生山谷。"},{"n":"甘遂","w":0.2,"f":["苦"],"t":"寒","bt":"甘遂　味苦寒有毒。主治大腹疝瘕，腹滿，面目浮腫，留飲宿食，破癥堅積聚，利水谷道。一名主田。生川谷。"}],"cl":[{"s":"太陽病下","t":"太陽病，脈浮而動數，浮則為風，數則為熱，動則為痛，數則為虛。頭痛發熱，微盜汗出，而反惡寒者，表未解也，醫反下之，動數變遲，膈內拒痛，胃中空虛，客氣動膈，短氣躁煩，心中懊憹，陽氣內陷，心下因鞕，則為結胸，大陷胸湯主之。若不結胸，但頭汗出，餘處無汗，劑頸而還，小便不利，身必發黃。"},{"s":"太陽病下","t":"傷寒六七日，結胸熱實，脈沈而緊，心下痛，按之石鞕者，大陷胸湯主之。"},{"s":"太陽病下","t":"傷寒十餘日，熱結在裏，復往來寒熱者，與大柴胡湯；但結胸，無大熱者，此為水結在胸脇也，但頭微汗出者，大陷胸湯主之。"},{"s":"太陽病下","t":"太陽病，重發汗而復下之，不大便五六日，舌上燥而渴，日晡所小有潮熱，從心下至少腹鞕滿而痛，不可近者，大陷胸湯主之。"},{"s":"太陽病下","t":"傷寒五六日，嘔而發熱者，柴胡湯證具，而以他藥下之，柴胡證仍在者，復與柴胡湯。此雖已下之，不為逆，必蒸蒸而振，卻發熱汗出而解。若心下滿而鞕痛者，此為結胸也，大陷胸湯主之。但滿而不痛者，此為痞，柴胡不中與之，宜半夏瀉心湯。"}],"hl":"大黃（六兩，去皮）　芒硝（一升）　甘遂（一錢匕）","cm":"右三味，以水六升，先煮大黃，取二升，去滓，內芒硝，煮一兩沸，內甘遂末，溫服一升。得快利，止後服。"},{"n":"小陷胸湯","c":"太陽病","tw":5.0,"fp":{"苦":50.0,"辛":50.0},"pf":"苦","fr":["苦","辛"],"ns":-0.6,"nt":"偏寒","ng":{"寒涼":30.0,"溫熱":0.0,"平":50.0},"hd":[{"n":"黃連","w":1,"f":["苦"],"t":"","bt":"黃連　味苦無毒。主治熱氣，目痛眥傷泣出，明目，腸澼腹痛下利，婦人陰中腫痛。久服令人不忘。一名王連，生川谷。（亦貼生於樹木或墻壁上）"},{"n":"半夏","w":2.5,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"},{"n":"栝蔞實","w":1.5,"f":["苦"],"t":"寒","bt":"栝樓　味苦寒。主治消渴，身熱煩滿，大熱。補虛安中，續絕傷。一名地樓。生川谷及山陰。"}],"cl":[{"s":"太陽病下","t":"小結胸病，正在心下，按之則痛，脈浮滑者，小陷胸湯主之。"},{"s":"太陽病下","t":"病在陽，應以汗解之，反以冷水潠之，若灌之，其熱被劫，不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散。寒實結胸，無熱證者，與三物小陷胸湯。（用前第六方）"}],"hl":"黃連（一兩）　半夏（半升，洗）　栝蔞實（大者一枚）","cm":"右三味，以水六升，先煮栝蔞，取三升，去滓，內諸藥，煮取二升，去滓，分溫三服。"},{"n":"文蛤散","c":"太陽病","tw":5,"fp":{"鹹":100.0},"pf":"鹹","fr":["鹹"],"ns":0.0,"nt":"平性","ng":{"寒涼":0.0,"溫熱":0.0,"平":100.0},"hd":[{"n":"文蛤","w":5,"f":["鹹"],"t":"平","bt":""}],"cl":[{"s":"太陽病下","t":"病在陽，應以汗解之，反以冷水潠之，若灌之，其熱被劫，不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散。寒實結胸，無熱證者，與三物小陷胸湯。（用前第六方）"}],"hl":"文蛤（五兩）","cm":"右一味，為散，以沸湯和一方寸匕服，湯用五合。"},{"n":"三物白散","c":"太陽病","tw":1.8,"fp":{"苦":42.9,"辛":57.1},"pf":"辛","fr":["辛","苦"],"ns":0.29,"nt":"平性","ng":{"寒涼":0.0,"溫熱":14.3,"平":42.9},"hd":[{"n":"桔梗","w":0.75,"f":["苦"],"t":"","bt":"桔梗　味苦無毒。主治胸脅痛如刀刺，腹滿腸鳴幽幽，驚恐悸氣。生山谷。"},{"n":"巴豆","w":0.25,"f":["辛"],"t":"溫","bt":"巴豆　味辛溫有毒。主治傷寒溫瘧寒熱，破癥瘕結聚堅積，留飲痰癖，大腹水脹，蕩滌五臟六腑，開通閉塞，利水谷道，去惡肉，除鬼毒蠱注邪物，殺蟲魚。一名巴椒。生川谷。"},{"n":"貝母","w":0.75,"f":["辛"],"t":"平","bt":"貝母　味辛平。主治傷寒煩熱，淋瀝、邪氣、疝瘕，喉痺，乳難。金瘡風痙。一名空草。"}],"cl":[],"hl":"桔梗（三分）　巴豆（一分，去皮心，熬黑，研如脂）　貝母（三分）","cm":"右三味，為散，內巴豆更於臼中杵之，以白飲和服。強人半錢匕，羸者減之。病在膈上必吐，在膈下必利。不利，進熱粥一杯；利過不止，進冷粥一杯。"},{"n":"柴胡桂枝湯","c":"太陽病","tw":15.3,"fp":{"辛":26.1,"甘":37.9,"苦":45.8},"pf":"苦","fr":["苦","甘","辛"],"ns":0.2,"nt":"平性","ng":{"寒涼":9.8,"溫熱":19.6,"平":60.8},"hd":[{"n":"桂枝","w":1.5,"f":["辛","甘"],"t":"溫","bt":""},{"n":"黃芩","w":1.5,"f":["苦"],"t":"平","bt":"黃芩　味苦平。主治諸熱黃疸，腸澼洩利，逐水，下血閉，惡瘡疽蝕，火瘍。一名腐腸。生川谷。"},{"n":"人參","w":1.5,"f":["甘"],"t":"小寒","bt":"人參　味甘小寒。主補五臟，安精神，定魂魄，止驚悸，除邪氣，明目，開心益智。一名人銜，一名鬼蓋。生山谷。"},{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"半夏","w":1.0,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"},{"n":"芍藥","w":1.5,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"大棗","w":1.8,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"生薑","w":1.5,"f":["辛"],"t":"微溫","bt":""},{"n":"柴胡","w":4,"f":["苦"],"t":"平","bt":"茨胡　味苦平。主治心腹腸胃中結氣、飲食積聚、寒熱邪氣，推陳致新，久服輕身、明目、益精。一名地薰。生川谷。"}],"cl":[{"s":"太陽病下","t":"傷寒六七日，發熱，微惡寒，支節煩疼，微嘔，心下支結，外證未去者，柴胡桂枝湯主之。"},{"s":"發汗後","t":"發汗多亡陽，譫語者，不可下，與柴胡桂枝湯。和其榮衛，以通津液，後自愈。"}],"hl":"桂枝（去皮）　黃芩　人參（各一兩半）　甘草（一兩，炙）　半夏（二合半）　芍藥（一兩半）　大棗（六枚，擘）　生薑（一兩半，切）　柴胡（四兩）","cm":"右九味，以水七升，煮取三升，去滓，溫服。"},{"n":"柴胡桂枝乾薑湯","c":"太陽病","tw":24,"fp":{"苦":62.5,"辛":20.8,"甘":20.8,"鹹":8.3},"pf":"苦","fr":["苦","辛","甘","鹹"] 尿。發汗則譫語，下之則額上生汗，手足厥冷。若自汗出者，白虎湯主之。"},{"s":"厥陰病","t":"傷寒，脈滑而厥者，裏有熱，白虎湯主之。"},{"s":"汗吐下後","t":"於白虎湯方內，加人參三兩，餘依白虎湯法。"}],"hl":"知母（六兩）　石膏（一斤，碎）　甘草（二兩，炙）　粳米（六合）","cm":"右四味，以水一斗，煮米熟，湯成，去滓，溫服一升，日三服。"},{"n":"炙甘草湯","c":"太陽病","tw":49.5,"fp":{"甘":88.9,"辛":17.2},"pf":"甘","fr":["甘","辛"],"ns":-0.51,"nt":"偏寒","ng":{"寒涼":36.4,"溫熱":12.1,"平":51.5},"hd":[{"n":"甘草","w":4,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":""},{"n":"人參","w":2,"f":["甘"],"t":"小寒","bt":"人參　味甘小寒。主補五臟，安精神，定魂魄，止驚悸，除邪氣，明目，開心益智。一名人銜，一名鬼蓋。生山谷。"},{"n":"生地黃","w":16,"f":["甘"],"t":"寒","bt":"乾地黃　味甘寒。主治折跌絕筋傷中，逐血痺，填骨髓，長肌肉。做湯，除寒熱積聚，除痺。生者尤良。一名地髓。生川澤。"},{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":""},{"n":"阿膠","w":2,"f":["甘"],"t":"平","bt":"阿膠　味甘平。主治心腹內崩，勞極灑灑如瘧狀，腰腹痛，四肢酸疼，女子下血，安胎。久服輕身益氣。一名傳致膠。"},{"n":"麥門冬","w":8,"f":["甘"],"t":"平","bt":"麥門冬　味甘平。主治心腹結氣，傷中傷飽，胃絡脈絕，羸瘦短氣。久服輕身、不老、不饑。生川谷。"},{"n":"麻仁","w":2.5,"f":["辛"],"t":"平","bt":"麻蕡　味辛平。主治七傷，利五藏，下血寒氣，多食令人見鬼狂走。久服通神明輕身。麻子，味甘平。主補中益氣。久服肥健不老。一名麻勃。生川谷。"},{"n":"大棗","w":9.0,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"太陽病下","t":"傷寒，脈結代，心動悸，炙甘草湯主之。"}],"hl":"甘草（四兩，炙）　生薑（三兩，切）　人參（二兩）　生地黃（一斤）　桂枝（三兩，去皮）　阿膠（二兩）　麥門冬（半斤，去心）　麻仁（半升）　大棗（三十枚，擘）","cm":"右九味，以清酒七升，水八升，先煮八味，取三升，去滓，內膠烊消盡，溫服一升，日三服。一名復脈湯。"},{"n":"大承氣湯","c":"陽明病","tw":15.0,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":0.13,"nt":"平性","ng":{"寒涼":46.7,"溫熱":53.3,"平":0.0},"hd":[{"n":"大黃","w":4,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"},{"n":"厚朴","w":8,"f":["苦"],"t":"溫","bt":"厚樸　味苦溫無毒。主治中風、傷寒、頭痛，寒熱驚氣，血痺死肌，去三蟲。生山谷。"},{"n":"枳實","w":1.5,"f":["苦"],"t":"寒","bt":"枳實　味苦寒。主治大風在皮膚中如麻豆苦癢，除寒熱熱結，止利。長肌肉，利五臟，益氣輕身。生川澤。"},{"n":"芒硝","w":1.5,"f":["苦"],"t":"寒","bt":"消石　味苦寒。主治五臟積熱，胃脹閉。滌去畜結飲食，推陳致新，除邪氣。煉之如膏，久服輕身。一名芒硝。生山谷。"}],"cl":[{"s":"陽明病","t":"陽明病，脈遲，雖汗出不惡寒者，其身必重，短氣，腹滿而喘，有潮熱者，此外欲解，可攻裏也。手足濈然汗出者，此大便已鞕也，大承氣湯主之；若汗多，微發熱惡寒者，外未解也，其熱不潮，未可與承氣湯；若腹大滿不通者，可與小承氣湯，微和胃氣，勿令致大泄下。"},{"s":"陽明病","t":"陽明病，潮熱，大便微鞕者，可與大承氣湯，不鞕者，不可與之。若不大便六七日，恐有燥屎，欲知之法，少與小承氣湯。湯入腹中，轉矢氣者，此有燥屎也，乃可攻之；若不轉矢氣者，此但初頭鞕，後必溏，不可攻之，攻之必脹滿不能食也。欲飲水者，與水則噦。其後發熱者，必大便復鞕而少也，以小承氣湯和之。不轉矢氣者，慎不可攻也。"},{"s":"陽明病","t":"傷寒若吐若下後，不解，不大便五六日，上至十餘日。日晡所發潮熱，不惡寒，獨語如見鬼狀。若劇者，發則不識人，循衣摸床，惕而不安，微喘直視。脈弦者生，濇者死。微者，但發熱譫語者，大承氣湯主之。若一服利，則止後服。"},{"s":"陽明病","t":"陽明病，譫語，有潮熱，反不能食者，胃中必有燥屎五六枚也。若能食者，但鞕耳。宜大承氣湯下之。"},{"s":"陽明病","t":"汗出，譫語者，以有燥屎在胃中，此為風也。須下者，過經乃可下之。下之若早，語言必亂，以表虛裏實故也。下之愈，宜大承氣湯。"},{"s":"陽明病","t":"二陽并病，太陽證罷，但發潮熱，手足漐漐汗出，大便難而譫語者，下之則愈，宜大承氣湯。"},{"s":"陽明病","t":"陽明病，下之，心中懊憹而煩，胃中有燥屎者，可攻。腹微滿，初頭鞕，後必溏，不可攻之。若有燥屎者，宜大承氣湯。"},{"s":"陽明病","t":"病人煩熱，汗出則解，又如瘧狀，日晡所發熱者，屬陽明也。脈實者，宜下之；脈浮虛者，宜發汗。下之，與大承氣湯；發汗，宜桂枝湯。"},{"s":"陽明病","t":"大下後，六七日不大便，煩不解，腹滿痛者，此有燥屎也。所以然者，本有宿食故也，宜大承氣湯。"},{"s":"陽明病","t":"病人小便不利，大便乍難乍易，時有微熱，喘冒不能臥者，有燥屎也。宜大承氣湯。"},{"s":"陽明病","t":"得病二三日，脈弱，無太陽柴胡證，煩躁，心下鞕，至四五日，雖能食，以小承氣湯少少與，微和之，令小安。至六日，與承氣湯一升。若不大便六七日，小便少者，雖不受食，但初頭鞕，後必溏，未定成鞕，攻之必溏，須小便利，屎定鞕，乃可攻之，宜大承氣湯。"},{"s":"陽明病","t":"傷寒六七日，目中不了了，睛不和，無表裏證，大便難，身微熱者，此為實也。急下之，宜大承氣湯。"},{"s":"陽明病","t":"陽明病，發熱，汗多者，急下之，宜大承氣湯。"},{"s":"陽明病","t":"發汗不解，腹滿痛者，急下之，宜大承氣湯。"},{"s":"陽明病","t":"腹滿不減，減不足言，當下之，宜大承氣湯。"},{"s":"陽明病","t":"陽明少陽合病，必下利，其脈不負者，為順也。負者，失也。互相剋賊，名為負也。脈滑而數者，有宿食也。當下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，得之二三日，口燥，咽乾者，急下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，自利清水，色純青，心下必痛，口乾燥者，可下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，六七日，腹脹，不大便者，急下之，宜大承氣湯。"},{"s":"可下","t":"下利，三部脈皆平，按之心下鞕者，急下之，宜大承氣湯。"},{"s":"可下","t":"下利，脈遲而滑者，內實也。利未欲止，當下之，宜大承氣湯。"},{"s":"可下","t":"問曰：人病有宿食，何以別之？師曰：寸口脈浮而大，按之反濇，尺中亦微而濇，故知有宿食，當下之，宜大承氣湯。"},{"s":"可下","t":"下利，不欲食者，以有宿食故也，當宜下之，與大承氣湯。"},{"s":"可下","t":"下利差後，至其年月日復發者，以病不盡故也，當下之，宜大承氣湯。"},{"s":"可下","t":"下利，脈反滑，當有所去，下之乃愈，宜大承氣湯。"},{"s":"可下","t":"病腹中滿痛者，此為實也，當下之，宜大承氣湯。"},{"s":"可下","t":"脈雙弦而遲者，必心下鞕。脈大而緊者，陽中有陰也，可以下之，宜大承氣湯。"}],"hl":"大黃（四兩，酒洗）　厚朴（半斤，炙，去皮）　枳實（五枚，炙）　芒硝（三合）","cm":"右四味，以水一斗，先煮二物，取五升，去滓，內大黃，更煮取二升，去滓，內芒硝，更上微火一兩沸，分溫再服。得下，餘勿服。"},{"n":"小承氣湯","c":"陽明病","tw":6.9,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-0.84,"nt":"偏寒","ng":{"寒涼":71.0,"溫熱":29.0,"平":0.0},"hd":[{"n":"大黃","w":4,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"},{"n":"厚朴","w":2,"f":["苦"],"t":"溫","bt":"厚樸　味苦溫無毒。主治中風、傷寒、頭痛，寒熱驚氣，血痺死肌，去三蟲。生山谷。"},{"n":"枳實","w":0.9,"f":["苦"],"t":"寒","bt":"枳實　味苦寒。主治大風在皮膚中如麻豆苦癢，除寒熱熱結，止利。長肌肉，利五臟，益氣輕身。生川澤。"}],"cl":[{"s":"陽明病","t":"陽明病，脈遲，雖汗出不惡寒者，其身必重，短氣，腹滿而喘，有潮熱者，此外欲解，可攻裏也。手足濈然汗出者，此大便已鞕也，大承氣湯主之；若汗多，微發熱惡寒者，外未解也，其熱不潮，未可與承氣湯；若腹大滿不通者，可與小承氣湯，微和胃氣，勿令致大泄下。"},{"s":"陽明病","t":"陽明病，潮熱，大便微鞕者，可與大承氣湯，不鞕者，不可與之。若不大便六七日，恐有燥屎，欲知之法，少與小承氣湯。湯入腹中，轉矢氣者，此有燥屎也，乃可攻之；若不轉矢氣者，此但初頭鞕，後必溏，不可攻之，攻之必脹滿不能食也。欲飲水者，與水則噦。其後發熱者，必大便復鞕而少也，以小承氣湯和之。不轉矢氣者，慎不可攻也。"},{"s":"陽明病","t":"陽明病，其人多汗，以津液外出，胃中燥，大便必鞕，鞕則譫語。小承氣湯主之。若一服譫語止者，更莫復服。"},{"s":"陽明病","t":"陽明病，譫語，發潮熱，脈滑而疾者，小承氣湯主之。因與承氣湯一升，腹中轉氣者，更服一升；若不轉氣者，勿更與之。明日又不大便，脈反微濇者，裏虛也，為難治，不可更與承氣湯也。"},{"s":"陽明病","t":"太陽病，若吐、若下，若發汗後，微煩，小便數，大便因鞕者，與小承氣湯，和之愈。"},{"s":"陽明病","t":"得病二三日，脈弱，無太陽柴胡證，煩躁，心下鞕，至四五日，雖能食，以小承氣湯少少與，微和之，令小安。至六日，與承氣湯一升。若不大便六七日，小便少者，雖不受食，但初頭鞕，後必溏，未定成鞕，攻之必溏，須小便利，屎定鞕，乃可攻之，宜大承氣湯。"},{"s":"厥陰病","t":"下利譫語者，有燥屎也，宜小承氣湯。"}],"hl":"大黃（四兩，酒洗）　厚朴（二兩，炙，去皮）　枳實（三枚，大者，炙）","cm":"右三味，以水四升，煮取一升二合，去滓，分溫二服。初服當更衣，不爾者盡飲之，若更衣者，勿服之。"},{"n":"豬苓湯","c":"陽明病","tw":5,"fp":{"甘":100.0},"pf":"甘","fr":["甘"],"ns":-0.8,"nt":"偏寒","ng":{"寒涼":40.0,"溫熱":0.0,"平":60.0},"hd":[{"n":"豬苓","w":1,"f":["甘"],"t":"平","bt":"豬苓　味甘平。主治痎瘧，解毒，蠱毒、蠱注，不祥，利水道。久服輕身耐老。一名叚（犬旁）豬矢。生山谷。"},{"n":"茯苓","w":1,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"澤瀉","w":1,"f":["甘"],"t":"寒","bt":"澤瀉　味甘寒。主治風寒濕痺，乳難，消水，養五臟，益氣力，肥健。久服耳目聰明，不饑，延年輕身，面生光，能行水上。一名水瀉，一名芒芋，一名鵠瀉。生池澤。"},{"n":"阿膠","w":1,"f":["甘"],"t":"平","bt":"阿膠　味甘平。主治心腹內崩，勞極灑灑如瘧狀，腰腹痛，四肢酸疼，女子下血，安胎。久服輕身益氣。一名傳致膠。"},{"n":"滑石","w":1,"f":["甘"],"t":"寒","bt":"滑石　味甘寒。主治身熱洩澼，女子乳難，癃閉。利小便，蕩胃中積聚寒熱，益精氣。久服輕身、耐饑，長年。生赭陽山谷。"}],"cl":[{"s":"陽明病","t":"若脈浮，發熱，渴欲飲水，小便不利者，豬苓湯主之。"},{"s":"陽明病","t":"陽明病，汗出多而渴者，不可與豬苓湯，以汗多胃中燥，豬苓湯復利其小便故也。"},{"s":"少陰病","t":"少陰病，下利，六七日，欬而嘔渴，心煩不得眠者，豬苓湯主之。"}],"hl":"豬苓（去皮）　茯苓　澤瀉　阿膠　滑石（碎，各一兩）","cm":"右五味，以水四升，先煮四味，取二升，去滓，內阿膠烊消，溫服七合，日三服。"},{"n":"蜜煎導","c":"陽明病","tw":3.5,"fp":{"甘":100.0},"pf":"甘","fr":["甘"],"ns":0.0,"nt":"平性","ng":{"寒涼":0.0,"溫熱":0.0,"平":100.0},"hd":[{"n":"食蜜","w":3.5,"f":["甘"],"t":"平","bt":"石蜜　味甘平。主治心腹邪氣，諸驚癇痓，安五藏諸不足，益氣補中，止痛解毒，除眾病，和百藥。久服強志輕身，不饑不老。生山谷。"}],"cl":[{"s":"陽明病","t":"陽明病，自汗出，若發汗，小便自利者，此為津液內竭，雖鞕不可攻之，當須自欲大便，宜蜜煎導而通之，若土瓜根及大豬膽汁，皆可為導。"}],"hl":"食蜜（七合）","cm":"右一味。於銅器內，微火煎，當須凝如飴狀，攪之勿令焦著，欲可丸。並手捻作挺，令頭銳，大如指，長二寸許，當熱時急作，冷則鞕。以內穀道中，以手急抱，欲大便時乃去之。"},{"n":"茵陳蒿湯","c":"陽明病","tw":12.2,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-1.02,"nt":"偏寒","ng":{"寒涼":50.8,"溫熱":0.0,"平":0.0},"hd":[{"n":"茵陳蒿","w":6,"f":["苦"],"t":"","bt":"茵陳蒿　味苦無毒。主治風濕寒熱邪氣，熱結黃疸。久服輕身、益氣、耐老。生太山及丘陵坡岸上。"},{"n":"梔子","w":4.2,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"大黃","w":2,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"}],"cl":[{"s":"陽明病","t":"陽明病，發熱汗出者，此為熱越，不能發黃也；但頭汗出，身無汗，劑頸而還，小便不利，渴引水漿者，此為瘀熱在裏，身必發黃，茵陳蒿湯主之。"},{"s":"陽明病","t":"傷寒七八日，身黃如橘子色，小便不利，腹微滿者，茵陳蒿湯主之。"}],"hl":"茵陳蒿（六兩）　梔子（十四枚，擘）　大黃（二兩，去皮）","cm":"右三味，以水一斗二升，先煮茵陳，減六升，內二味，煮取三升，去滓，分三服。小便當利，尿如皂莢汁狀，色正赤，一宿腹減，黃從小便去也。"},{"n":"吳茱萸湯","c":"陽明病","tw":17.6,"fp":{"辛":62.5,"甘":37.5},"pf":"辛","fr":["辛","甘"],"ns":0.74,"nt":"偏溫","ng":{"寒涼":17.0,"溫熱":62.5,"平":20.5},"hd":[{"n":"吳茱萸","w":5,"f":["辛"],"t":"溫","bt":"吳茱萸　味辛溫。主溫中下氣止痛，咳逆寒熱，除濕血痺，逐風邪，開腠理。根，殺三蟲。一名藙。生川谷。"},{"n":"人參","w":3,"f":["甘"],"t":"小寒","bt":"人參　味甘小寒。主補五臟，安精神，定魂魄，止驚悸，除邪氣，明目，開心益智。一名人銜，一名鬼蓋。生山谷。"},{"n":"生薑","w":6,"f":["辛"],"t":"微溫","bt":""},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"}],"cl":[{"s":"陽明病","t":"食穀欲嘔，屬陽明也，吳茱萸湯主之；得湯反劇者，屬上焦也。"},{"s":"少陰病","t":"少陰病，吐利，手足逆冷，煩躁欲死者，吳茱萸湯主之。"},{"s":"厥陰病","t":"乾嘔，吐涎沫，頭痛者，吳茱萸湯主之。"}],"hl":"吳茱萸（一升，洗）　人參（三兩）　生薑（六兩，切）　大棗（十二枚，擘）","cm":"右四味，以水七升，煮取二升，去滓，溫服七合，日三服。"},{"n":"麻子仁丸","c":"陽明病","tw":51,"fp":{"辛":19.6,"苦":70.6,"甘":9.8},"pf":"苦","fr":["苦","辛","甘"],"ns":-0.59,"nt":"偏寒","ng":{"寒涼":47.1,"溫熱":17.6,"平":19.6},"hd":[{"n":"麻子仁","w":10,"f":["辛"],"t":"平","bt":"麻蕡　味辛平。主治七傷，利五藏，下血寒氣，多食令人見鬼狂走。久服通神明輕身。麻子，味甘平。主補中益氣。久服肥健不老。一名麻勃。生川谷。"},{"n":"芍藥","w":8,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"枳實","w":8,"f":["苦"],"t":"寒","bt":"枳實　味苦寒。主治大風在皮膚中如麻豆苦癢，除寒熱熱結，止利。長肌肉，利五臟，益氣輕身。生川澤。"},{"n":"大黃","w":16,"f":["苦"],"t":"寒","bt":"大黃　味苦寒有毒。主下瘀血，血閉，寒熱，破癥瘕積聚，留飲宿食，蕩滌腸胃，推陳致新，通利水穀，調中化食，安和五臟。生山谷。"},{"n":"厚朴","w":4,"f":["苦"],"t":"溫","bt":"厚樸　味苦溫無毒。主治中風、傷寒、頭痛，寒熱驚氣，血痺死肌，去三蟲。生山谷。"},{"n":"杏仁","w":5,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世本草多以杏仁味苦，苦能降氣，故杏仁能止咳平喘下氣。《名醫別錄》載杏仁「味苦，溫，有毒」。臨床上杏仁多歸於苦味，與本草經記載有異，研究者宜留意此差異。"}],"cl":[{"s":"陽明病","t":"趺陽脈浮而濇，浮則胃氣強，濇則小便數，浮濇相摶，大便則鞕，其脾為約，麻子仁丸主之。"}],"hl":"麻子仁（二升）　芍藥（半斤）　枳實（半斤，炙）　大黃（一斤，去皮）　厚朴（一尺，炙，去皮）　杏仁（一升，去皮尖，熬，別作脂）","cm":"右六味，蜜和丸，如梧桐子大，飲服十丸，日三服，漸加，以知為度。"},{"n":"梔子柏皮湯","c":"陽明病","tw":4.5,"fp":{"苦":77.8,"甘":22.2},"pf":"苦","fr":["苦","甘"],"ns":-1.56,"nt":"大寒","ng":{"寒涼":77.8,"溫熱":0.0,"平":22.2},"hd":[{"n":"肥梔子","w":1.5,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"黃柏","w":2,"f":["苦"],"t":"寒","bt":"蘗木　味苦寒。主治五臟腸胃中結氣熱，黃疸，腸痔，止洩利，女子漏下赤白，陰陽蝕瘡。根，一名檀桓。生山谷。"}],"cl":[{"s":"陽明病","t":"傷寒，身黃，發熱，梔子柏皮湯主之。"}],"hl":"肥梔子（十五個，擘）　甘草（一兩，炙）　黃柏（二兩）","cm":"右三味，以水四升，煮取一升半，去滓，分溫再服。"},{"n":"麻黃連軺赤小豆湯","c":"陽明病","tw":22.4,"fp":{"苦":40.2,"甘":50.9,"酸":22.3,"辛":8.9},"pf":"甘","fr":["甘","苦","酸","辛"],"ns":-0.11,"nt":"平性","ng":{"寒涼":22.3,"溫熱":21.4,"平":56.2},"hd":[{"n":"麻黃","w":2,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"連軺","w":2,"f":["苦"],"t":"平","bt":""},{"n":"杏仁","w":0.8,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世本草多以杏仁味苦，苦能降氣，故杏仁能止咳平喘下氣。《名醫別錄》載杏仁「味苦，溫，有毒」。臨床上杏仁多歸於苦味，與本草經記載有異，研究者宜留意此差異。"},{"n":"赤小豆","w":5,"f":["甘","酸"],"t":"平","bt":""},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"生梓白皮","w":5,"f":["苦"],"t":"寒","bt":""},{"n":"生薑","w":2,"f":["辛"],"t":"微溫","bt":""},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"}],"cl":[{"s":"陽明病 者，四逆湯主之。"},{"s":"太陽病上","t":"問曰：證象陽旦，按法治之而增劇，厥逆，咽中乾，兩脛拘急而譫語。師曰：言夜半手足當溫，兩腳當伸。後如師言。何以知此？答曰：寸口脈浮而大，浮為風，大為虛，風則生微熱，虛則兩脛攣，病形象桂枝，因加附子參其間，增桂令汗出，附子溫經，亡陽故也。厥逆，咽中乾，煩躁，陽明內結，譫語煩亂，更飲甘草乾薑湯，夜半陽氣還，兩足當熱，脛尚微拘急，重與芍藥甘草湯，爾乃脛伸。以承氣湯微溏，則止其譫語，故知病可愈。"},{"s":"太陽病中","t":"發汗過多，其人叉手自冒心，心下悸，欲得按者，桂枝甘草湯主之。"},{"s":"太陽病中","t":"傷寒，若吐若下後，心下逆滿，氣上衝胸，起則頭眩，脈沈緊，發汗則動經，身為振振搖者，茯苓桂枝白朮甘草湯主之。"},{"s":"太陽病中","t":"傷寒汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"s":"太陽病下","t":"傷寒，脈結代，心動悸，炙甘草湯主之。"},{"s":"少陰病","t":"少陰病，得之二三日，麻黃附子甘草湯微發汗，以二三日無證，故微發汗也。"},{"s":"少陰病","t":"少陰病，二三日，咽痛者，可與甘草湯；不差者，與桔梗湯。"},{"s":"厥陰病","t":"傷寒，厥而心下悸，宜先治水，當服茯苓甘草湯，卻治其厥。不爾，水漬入胃，必作利也。"}],"hl":"甘草（二兩）","cm":"右一味，以水三升，煮取一升半，去滓，溫服七合，日二服。"},{"n":"桔梗湯","c":"少陰病","tw":3,"fp":{"苦":33.3,"甘":66.7},"pf":"甘","fr":["甘","苦"],"ns":0.0,"nt":"平性","ng":{"寒涼":0.0,"溫熱":0.0,"平":66.7},"hd":[{"n":"桔梗","w":1,"f":["苦"],"t":"","bt":"桔梗　味苦無毒。主治胸脅痛如刀刺，腹滿腸鳴幽幽，驚恐悸氣。生山谷。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"}],"cl":[{"s":"少陰病","t":"少陰病，二三日，咽痛者，可與甘草湯；不差者，與桔梗湯。"}],"hl":"桔梗（一兩）　甘草（二兩）","cm":"右二味，以水三升，煮取一升，去滓，溫分再服。"},{"n":"苦酒湯","c":"少陰病","tw":4.5,"fp":{"辛":93.3,"甘":6.7},"pf":"辛","fr":["辛","甘"],"ns":0.0,"nt":"平性","ng":{"寒涼":0.0,"溫熱":0.0,"平":100.0},"hd":[{"n":"半夏","w":4.2,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"},{"n":"雞子","w":0.3,"f":["甘"],"t":"平","bt":""}],"cl":[{"s":"少陰病","t":"少陰病，咽中傷，生瘡，不能語言，聲不出者，苦酒湯主之。"}],"hl":"半夏（洗，破如棗核，十四枚）　雞子（一枚，去黃，內上苦酒，著雞子殼中）","cm":"右二味，內半夏苦酒中，以雞子殼置刀環中，安火上，令三沸，去滓，少少含咽之。不差，更作三劑。"},{"n":"白通湯","c":"少陰病","tw":3.3,"fp":{"辛":100.0},"pf":"辛","fr":["辛"],"ns":2.0,"nt":"大溫","ng":{"寒涼":0.0,"溫熱":100.0,"平":0.0},"hd":[{"n":"蔥白","w":2.0,"f":["辛"],"t":"溫","bt":""},{"n":"乾薑","w":1,"f":["辛"],"t":"溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。久服去臭氣，通神明。生川谷。"},{"n":"附子","w":0.3,"f":["辛"],"t":"溫","bt":"附子　味辛溫有毒。主治風寒咳逆邪氣，溫中，金創，破癥堅積聚，血瘕寒濕，踒躄拘攣，膝痛不能行走。生山谷。"}],"cl":[{"s":"少陰病","t":"少陰病，下利，白通湯主之。"},{"s":"少陰病","t":"少陰病，下利，脈微者，與白通湯。利不止，厥逆無脈，乾嘔煩者，白通加豬膽汁湯主之。服湯，脈暴出者死，微續者生。"}],"hl":"蔥白（四莖）　乾薑（一兩）　附子（一枚，生，去皮，破八片）","cm" ，煮取一升二合，去滓，內豬膽汁，分溫再服，其脈即來。無豬膽，以羊膽代之。"},{"n":"枳實梔子豉湯","c":"差後病","tw":7.3,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-2.0,"nt":"大寒","ng":{"寒涼":100.0,"溫熱":0.0,"平":0.0},"hd":[{"n":"枳實","w":0.9,"f":["苦"],"t":"寒","bt":"枳實　味苦寒。主治大風在皮膚中如麻豆苦癢，除寒熱熱結，止利。長肌肉，利五臟，益氣輕身。生川澤。"},{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"香豉","w":5,"f":["苦"],"t":"寒","bt":""}],"cl":[{"s":"差後病","t":"大病差後，勞復者，枳實梔子豉湯主之。"}],"hl":"枳實（三枚，炙）　梔子（十四個，擘）　香豉（一升，綿裹）","cm":"右三味，以清漿水七升，空煮取四升，內枳實、梔子，煮取二升，下豉，更煮五六沸，去滓，溫分再服。覆令微似汗。若有宿食者，內大黃如博棋子大五六枚，服之愈。"},{"n":"牡蠣澤瀉散","c":"差後病","tw":7,"fp":{"鹹":14.3,"甘":14.3,"辛":42.9,"苦":28.6},"pf":"辛","fr":["辛","苦","鹹","甘"],"ns":-1.14,"nt":"偏寒","ng":{"寒涼":57.1,"溫熱":0.0,"平":42.9},"hd":[{"n":"牡蠣","w":1,"f":["鹹"],"t":"平","bt":"牡蠣　味咸平。主治傷寒寒熱，溫瘧灑灑，驚恚怒氣，除拘緩，鼠瘺，女子帶下赤白。久服強骨節，殺邪鬼，延年。一名蠣蛤。生池澤。"},{"n":"澤瀉","w":1,"f":["甘"],"t":"寒","bt":"澤瀉　味甘寒。主治風寒濕痺，乳難，消水，養五臟，益氣力，肥健。久服耳目聰明，不饑，延年輕身，面生光，能行水上。一名水瀉，一名芒芋，一名鵠瀉。生池澤。"},{"n":"蜀漆","w":1,"f":["辛"],"t":"平","bt":"蜀漆　味辛平有毒。主治瘧及咳逆寒熱，腹中癥堅痞結，結聚邪氣，蠱毒鬼注。生川谷。"},{"n":"葶藶子","w":1,"f":["辛"],"t":"寒","bt":"亭歷　味辛寒。主治癥瘕積聚結氣，飲食寒熱，破堅逐邪，通利水道。一名大室，一名大適。生平澤及田野。"},{"n":"商陸根","w":1,"f":["辛"],"t":"平","bt":"商陸　味辛平。主治水脹，疝瘕痺，熨除癰腫。殺鬼精物。一名*根，一名夜呼。生川谷。"},{"n":"海藻","w":1,"f":["苦"],"t":"寒","bt":"海藻　味苦寒。主治癭瘤氣，頸下核，破散結氣，癰腫，癥瘕堅氣，腹中上下鳴，下十二水腫。一名落首。生池澤。"},{"n":"栝蔞根","w":1,"f":["苦"],"t":"寒","bt":"栝樓　味苦寒。主治消渴，身熱煩滿，大熱。補虛安中，續絕傷。一名地樓。生川谷及山陰。"}],"cl":[{"s":"差後病","t":"大病差後，從腰以下有水氣者，牡蠣澤瀉散主之。"}],"hl":"牡蠣（熬）　澤瀉　蜀漆（暖水洗去腥）　葶藶子（熬）　商陸根（熬）　海藻（洗去鹹）　栝蔞根（各等分）","cm":"右七味，異搗，下篩為散，更於臼中治之，白飲和，服方寸匕，日三服。小便利，止後服。"},{"n":"竹葉石膏湯","c":"差後病","tw":37.5,"fp":{"苦":5.3,"辛":64.0,"甘":30.7},"pf":"辛","fr":["辛","甘","苦"],"ns":-0.48,"nt":"平性","ng":{"寒涼":48.0,"溫熱":0.0,"平":52.0},"hd":[{"n":"竹葉","w":2,"f":["苦"],"t":"平","bt":"竹葉　味苦平。主治咳逆上氣，溢筋急惡瘍，殺小蟲。根，作湯，益氣止渴，補虛下氣。汁，主風痙痺。實，通神明，輕身益氣。"},{"n":"石膏","w":16,"f":["辛"],"t":"微寒","bt":"石膏　味辛微寒。主治中風寒熱，心下逆氣驚喘，口乾舌焦不得息，腹中堅痛，除邪鬼，產乳，金創。生山谷。"},{"n":"半夏","w":8,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"},{"n":"麥門冬","w":5,"f const CATEGORIES = ["全部","太陽病","陽明病","少陽病","太陰病","少陰病","厥陰病","霍亂病","差後病"];
const TENDENCIES = ["全部","大溫","偏溫","平性","偏寒","大寒"];
const FLAVORS = ["辛","甘","苦","酸","鹹"];
const FLAVOR_COLORS = { "辛":"#E8673C", "甘":"#D4A843", "苦":"#5B8C5A", "酸":"#8E6FB0", "鹹":"#4A7B9D" };
const TENDENCY_COLORS = { "大溫":"#C0392B", "偏溫":"#E67E22", "平性":"#7F8C8D", "偏寒":"#3498DB", "大寒":"#2471A3" };

function RadarChart({ fp, fp2, label, label2, size = 200 }) {
  const cx = size / 2, cy = size / 2;
  const R = size * 0.38;
  const angles = FLAVORS.map((_, i) => (Math.PI / 2) + (2 * Math.PI * i) / 5);
  const toXY = (angle, r) => [cx + r * Math.cos(angle), cy - r * Math.sin(angle)];

  const levels = [20, 40, 60, 80, 100];
  const maxVal = 100;

  const getPoints = (data) => {
    return FLAVORS.map((f, i) => {
      const val = data[f] || 0;
      const r = (val / maxVal) * R;
      return toXY(angles[i], r);
    });
  };

  const pts = getPoints(fp);
  const pathStr = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
  
  let pathStr2 = null;
  if (fp2) {
    const pts2 = getPoints(fp2);
    pathStr2 = pts2.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
  }

  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", maxWidth: size }}>
      {/* Grid levels */}
      {levels.map(lv => {
        const r = (lv / maxVal) * R;
        const gridPts = angles.map(a => toXY(a, r));
        const d = gridPts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
        return <path key={lv} d={d} fill="none" stroke="#e0ddd8" strokeWidth={0.8} opacity={0.7} />;
      })}
      {/* Axis lines */}
      {angles.map((a, i) => {

function NatureGauge({ score }) {
  const pct = Math.max(0, Math.min(100, (score + 2.5) / 5 * 100));
  return (
    <div style={{ position:"relative", height:12, background:"linear-gradient(90deg, #2471A3 0%, #3498DB 25%, #95A5A6 50%, #E67E22 75%, #C0392B 100%)", borderRadius:6 }}>
      <div style={{
        position:"absolute", top:-2, left:`${pct}%`, transform:"translateX(-50%)",
        width:16, height:16, borderRadius:"50%", background:"#fff", border:"2px solid #2c3e50",
        boxShadow:"0 1px 4px rgba(0,0,0,0.3)"

function HerbPill({ herb, expanded, onToggle }) {

    herb.t === "小寒" ? "#EBF5FB" : herb.t === "涼" ? "#E8F8F5" : "#F2F3F4";
  return (
    <div style={{ display:"inline-block", margin:"2px 3px", verticalAlign:"top" }}>
      <span onClick={onToggle} style={{
        display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20,
        background: expanded ? "#2c3e50" : bg, color: expanded ? "#fff" : "inherit",
        fontSize:13, border: expanded ? "1px solid #2c3e50" : "1px solid rgba(0,0,0,0.08)",

        <span style={{ fontWeight:600 }}>{herb.n}</span>

        {herb.bt && <span style={{ fontSize:9, opacity:0.5 }}>{expanded ? "▲" : "▼"}</span>}
      </span>
      {expanded && herb.bt && (
        <div style={{
          marginTop:4, padding:"10px 14px", borderRadius:8,
          background:"#faf8f5", border:"1px solid #e8e4df",
          fontSize:13, lineHeight:2, color:"#555", maxWidth:400,
        }}>
          {herb.bt.split("\n").map((part, i) => {

function ScatterPlot({ data, selected, onSelect }) {
  const W = 680, H = 400, P = 50;
  const minS = -2.5, maxS = 2.5;
  const allFlavors = data.map(d => {
    const sorted = FLAVORS.filter(f => d.fp[f]).sort((a,b) => (d.fp[b]||0) - (d.fp[a]||0));
    return sorted[0] || "甘";
  });
  
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", maxHeight:400 }}>
      <defs>
        <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#2471A3" stopOpacity="0.06" />
          <stop offset="50%" stopColor="#95A5A6" stopOpacity="0.03" />
          <stop offset="100%" stopColor="#C0392B" stopOpacity="0.06" />
        </linearGradient>
      </defs>
      <rect x={P} y={10} width={W-P*2} height={H-P-10} fill="url(#bgGrad)" rx={8} />
      
      {/* Axes */}
      <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="#ccc" />
      <line x1={P} y1={10} x2={P} y2={H-P} stroke="#ccc" />
      
      {/* X labels */}
      {[-2,-1,0,1,2].map(v => {
        const x = P + (v - minS) / (maxS - minS) * (W - P*2);
        return <g key={v}>
          <line x1={x} y1={H-P} x2={x} y2={H-P+5} stroke="#999" />
          <text x={x} y={H-P+18} textAnchor="middle" fontSize={10} fill="#666">{v}</text>
        </g>;
      })}
      <text x={W/2} y={H-8} textAnchor="middle" fontSize={11} fill="#888" fontWeight={600}>← 寒涼 ─── 寒熱指數 ─── 溫熱 →</text>
      
      {/* Y label */}
      <text x={14} y={H/2-20} textAnchor="middle" fontSize={11} fill="#888" fontWeight={600} transform={`rotate(-90, 14, ${H/2-20})`}>藥物總用量（兩）</text>
      
      {/* Data points */}
      {data.map((d, i) => {
        const x = P + (d.ns - minS) / (maxS - minS) * (W - P*2);
        const maxW = Math.max(...data.map(dd => dd.tw));
        const y = H - P - (d.tw / maxW) * (H - P - 20);
        const r = Math.max(4, Math.min(12, d.hd.length * 1.5));
        const color = FLAVOR_COLORS[allFlavors[i]];
        const isSel = selected && selected.n === d.n;
        return (
          <g key={i} onClick={() => onSelect(d)} style={{ cursor:"pointer" }}>
            <circle cx={x} cy={y} r={isSel ? r + 3 : r} fill={color} opacity={isSel ? 1 : 0.7}
              stroke={isSel ? "#2c3e50" : "none"} strokeWidth={2} />
            {(isSel || d.tw > 30) && (
              <text x={x} y={y - r - 4} textAnchor="middle" fontSize={10} fill="#333" fontWeight={600}>{d.n}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function OverviewStats({ data }) {
  const tendCount = {};
  data.forEach(d => { tendCount[d.nt] = (tendCount[d.nt]||0)+1; });
  const flavorTotals = {};
  FLAVORS.forEach(f => { flavorTotals[f] = 0; });
  data.forEach(d => { FLAVORS.forEach(f => { if(d.fp[f]) flavorTotals[f] += d.fp[f]; }); });
  const flavorSum = Object.values(flavorTotals).reduce((a,b)=>a+b,0);

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
      <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee" }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:10, fontWeight:600 }}>四氣偏性分佈</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {TENDENCIES.slice(1).map(t => (
            <div key={t} style={{ textAlign:"center", flex:1, minWidth:50 }}>
              <div style={{ fontSize:22, fontWeight:800, color: TENDENCY_COLORS[t] }}>{tendCount[t]||0}</div>
              <div style={{ fontSize:11, color:"#666" }}>{t}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:4, fontWeight:600, alignSelf:"flex-start" }}>五味累計分佈</div>
        {(() => {
          const fpNorm = {};
          const maxF = Math.max(...FLAVORS.map(f => flavorTotals[f]));
          FLAVORS.forEach(f => { fpNorm[f] = maxF > 0 ? Math.round(flavorTotals[f] / maxF * 100) : 0; });
          return <RadarChart fp={fpNorm} size={180} />;
        })()}
      </div>
    </div>
  );
}

        <p style={{ fontSize:12, color:"#888", marginTop:8 }}>手動補充：指《神農本草經》中未獨立收錄，依傳統本草學文獻補充性味的藥物。包括生薑、桂枝、細辛、粳米、膠飴、蔥白、香豉、赤小豆、雞子黃等。</p>
      </Section>

      <Section title="五、性味爭議藥物">
        <p>以下藥物的性味在《神農本草經》與後世本草之間存在差異，或本研究的處理方式需要特別說明。本研究原則上以《神農本草經》為準，但列出爭議供研究者參考。</p>
        <DefTable
          headers={["藥物", "本研究取值", "本草經原文", "後世觀點 / 爭議"]}
          rows={[
            ["杏仁", "甘溫", "杏核　味甘溫", "《名醫別錄》載味苦溫有毒。後世本草多以杏仁味苦，苦能降氣，主治咳喘。臨床上杏仁多歸於苦味，與本草經甘味之記載有顯著差異。"],
            ["桂枝", "辛甘溫（手動）", "牡桂　味辛溫", "本草經載牡桂味辛溫，桂枝為牡桂之嫩枝。後世多認為桂枝兼具甘味，本研究取辛甘溫。另箘桂（肉桂）亦味辛溫，與桂枝為同物不同部位，功效有別。"],
            ["生薑", "辛微溫（手動）", "（本草經僅載乾姜）", "本草經不分生薑、乾姜，僅載乾姜味辛溫。生薑為鮮品，性偏散表，乾姜為乾燥品，性偏溫中。本研究將生薑獨立設為辛微溫，以區別於乾姜之辛溫。"],
            ["芍藥", "苦（無四氣）", "勺藥　味苦", "本草經僅載味苦，未記四氣，故不納入寒熱指數計算。後世分白芍（苦酸微寒）、赤芍（苦微寒），性味有別。傷寒論中芍藥未區分赤白。"],
            ["芒硝", "苦寒", "消石　味苦寒", "本研究以芒硝對應消石。但消石與芒硝是否為同一物，歷代有爭議。一說消石為硝石（硝酸鉀），芒硝為朴硝（硫酸鈉），二者成分不同。"],
            ["細辛", "辛溫（手動）", "（本草經無獨立條目）", "本草經未見細辛獨立條目，本研究依《名醫別錄》「味辛溫」補充。後世有「細辛不過錢」之說，用量爭議亦大。"],
            ["赤石脂", "甘平", "五石脂　味甘平", "本草經將青石脂、赤石脂、黃石脂、白石脂、黑石脂合為一條，統稱味甘平。後世認為赤石脂味甘酸溫，與本草經有異。"],
            ["麻仁 / 麻子仁", "辛平", "麻蕡　味辛平", "本草經載麻蕡味辛平，但麻子仁為大麻種仁，後世多認為味甘平，潤腸通便。辛味與甘味之別影響方劑五味分析。"],
          ]}
        />
      </Section>

      <Section title="六、研究限制">
        <p>1. <strong>性味來源單一</strong>：僅取《神農本草經》之記載，未參照後世本草（如《本草經集注》《名醫別錄》等）的增補修訂。部分藥物在本草經中的四氣記載缺失（如芍藥僅載「味苦」無四氣），此類藥物在計算寒熱指數時不納入四氣權重。</p>
        <p>2. <strong>五味疊加</strong>：一味藥可兼具多味（如桂枝辛甘），計算時每個味分別乘以該藥用量，因此五味百分比之和可能超過 100%。此為設計選擇，旨在忠實反映藥物的複合味性。</p>
        <p>3. <strong>用量換算為估算</strong>：升、合等容量單位換算為兩時，因不同藥材密度差異，存在誤差。本研究取統一近似值，重在方劑內各藥的相對比例而非絕對重量。</p>
        <p>4. <strong>炮製未納入</strong>：炮製（炙、炮、去皮尖等）可能改變藥物性味，本研究未就炮製進行性味調整。</p>
        <p>5. <strong>歸經未納入</strong>：《神農本草經》未明確記載歸經，故本研究僅分析五味與四氣兩個維度。</p>
      </Section>

      <div style={{ textAlign:"center", padding:"24px 0", fontSize:11, color:"#bbb", lineHeight:1.8 }}>
        方劑來源：趙開美翻刻宋本《傷寒論》（明萬曆二十七年刊本）<br/>
        性味來源：《神農本草經》<br/>
      </div>
    </div>
  );
}

        {view === "scatter" ? (
          <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginBottom:16 }}>
            <div style={{ display:"flex", gap:12, marginBottom:10, justifyContent:"center", flexWrap:"wrap" }}>
              {FLAVORS.map(f => (
                <span key={f} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11 }}>
                  <span style={{ width:10, height:10, borderRadius:"50%", background:FLAVOR_COLORS[f], display:"inline-block" }} />
                  {f}
                </span>
              ))}
            </div>
            <ScatterPlot data={filtered} selected={selected} onSelect={setSelected} />
          </div>
        ) : null}

        <div style={{ display:"flex", gap:16, flexDirection: view === "list" ? "row" : "column" }}>
          {/* Formula List */}
          <div style={{
            background:"#fff", borderRadius:12, border:"1px solid #eee", overflow:"hidden",
            width: view === "list" && selected ? "45%" : "100%",
            maxHeight: view === "list" ? 600 : "none", overflowY:"auto",
            transition:"width 0.2s"
          }}>
            {filtered.map(f => (
              <FormulaCard key={f.n} formula={f} selected={selected && selected.n === f.n}
                onClick={() => setSelected(selected && selected.n === f.n ? null : f)} />
            ))}
            {filtered.length === 0 && (
              <div style={{ padding:40, textAlign:"center", color:"#aaa" }}>無符合條件的方劑</div>
            )}
          </div>

          {/* Detail Panel */}
          {selected && (
            <DetailPanel selected={selected} compare={compare} setCompare={setCompare} onClose={() => setSelected(null)} />
          )}
        </div>

        {/* Footer */}
        <div style={{ textAlign:"center", padding:"24px 0", fontSize:11, color:"#bbb", lineHeight:1.8 }}>
          © 2026 吳啓銘 中醫博士　　性味來源：《神農本草經》 · 方劑來源：趙開美翻刻宋本《傷寒論》
        </div>
      </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
