<script>
// ====== TCM QI-ENGINE v5.3.3 ======
// 阿銘醫師設計：古典中醫氣化推導引擎 (Final Stable Edition)
class TcmQiEngine {
 constructor(formula) {
  this.f = formula || {};
  this.v = (formula && formula.fp) || {};
  this.herbs = (formula && formula.hd) ? formula.hd.map(h => h.n) : [];
  this.organs = (formula && formula.hd)
   ? formula.hd.flatMap(h => h.jg || [])
   : [];
  this.finalVectorOverride = null;
  this.CONFIG = {
   SIGNIFICANT_BIT: 15,
   P4_RATIO_THRESHOLD: 40
  };
 }

 // ── 表面向量：門戶開闔 ──
 getSurfaceVector() {
  const { 辛 = 0, 酸 = 0, 苦 = 0 } = this.v;

  // 【核心修正】君藥判定：只要有麻黃且無酸收（芍藥、五味子、烏梅）
  const hasMaHuang = this.herbs.includes("麻黃");
  const hasSourConstraint = this.herbs.some(h => ["芍藥", "五味子", "烏梅", "山茱萸"].includes(h));

  if (hasMaHuang && !hasSourConstraint) {
   return "PURE_EXPLOSION"; // 麻黃帶頭且無酸拉住，無視甘、苦，直接炸開
  }

  // 桂枝湯邏輯：有辛有酸(芍藥)，判定為解肌
  if (this.herbs.includes("桂枝") && hasSourConstraint) {
   return "RELEASE_WITH_HOLD";
  }

  // 原有保底邏輯...
  if (辛 < 20) return "STABLE";
  const holdBackPower = 酸 + (苦 * 0.5);
  if (holdBackPower >= 辛 * 0.3) return "RELEASE_WITH_HOLD";
  return "PURE_EXPLOSION";
 }

 // ── 病機判斷（核心層次） ──
 getPathology() {
  const { 苦 = 0, 辛 = 0, 鹹 = 0, 甘 = 0, 酸 = 0 } = this.v;
  const ns = this.f.ns || 0;
  const surface = this.getSurfaceVector();
  let results = [];

  // 【先驗規則：白虎湯攔截】(針對白虎湯、白虎加人參湯)
  if (this.herbs.includes("石膏") && this.herbs.includes("知母")) {
    this.finalVectorOverride = "【清潤透達】辛寒清熱，益氣生津";
    return ["陽明氣分大熱 (辛寒清熱 / 煩渴引飲)"];
  }

  // 【先驗規則：清熱生津攔截】(針對竹葉石膏湯)
  if (this.herbs.includes("石膏") && (this.herbs.includes("竹葉") || this.herbs.includes("麥門冬"))) {
    this.finalVectorOverride = "【清潤收斂】清熱除煩，益氣生津";
    return ["餘熱未清 (氣陰兩傷 / 辛寒清散)"];
  }

  // 【先驗規則：葛根芩連攔截】(針對葛根黃芩黃連湯)
  if (this.herbs.includes("葛根") && this.herbs.includes("黃芩") && this.herbs.includes("黃連")) {
    this.finalVectorOverride = "【清降逆流】昇陽止利，清熱燥濕";
    return ["協熱下利 (表邪下陷 / 清熱解表)"];
  }

  // 【先驗規則：厥陰溫通攔截】(針對當歸四逆加吳茱萸生薑湯)
  if (this.herbs.includes("當歸") && (this.herbs.includes("吳茱萸") || this.herbs.includes("吳茱"))) {
    this.finalVectorOverride = "【溫通經脈】溫經散寒，養血通脈";
    return ["厥陰血寒 (溫經通脈 / 內有久寒)"];
  }

  // 【先驗規則：溫降平逆】(針對吳茱萸湯)
  if (this.herbs.includes("吳茱萸") && this.herbs.includes("生薑") &&
      !this.herbs.includes("麻黃") && !this.herbs.includes("桂枝")) {
    this.finalVectorOverride = "【溫降平逆】暖肝溫胃，降逆止嘔";
    return ["厥陰肝寒犯胃 (乾嘔吐涎 / 頭痛)"];
  }

  // 【先驗規則：宣肺化飲】(針對小青龍湯)
  if (this.herbs.includes("麻黃") && this.herbs.includes("細辛") &&
      (this.herbs.includes("五味子") || this.herbs.includes("半夏"))) {
    this.finalVectorOverride = "【宣肺化飲】外解風寒，內散水飲";
    return ["外寒內飲 (表不解 / 咳喘有痰)"];
  }

  // 【先驗規則：辛涼宣泄】(針對麻黃杏仁甘草石膏湯) — 必須在表裡雙解之前
  if (this.herbs.includes("麻黃") && this.herbs.includes("石膏") &&
      this.herbs.includes("杏仁") && !this.herbs.includes("桂枝")) {
    this.finalVectorOverride = "【辛涼宣泄】宣肺平喘，清熱除煩";
    return ["邪熱壅肺 (汗出而喘 / 無大熱)"];
  }

  // 【先驗規則：表裡雙解】(針對大青龍湯)
  if (this.herbs.includes("麻黃") && this.herbs.includes("石膏") &&
      !this.herbs.includes("五味子") && !this.herbs.includes("半夏")) {
    this.finalVectorOverride = "【表裡雙解】內清鬱熱，外散寒邪";
    return ["表寒裡熱 (不汗出而煩躁 / 表裡雙解)"];
  }

  // 【先驗規則：逐瘀破結】(針對桃核承氣湯)
  if (this.herbs.includes("桃仁") && this.herbs.includes("桂枝") && this.herbs.includes("大黃")) {
    this.finalVectorOverride = "【逐瘀破結】通下瘀熱，活血化瘀";
    return ["太陽隨經入腑 (其人如狂 / 下焦蓄血)"];
  }

  // 【先驗規則：昇陽舒廉】(針對桂枝加葛根湯)
  if (this.herbs.includes("桂枝") && this.herbs.includes("葛根")) {
    this.finalVectorOverride = "【昇陽舒廉】昇津通絡，解肌發表";
    return ["太陽經氣不舒 (項背強几几 / 昇津止痙)"];
  }

  // 【先驗規則：解肌下氣】(針對桂枝加厚朴杏子湯)
  if (this.herbs.includes("桂枝") && this.herbs.includes("厚朴") && this.herbs.includes("杏仁")) {
    this.finalVectorOverride = "【解肌下氣】宣肺止咳，降逆平喘";
    return ["營衛不和兼肺氣上逆 (喘家作 / 咳喘有痰)"];
  }

  // 【先驗規則：溫建中氣】(針對小建中湯)
  if (this.herbs.includes("桂枝") && this.herbs.includes("芍藥") &&
      this.herbs.some(h => h.includes("飴") || h.includes("餳"))) {
    this.finalVectorOverride = "【溫建中氣】甘溫補虛，和裡緩急";
    return ["中焦虛勞 (裡急腹痛 / 悸衕)"];
  }

  // 【P0 厥陰重鎮】(優先級最高，解決烏梅丸)
  if (酸 >= 50 && 辛 >= 15 && 苦 >= 10) {
   this.finalVectorOverride = "【極致內斂】酸收重鎮，辛以入陰，苦以清降";
   return ["厥陰寒熱錯雜 (酸收辛潤 / 蛔厥定驚)"];
  }

  // 【先驗規則：溫陽固表】(針對桂枝加附子湯)
  if (this.herbs.includes("附子") && this.herbs.includes("桂枝") && this.organs.includes("腎") && ns >= 0.1) {
   this.finalVectorOverride = "【溫陽固表】扶陽解肌，止汗固表";
   return ["太陽病誤汗致陽虛 (遂漏不止 / 溫陽固表)"];
  }

  // 【先驗規則：太少同病（助陽發表）】(針對麻黃細辛附子湯)
  if (this.herbs.includes("麻黃") && this.herbs.includes("附子")) {
    this.finalVectorOverride = "【助陽發表】提振陽氣，溫經散寒";
    return ["太少同病 (素體陽虛，外感風寒 / 助陽發表)"];
  }

  // 【先驗規則：溫陽利水】(針對茯苓四逆湯) — 必須在溫陽固脫之前
  if (this.herbs.includes("茯苓") && this.herbs.includes("附子") && this.herbs.includes("乾薑") && ns >= 0.1) {
    this.finalVectorOverride = "【溫陽利水】回陽救逆，化氣利水";
    return ["少陰陽衰水泛 (四肢沉重 / 溫陽利水)"];
  }

  // 【先驗規則：溫陽固脫】(針對四逆湯、通脈四逆湯、白通湯、四逆加人參湯)
  if (this.herbs.includes("附子") && this.herbs.includes("乾薑") && ns >= 0.1) {
    this.finalVectorOverride = "【溫陽固脫】回陽救逆，破陰通陽";
    return ["少陰寒化證 (亡陽證 / 脈微欲絕)"];
  }

  // 【先驗規則：真武湯】（附子+白朮+生薑，無乾薑）
  if (this.herbs.includes("附子") && this.herbs.includes("白朮") && this.herbs.includes("生薑") &&
      !this.herbs.includes("乾薑") && ns >= 0.1) {
    this.finalVectorOverride = "【溫陽蒸騰】提振底火，化氣行水";
    return ["少陰陽衰 (溫陽化氣 / 鎮水消腫)"];
  }

  // 【P0.5 少陰陽衰】(附子+腎，解決真武湯)
  if (this.herbs.includes("附子") && this.organs.includes("腎") && ns >= 0.1) {
   this.finalVectorOverride = "【溫陽蒸騰】提振底火，化氣行水";
   return ["少陰陽衰 (溫陽化氣 / 鎮水消腫)"];
  }

  // 【先驗規則：五苓散】（澤瀉+茯苓+豬苓+白朮+桂枝，利水滲濕）
  if (this.herbs.includes("澤瀉") && this.herbs.includes("茯苓") &&
      this.herbs.includes("豬苓") && this.herbs.includes("白朮") && this.herbs.includes("桂枝")) {
    this.finalVectorOverride = "【氣化平調】通陽化氣，利水滲濕";
    return ["水濕內停 (氣化失調 / 利水滲濕)"];
  }

  // 【先驗規則：桂枝去芍藥湯】（桂枝+甘草+生薑+大棗，去芍藥）— 必須在桂枝甘草湯之前
  if (this.herbs.includes("桂枝") && this.herbs.includes("甘草") &&
      this.herbs.includes("生薑") && this.herbs.includes("大棗") &&
      !this.herbs.includes("芍藥") && !this.herbs.includes("附子")) {
    this.finalVectorOverride = "【解肌舒脈】宣散而不傷陰，調和營衛";
    return ["營衛不和 (表證輕淺 / 解肌祛邪)"];
  }

  // 【先驗規則：桂枝甘草湯】（桂枝+甘草，無附子/生薑/大棗，溫振心陽）
  if (this.herbs.includes("桂枝") && this.herbs.includes("甘草") &&
      !this.herbs.includes("附子") && !this.herbs.includes("麻黃") &&
      !this.herbs.includes("生薑") && !this.herbs.includes("大棗")) {
    this.finalVectorOverride = "【溫振心陽】助陽氣化，安定心神";
    return ["心陽不振 (氣化失調 / 溫振心陽)"];
  }

  // 【先驗規則：理中丸】（人參+乾薑+白朮+甘草，無桂枝/麻黃）
  if (this.herbs.includes("人參") && this.herbs.includes("乾薑") &&
      this.herbs.includes("白朮") && this.herbs.includes("甘草") &&
      !this.herbs.includes("桂枝") && !this.herbs.includes("麻黃")) {
    this.finalVectorOverride = "【氣化平調】溫中祛寒，建復脾氣";
    return ["中焦虛寒 (氣化失調 / 溫中復陽)"];
  }

  // 【P1 陰質滋補】(地黃、甘草湯類)
  if (甘 > 30 && this.organs.includes("心") && this.organs.includes("腎") && Math.abs(ns) < 0.5) {
   this.finalVectorOverride = "【內斂滋濡】填補陰液，寧心定悸";
   return ["陰血虧損 (滋陰養血 / 復脈定悸)"];
  }

  // 【P2 鹹苦攻下】(增加鹹味身分證)
  if (苦 >= 15 && 鹹 >= 10 && this.organs.includes("大腸")) {
   this.finalVectorOverride = "【向心沉降】盪滌實邪，通腑泄熱";
   return ["熱結實邪 (盪滌積滯 / 苦寒通降)"];
  }

  // 【P2.1 重鎮降逆】(解決旋覆代赭湯)
  if (this.herbs.some(h => ["代赭石", "旋覆花", "代赭"].includes(h))) {
   this.finalVectorOverride = "【重鎮降逆】平衝降逆，化痰消痞";
   return ["胃氣上逆 (濁氣不降 / 鎮逆理氣)"];
  }

  // 【P3 少陽樞紐】(柴胡+黃芩身分證，解決小柴胡)
  if (this.herbs.includes("柴胡") && this.herbs.includes("黃芩") && this.organs.includes("膽")) {
   this.finalVectorOverride = "【樞紐旋轉】和解少陽，宣通內外";
   return ["少陽樞紐不利 (和解表裡 / 往來寒熱)"];
  }

  // 【P5 溫中復陽】(解決甘草乾薑湯/理中丸；排除瀉心湯)
  const hasExpelHerb = this.herbs.some(h => ["麻黃", "桂枝", "葛根", "細辛", "生薑"].includes(h));
  const hasBitterCold = this.herbs.some(h => ["黃連", "黃芩"].includes(h));
  if (辛 >= 20 && 甘 >= 30 && !hasExpelHerb && !hasBitterCold) {
   this.finalVectorOverride = "【溫煦內斂】守中復陽，化氣生津";
   return ["陽氣虛衰 (辛甘化陽 / 溫中復陽)"];
  }

 

  // 【先驗規則：中道旋轉（瀉心系列）】(針對大黃黃連瀉心湯、附子瀉心湯)
  if (this.herbs.includes("大黃") &&
      (this.herbs.includes("黃連") || this.herbs.includes("黃芩")) &&
      !this.herbs.includes("麻黃") && !this.herbs.includes("葛根")) {
    this.finalVectorOverride = "【中道旋轉】辛開苦降，交通寒熱";
    return ["中焦氣機痞塞 (心下痞 / 寒熱錯雜)"];
  }

  // 【先驗規則：逐下攻積】(針對大承氣湯、小承氣湯)
  if (this.herbs.includes("大黃") &&
      (this.herbs.includes("厚朴") || this.herbs.includes("枳實"))) {
    this.finalVectorOverride = "【向心沉降】逐瘀蕩滌，釜底抽薪";
    return ["陽明腑實 (胃家實 / 燥屎內結)"];
  }

  // 【先驗規則：峻下逐水】(針對十棗湯)
  if (this.herbs.includes("甘遂") && this.herbs.includes("大戟") && this.herbs.includes("芫花")) {
    this.finalVectorOverride = "【峻下逐水】攻逐水飲，開隧道水";
    return ["水飲積聚 (懸飲 / 支飲)"];
  }

  // 【P4 中焦樞紐】(修正門檻與排除邏輯)
  if (苦 >= 15 && 辛 >= 15 && this.organs.includes("脾")) {
   const hasSurfaceHerb = this.herbs.some(h => ["麻黃", "葛根", "桂枝"].includes(h));
   const hasBitterHerb = this.herbs.some(h => ["黃連", "黃芩"].includes(h));
   const hasAcridHerb = this.herbs.some(h => ["乾薑", "生薑", "半夏"].includes(h));
   const isSunFocus = this.organs.filter(o => o === "膀胱").length > 2;

   if (!hasSurfaceHerb && !isSunFocus && hasBitterHerb && hasAcridHerb) {
    this.finalVectorOverride = "【中道旋轉】重建氣機樞紐，交通寒熱";
    return ["中焦氣機痞塞 (寒熱錯雜 / 辛開苦降)"];
   }
  }


  // 【P6 殘餘表/裡熱判定】
  if (this.organs.some(o => ["肺", "膀胱"].includes(o))) {
   if (surface === "PURE_EXPLOSION") {

function RadarChart({ fp, fp2, label, label2, size = 280 }) {
  const cx = size / 2, cy = size / 2;

      const r = (val / maxVal) * R;
      return toXY(angles[i], r);

  const pts = getPoints(fp);

  return (
    <svg viewBox={`0 ${-TOP_VIEWBOX_PADDING} ${size} ${size + TOP_VIEWBOX_PADDING}`} style={{ width: "100%", maxWidth: size }}>

        const r = (lv / maxVal) * R;
        const gridPts = angles.map(a => toXY(a, r));

      })}
      {/* Axis lines */}
      {angles.map((a, i) => {
        const [ex, ey] = toXY(a, R);
        return <line key={i} x1={cx} y1={cy} x2={ex} y2={ey} stroke="#d5d0c8" strokeWidth={0.6} />;
      })}
      {/* Comparison fill (if exists) */}

            <text x={lx} y={ly + 8} textAnchor="middle" fontSize={10} fill="#999">{val > 0 ? `${val}%` : "-"}</text>

        <p style={{ fontWeight:600, color:"#1a1a2e", marginTop:16 }}>比較版本——康平本（康治本）《傷寒論》</p>
        <p>日本傳本。康平本為日本丹波雅忠於康平三年（1060年）據家傳本抄寫，早於宋本定本時間（1065年）五年，被認為可能是唐代空海（弘法大師）於貞元二十一年（805年）傳入日本的古本。此本最重要的特徵是保留了「頂格、降一格、降兩格」的行格體例以及旁注、腳注的區分，可能反映了不同時期注解疊加的痕跡——頂格文字被認為是仲景原文，降格文字可能為後世注文。1858年由日本京都書林刊行，後經大塚敬節校正、葉橘泉重校。康治本為更早的殘本，僅存 50 首方，1849年為戶上重較氏發現。本網站將康平本作為異文比較的另一參考版本。</p>

        <p style={{ fontWeight:600, color:"#1a1a2e", marginTop:16 }}>版本比較說明</p>
        <p>本網站的性味分析以宋本為唯一藍本，桂林古本與康平本僅用於條文異文的對照參考。在每首方劑的「相關條文」中，若該條文在桂林古本或康平本中有文字出入，可點擊「異文」按鈕展開比較。</p>

        <p style={{ fontWeight:600, color:"#1a1a2e", marginTop:16 }}>性味來源——《神農本草經》</p>
        <p>藥物的五味與四氣數據以《神農本草經》原文記載為主。現存本草經為清代輯佚本（孫星衍輯本），主要從宋《證類本草》中還原。部分藥物因名稱差異需做對應（見下方藥名對應表）。</p>
        <p>本草經未獨立收錄的藥物，依以下文獻手動補充性味：</p>
        <p>
          <strong>《名醫別錄》</strong>（漢末魏晉）：補充細辛「味辛溫」等本草經缺載之品目。原書已佚，內容保存於《本草經集注》及《證類本草》中。<br/>
          <strong>《本草經集注》</strong>（南朝梁·陶弘景）：陶弘景以朱墨分書保存本草經原文與別錄增補，為判斷藥名對應及性味修訂的重要參考。<br/>
          <strong>歷代本草共識</strong>：如生薑與乾姜之鮮乾區分、桂枝兼具甘味、蔥白通陽散寒等，屬歷代本草學家及臨床家長期累積的公認見解，非取自單一文獻。<br/>
          <strong>藥食同源品目</strong>：粳米、膠飴（飴糖）、香豉（淡豆豉）、雞子（雞蛋）等食物性藥材，依傳統飲食療法文獻及中藥學教科書補充性味。
        </p>

      <Section title="三、操作型定義">
        <p style={{ fontWeight:600, color:"#1a1a2e" }}>3.1 五味定義與量化</p>
        <p>五味指酸、苦、甘、辛、鹹五種藥味，取自《神農本草經》原文「味X」之記載。每味藥可有一個或多個味（如桂枝辛甘）。</p>
        <p>量化方式：某方劑中，某味的權重 = 該方劑中所有含此味藥物的用量（兩）之和。五味百分比 = 某味權重 ÷ 方劑總用量 × 100%。因一味藥可兼具多味，故五味百分比之和可能超過 100%。</p>
        <p>五味以五角雷達圖（Pentagon Radar Chart）呈現，五個頂點分別代表酸、苦、甘、辛、鹹，數值越大表示該味在方劑中的佔比越高。</p>

        />

        <p style={{ fontWeight:600, color:"#1a1a2e", marginTop:20 }}>3.2 四氣定義與量化</p>
        <p>四氣指藥物的寒、熱、溫、涼四種藥性，加上「平」共五類。取自《神農本草經》原文「味X寒/溫/平」等記載，含修飾語「微」「小」。</p>
        <p>量化方式：將四氣轉換為數值分數，再以用量加權計算方劑整體的「寒熱指數」。</p>

        <p style={{ fontWeight:600, color:"#1a1a2e", marginTop:20 }}>3.3 寒熱指數計算</p>
        <p>寒熱指數 = Σ（各藥四氣分數 × 該藥用量）÷ 方劑總用量</p>
        <p>例：四逆湯 = 甘草（平=0）×2兩 + 乾薑（溫=+2）×1.5兩 + 附子（溫=+2）×1.5兩 = (0×2 + 2×1.5 + 2×1.5) ÷ 5 = +1.2</p>

      <Section title="六、限制">
        <p>1. <strong>性味來源單一</strong>：僅取《神農本草經》之記載，未參照後世本草（如《本草經集注》《名醫別錄》等）的增補修訂。部分藥物在本草經中的四氣記載缺失（如芍藥僅載「味苦」無四氣），此類藥物在計算寒熱指數時不納入四氣權重。</p>
        <p>2. <strong>五味疊加</strong>：一味藥可兼具多味（如桂枝辛甘），計算時每個味分別乘以該藥用量，因此五味百分比之和可能超過 100%。此為設計選擇，旨在忠實反映藥物的複合味性。</p>
        <p>3. <strong>用量換算為估算</strong>：升、合等容量單位換算為兩時，因不同藥材密度差異，存在誤差。本網站取統一近似值，重在方劑內各藥的相對比例而非絕對重量。</p>
        <p>4. <strong>炮製部分納入</strong>：炮製（炙、炮、去皮尖等）可改變藥物性味。本網站已就影響最大的兩味藥物進行炮製後的性味調整：</p>
        <p style={{ paddingLeft:16 }}>
          <strong>甘草（炙 vs 生）</strong>：宋本 112 首方劑中，有 69 方使用炙甘草，僅甘草湯、桔梗湯 2 方用生甘草。甘草經蜜炙後，性質由甘平轉為甘溫，功效從清熱解毒轉為補中益氣。本網站將炙甘草設為甘溫（四氣分數 +2），生甘草維持甘平（四氣分數 0），依宋本原文炮製標註自動區分。
        </p>
        <p style={{ paddingLeft:16 }}>
          <strong>附子（生用 vs 炮）</strong>：傷寒論中附子有「炮，去皮，破八片」與「生用，去皮，破八片」兩種用法。生附子回陽力猛、毒性較大，本網站設為辛、大溫（四氣分數 +3）；炮附子毒性降低、溫性和緩，維持辛溫（四氣分數 +2）。如四逆湯、通脈四逆湯、白通湯等 8 方用生附子，真武湯、附子湯等 12 方用炮附子，依宋本原文炮製標註自動區分。
        </p>
        <p style={{ paddingLeft:16 }}>
          <strong>尚未納入的炮製</strong>：厚朴（炙，去皮）、枳實（炙）、半夏（洗）等藥物亦有炮製標註，但炮製後性味變化相對較小或文獻依據不足，本網站暫未調整，仍為潛在誤差來源。
        </p>
        <p style={{ paddingLeft:16 }}>
          <strong>未來改進方向</strong>：若能整合宋《證類本草》中保存的《名醫別錄》性味增補及《雷公炮炙論》炮製記載，可進一步建立更完整的炮製修正體系。惟此二書原書已佚，僅存轉引內容，需審慎考證後方可採用。

function DetailPanel({ selected, compare, setCompare, isFav, onToggleFav, onAddCompare, onClose, filteredList, onNavigate, compareList, compareLimit = COMPARE_LIMIT }) {
  const [expandedHerb, setExpandedHerb] = useState(null);
  const [showQi, setShowQi] = useState(false);
  const qi = useMemo(() => new TcmQiEngine(selected), [selected]);
  const [compareNotice, setCompareNotice] = useState("");
  useEffect(() => {
    setCompareNotice("");
  }, [selected.n]);
  const currentIndex = filteredList ? filteredList.findIndex(f => f.n === selected.n) : -1;
  const hasPrev = filteredList && currentIndex > 0;
  const hasNext = filteredList && currentIndex >= 0 && currentIndex < filteredList.length - 1;
  const isInCompare = Array.isArray(compareList) && compareList.includes(selected.n);
  const compareIsFull = Array.isArray(compareList) && compareList.length >= compareLimit;
  const goPrev = () => { if (hasPrev) { setExpandedHerb(null); onNavigate(filteredList[currentIndex - 1]); } };
  const goNext = () => { if (hasNext) { setExpandedHerb(null); onNavigate(filteredList[currentIndex + 1]); } };
  const handleAddCompare = () => {
    if (!onAddCompare) return;
    const status = onAddCompare(selected.n);
    if (status === "added") setCompareNotice("已加入比較清單");
    else if (status === "exists") setCompareNotice("此方劑已在比較清單");
    else if (status === "full") setCompareNotice(`比較清單上限為 ${compareLimit} 首，請先移除一首`);
    else setCompareNotice("");
  };
  return (
    <div style={{
      flex:1, background:"#fff", borderRadius:12, padding:20, border:"1px solid #eee",
      alignSelf:"flex-start"
    }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={onClose} style={{
            background:"none", border:"none", cursor:"pointer", fontSize:14, color:"#888", padding:"4px 0"
          }}>← 返回列表</button>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {filteredList && currentIndex >= 0 && (
            <span style={{ fontSize:12, color:"#aaa" }}>{currentIndex + 1} / {filteredList.length}</span>
          )}
          <button onClick={goPrev} disabled={!hasPrev} style={{
            background:"none", border:"1px solid #ddd", borderRadius:6, cursor: hasPrev ? "pointer" : "default",
            fontSize:14, color: hasPrev ? "#555" : "#ccc", padding:"4px 10px", fontWeight:600
          }}>‹</button>
          <button onClick={goNext} disabled={!hasNext} style={{
            background:"none", border:"1px solid #ddd", borderRadius:6, cursor: hasNext ? "pointer" : "default",
            fontSize:14, color: hasNext ? "#555" : "#ccc", padding:"4px 10px", fontWeight:600
          }}>›</button>
        </div>
      </div>

      <div style={{ marginBottom:12 }}>
        <h2 style={{ margin:0, fontSize:22, fontFamily:"'Noto Serif TC', serif" }}>{selected.n}</h2>
        <div style={{ fontSize:13, color:"#888", marginTop:4 }}>{selected.c}</div>
      </div>

      {/* Action buttons */}
      <div style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center", flexWrap:"wrap" }}>
        <button onClick={() => onToggleFav && onToggleFav(selected.n)} style={{
          padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer", fontSize:12, fontWeight:600,
          background: isFav ? "#D4A017" : "#fff", color: isFav ? "#fff" : "#888"
        }}>{isFav ? "★ 已收藏" : "☆ 收藏"}</button>
        <button onClick={handleAddCompare} style={{
          padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer", fontSize:12, fontWeight:600,
          background: isInCompare ? "#ECF7EF" : "#fff",
          color: isInCompare ? "#2E7D32" : (compareIsFull ? "#B03A2E" : "#555"),
          borderColor: isInCompare ? "#A5D6A7" : (compareIsFull ? "#E6B0AA" : "#ddd")
        }}>{isInCompare ? "✓ 已在比較清單" : "+ 加入比較"}</button>
        <span style={{ fontSize:11, color:"#999" }}>比較清單 {Array.isArray(compareList) ? compareList.length : 0}/{compareLimit}</span>
      </div>
      {compareNotice && (
        <div style={{
          marginBottom:16, fontSize:12,
          color: compareNotice.includes("上限") ? "#C62828" : compareNotice.includes("已在") ? "#777" : "#2E7D32"
        }}>
          {compareNotice}
        </div>
      )}
      {!compareNotice && <div style={{ marginBottom:16 }} />}

      {/* Nature score */}
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <span style={{ fontSize:12, color:"#888" }}>寒熱指數</span>
          <span style={{ fontSize:14, fontWeight:700, color: TENDENCY_COLORS[selected.nt] }}>
            {selected.ns > 0 ? "+" : ""}{selected.ns} ({selected.nt})
          </span>
        </div>
        <NatureGauge score={selected.ns} />
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#aaa", marginTop:4 }}>
          <span>大寒</span><span>偏寒</span><span>平</span><span>偏溫</span><span>大溫</span>
        </div>
      </div>

      {/* Flavor radar */}
      <div style={{ marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
          <span style={{ fontSize:12, color:"#888" }}>五味分佈</span>
          <select value={compare ? compare.n : ""} onChange={e => {
            const f = DATA.find(d => d.n === e.target.value);
            setCompare(f || null);
          }} style={{ fontSize:11, padding:"2px 6px", borderRadius:4, border:"1px solid #ddd", color:"#555", background:"#fafafa" }}>
            <option value="">對比方劑...</option>
            {DATA.filter(d => d.n !== selected.n).map(d => (
              <option key={d.n} value={d.n}>{d.n}</option>
            ))}
          </select>
        </div>
        <div style={{ display:"flex", justifyContent:"center" }}>
          <RadarChart fp={selected.fp} fp2={compare ? compare.fp : null}
            label={selected.n} label2={compare ? compare.n : null} size={300} />
        </div>
      </div>

      {/* Nature groups */}
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:6 }}>四氣構成</div>
        <div style={{ display:"flex", gap:8 }}>
          {["寒涼","平","溫熱"].map(g => (
            <div key={g} style={{ flex:1, textAlign:"center", padding:"8px 0", borderRadius:8, background:"#f8f8f8" }}>
              <div style={{ fontSize:18, fontWeight:700, color: g==="寒涼"?"#3498DB":g==="溫熱"?"#E67E22":"#7F8C8D" }}>
                {selected.ng[g]}%
              </div>
              <div style={{ fontSize:11, color:"#888" }}>{g}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Formula original text */}
      {(selected.hl || selected.cm) && (
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:6 }}>組成與煎服法（原文）</div>
        <div style={{ padding:"12px 16px", borderRadius:8, background:"#faf8f5", border:"1px solid #e8e4df", fontSize:13, lineHeight:2, color:"#555" }}>
          {selected.hl && <p style={{ margin:"0 0 8px", fontWeight:600 }}>{selected.hl}</p>}
          {selected.cm && <p style={{ margin:0 }}>{selected.cm}</p>}
        </div>
      </div>
      )}

      {/* Herbs */}
      <div style={{ marginBottom:16 }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
          藥物組成（{selected.hd.length} 味，總 {selected.tw} 兩）
          <span style={{ fontSize:10, color:"#bbb", marginLeft:8 }}>點擊藥物查看本草經原文</span>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap" }}>
          {[...selected.hd].sort((a,b) => b.w - a.w).map((h,i) => (
            <HerbPill key={i} herb={h}
              expanded={expandedHerb === h.n}
              onToggle={() => setExpandedHerb(expandedHerb === h.n ? null : h.n)} />
          ))}
        </div>
      </div>

      {/* Clauses */}
      {selected.cl && selected.cl.length > 0 && (
      <div>
        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
          相關條文（{selected.cl.length} 條）
        </div>
        <div style={{ maxHeight:400, overflowY:"auto", borderRadius:8, border:"1px solid #eee" }}>
          {selected.cl.map((cl, i) => (
            <ClauseItem key={i} cl={cl} isLast={i === selected.cl.length-1} />
          ))}
        </div>
      </div>
      )}

      {/* ===== 氣化解析 ===== */}
      <div style={{ marginTop:20 }}>
        <button onClick={() => setShowQi(!showQi)} style={{
          width:"100%", padding:"10px 14px", borderRadius:8,
          border:"1px solid " + (showQi ? "#2c3e50" : "#ddd"),
          background: showQi ? "#2c3e50" : "#fff",
          color: showQi ? "#fff" : "#555",
          fontWeight:700, fontSize:13, cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"space-between",
          transition:"all 0.2s"
        }}>
          <span>🌊 氣化解析（阿銘醫師設計）</span>
          <span style={{ fontSize:11 }}>{showQi ? "▲ 收合" : "▼ 展開"}</span>
        </button>
        {showQi && (() => {
          let r;
          try { r = qi.render(); } catch(e) { console.error("Qi engine error:", e); return null; }
          const qiBox = {
            marginTop:12, padding:"14px 16px", borderRadius:10,
            background:"#faf8f5", border:"1px solid #e8e4df"
          };
          const qiRow = (label, val) => val ? (
            <div style={{ marginBottom:10 }}>
              <div style={{ fontSize:11, color:"#999", fontWeight:600, marginBottom:3 }}>{label}</div>
              <div style={{ fontSize:13, color:"#333", lineHeight:1.7 }}>{val}</div>
            </div>
          ) : null;
          return (
            <div style={qiBox}>
              {qiRow("能量背景", r.能量背景)}
              {r.空間向量 !== "【氣化平調】" && qiRow("空間向量", r.空間向量)}
              {qiRow("作用靶點", r.作用靶點)}
              {qiRow("病機解析", r.病機解析)}
              {qiRow("治療意圖", r.治療意圖)}
              <div style={{ marginTop:14, paddingTop:12, borderTop:"1px solid #e0dcd8", fontSize:12, color:"#888", lineHeight:1.7 }}>
                本分析由 TcmQiEngine 自動生成・僅供研究輔助
              </div>
              <div style={{
                marginTop:14, padding:"12px 14px", borderRadius:8,
                background:"#fef9f0", color:"#5c4a3a",
                fontSize:13, lineHeight:1.8
              }}>
                <div style={{ fontWeight:700, marginBottom:6, color:"#D4A017" }}>🌊 氣化總結</div>
                <div>{r.qiSummary}</div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

function ComparePage({ compareList, setCompareList }) {
  const EXTRA_COMPARE_GROUPS = [
    { title: "發汗方", desc: "解表發汗代表方", formulas: ["麻黃湯", "桂枝湯", "桂枝加葛根湯", "葛根湯", "大青龍湯", "小青龍湯"] },
    { title: "水氣方", desc: "利水化氣與治水代表方", formulas: ["五苓散", "真武湯", "茯苓桂枝白朮甘草湯", "豬苓湯"] },
    { title: "瀉下方", desc: "攻下通腑代表方", formulas: ["大承氣湯", "小承氣湯", "調胃承氣湯", "麻子仁丸", "蜜煎導"] },
    { title: "少陽和解", desc: "和解少陽代表方", formulas: ["小柴胡湯", "大柴胡湯", "柴胡桂枝湯", "柴胡加龍骨牡蠣湯"] },
    { title: "溫中補虛", desc: "溫中散寒、補虛調中", formulas: ["小建中湯", "理中丸", "吳茱萸湯"] },
    { title: "清氣分熱", desc: "清陽明氣分熱", formulas: ["白虎湯", "白虎加人參湯"] },
  ];
  const compareGroupOptions = [...COMPARE_GROUPS, ...EXTRA_COMPARE_GROUPS];
  const items = compareList.map(n => DATA.find(d => d.n === n)).filter(Boolean);
  const allHerbs = {};
  items.forEach(fm => fm.hd.forEach(h => { if (!allHerbs[h.n]) allHerbs[h.n] = {}; allHerbs[h.n][fm.n] = h; }));
  const herbNames = Object.keys(allHerbs);
  const shared = herbNames.filter(h => items.every(fm => fm.hd.some(x => x.n === h)));
  const unique = {};
  items.forEach(fm => { unique[fm.n] = fm.hd.filter(h => !shared.includes(h.n)).map(h => h.n); });
  const formatNum = (v) => {
    const n = Math.round(v * 10) / 10;
    return `${n}`.replace(/\.0$/, "");
  };
  const toNum = (v) => {
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  };
  const buildFlavorSummary = (base, target) => {
    const basePf = base.pf || Object.keys(base.fp || {}).reduce((a,b) => (base.fp[b]||0) > (base.fp[a]||0) ? b : a, "甘");
    const targetPf = target.pf || Object.keys(target.fp || {}).reduce((a,b) => (target.fp[b]||0) > (target.fp[a]||0) ? b : a, "甘");
    const dominantChanged = basePf !== targetPf
      ? `主味由${targetPf}取代${basePf}`
      : `主味維持${basePf}`;
    const deltas = FLAVORS
      .map((f) => ({ f, diff: toNum(target.fp[f]) - toNum(base.fp[f]) }))
      .filter((x) => Math.abs(x.diff) >= 3)
      .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))
      .slice(0, 2)
      .map((x) => `${x.f}${x.diff > 0 ? "↑" : "↓"}${formatNum(Math.abs(x.diff))}%`);
    if (deltas.length === 0) return `${dominantChanged}，五味比例接近`;
    return `${dominantChanged}，${deltas.join("、")}`;
  };
  // 整合 TcmQiEngine 病機分析到比較摘要
  const getEngineLabel = (fm) => {
    try {
    const v = (fm && fm.fp) || {};
    const ns = (fm && fm.ns) || 0;
    const hd = (fm && fm.hd) || [];
    const organs = [...new Set((hd || []).flatMap(h => (h && h.jg) || []))];
    const 辛=v.get('辛',0), 酸=v.get('酸',0), 苦=v.get('苦',0), 甘=v.get('甘',0), 鹹=v.get('鹹',0);
    if (v.get('酸',0) >= 50 && 辛 >= 15 && 苦 >= 10) return ["厥陰寒熱錯雜","極致內斂","P1"];
    if (hd.some(h=>h.n==='附子') && organs.includes('腎') && ns >= 0.3) return ["少陰陽衰","溫陽蒸騰","P0.5"];
    if (甘 > 30 && organs.includes('心') && organs.includes('腎') && Math.abs(ns) < 0.5) return ["陰血虧損","內斂滋濡","P2"];
    if (苦 >= 15 && 鹹 >= 10 && organs.includes('大腸')) return ["熱結實邪","向心沉降","P3"];
    const hasSurface = hd.some(h => ["麻黃","桂枝","生薑","葛根","細辛"].includes(h.n));
    if (辛 >= 20 && 甘 >= 30 && !hasSurface) return ["陽氣虛衰","溫煦內斂","P3.5"];
    if (苦 >= 15 && 辛 >= 15 && organs.includes('脾')) {
      if (organs.includes('膽')) return ["少陽樞紐不利","樞紐旋轉","P4"];
      const hb = hd.some(h => ["黃連","黃芩"].includes(h.n));
      const ha = hd.some(h => ["乾薑","生薑","半夏"].includes(h.n));
      if (hb && ha) return ["中焦氣機痞塞","中道旋轉","P4"];
    }
    if (辛 >= 20 && (酸 + 苦*0.5) >= 辛*0.3) return ["營衛不和","解肌舒脈","P5"];
    if (辛 >= 20) return ["衛閉營鬱","強力發散","P5"];
    return ["氣化平調", 苦 > 辛 ? "向心沉降" : "氣化平調","P5"];
    } catch(e) { return ["氣化平調","氣化平調","P5"]; }
  };

  const buildDeltaSummary = (base, target) => {
    const baseMap = Object.fromEntries(base.hd.map(h => [h.n, toNum(h.w)]));
    const targetMap = Object.fromEntries(target.hd.map(h => [h.n, toNum(h.w)]));
    const added = target.hd.filter(h => !(h.n in baseMap)).map(h => h.n);
    const removed = base.hd.filter(h => !(h.n in targetMap)).map(h => h.n);
    const adjusted = target.hd
      .filter(h => h.n in baseMap)
      .map(h => ({ name: h.n, diff: toNum(h.w) - baseMap[h.n] }))
      .filter(x => Math.abs(x.diff) >= 0.5)
      .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff))
      .map(x => `${x.name}${x.diff > 0 ? "增" : "減"}${formatNum(Math.abs(x.diff))}兩`);

    const baseEngine = getEngineLabel(base);
    const targetEngine = getEngineLabel(target);
    const baseVec = baseEngine[1];
    const targetVec = targetEngine[1];
    const basePath = baseEngine[0];
    const targetPath = targetEngine[0];

    const nsDiff = target.ns - base.ns;
    const getNsWord = (n) => n > 0.5 ? "偏溫" : n < -0.5 ? "偏寒" : "寒熱接近";

    // 組成的變化描述
    let herbChange = "";
    if (added.length && removed.length) {
      herbChange = `增 ${added.slice(0,2).join("、")}，去 ${removed.slice(0,2).join("、")}`;
    } else if (added.length) {
      herbChange = `增 ${added.slice(0,2).join("、")}`;
    } else if (removed.length) {
      herbChange = `去 ${removed.slice(0,2).join("、")}`;
    } else if (adjusted.length) {
      herbChange = `調整 ${adjusted.slice(0,2).join("、")}`;
    } else {
      herbChange = "組成不變";
    }

    // 分組變化報告
    const flavorDeltas = FLAVORS
      .map(f => ({ f, diff: toNum(target.fp[f]) - toNum(base.fp[f]) }))
      .filter(x => Math.abs(x.diff) >= 2)
      .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
    const doseAdjusted = target.hd
      .filter(h => h.n in baseMap)
      .map(h => ({ n: h.n, diff: toNum(h.w) - baseMap[h.n], baseW: baseMap[h.n], targetW: toNum(h.w) }))
      .filter(x => Math.abs(x.diff) >= 0.3)
      .sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));

    return {
      targetName: target.n,
      baseName: base.n,
      baseLabel: `${base.n}（${basePath}）`,
      targetLabel: `${target.n}（${targetPath}）`,
      baseVec: baseVec,
      targetVec: targetVec,
      vectorSame: baseVec === targetVec,
      baseNs: getNsWord(base.ns),
      targetNs: getNsWord(target.ns),
      nsDiff: nsDiff,
      nsAbs: Math.abs(nsDiff),
      nsDirChanged: getNsWord(base.ns) !== getNsWord(target.ns),
      flavorDeltas: flavorDeltas,
      added: added,
      removed: removed,
      doseAdjusted: doseAdjusted,
      doseUnchanged: target.hd
        .filter(h => h.n in baseMap)
        .map(h => h.n),
    };
  };
  const comparisonSummary = items.length > 1 ? items.slice(1).map(target => buildDeltaSummary(items[0], target)) : [];

  return (
    <div style={{ padding:"20px 24px", maxWidth:960, margin:"0 auto" }}>
      {/* Preset groups */}
      <div style={{ marginBottom:20 }}>
        <div style={{ fontSize:13, color:"#888", marginBottom:8 }}>預設比較組</div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          {compareGroupOptions.map((g,i) => (
            <button key={i} onClick={() => setCompareList(g.formulas)}
              style={{ padding:"6px 14px", borderRadius:8, border:"1px solid #ddd", background:"#fff",
                fontSize:12, cursor:"pointer", textAlign:"left", lineHeight:1.4 }}>
              <span style={{ fontWeight:600 }}>{g.title}</span>
              <br/><span style={{ color:"#999", fontSize:10 }}>{g.formulas.length}方</span>
            </button>
          ))}
        </div>
      </div>

      {items.length === 0 ? (
        <div style={{ background:"#fff", borderRadius:12, padding:40, border:"1px solid #eee", textAlign:"center", color:"#aaa" }}>
          <p style={{ fontSize:16, marginBottom:12 }}>選擇要比較的方劑</p>
          <p style={{ fontSize:13 }}>從上方預設組選取，或在「方劑分析」頁點擊方劑詳情中的「加入比較」按鈕</p>
        </div>
      ) : (
        <div>
          {/* Selected pills */}
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:16 }}>
            {items.map(fm => (
              <span key={fm.n} style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"4px 12px",
                borderRadius:20, background:"#2c3e50", color:"#fff", fontSize:13, fontWeight:600 }}>
                {fm.n}
                <span onClick={() => setCompareList(compareList.filter(n => n !== fm.n))}
                  style={{ cursor:"pointer", opacity:0.6, fontSize:11 }}>✕</span>
              </span>
            ))}
            <button onClick={() => setCompareList([])} style={{ padding:"4px 12px", borderRadius:20,
              border:"1px solid #ddd", background:"#fff", fontSize:12, cursor:"pointer", color:"#888" }}>清空</button>
          </div>

          {/* Radar overlay */}
          <div style={{ background:"#fff", borderRadius:12, padding:20, border:"1px solid #eee", marginBottom:16 }}>
            <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>五味分佈疊合</div>
            <svg
              viewBox={`0 0 340 ${Math.max(320, 264 + (Math.max(1, Math.ceil(items.length / 3)) - 1) * 20 + 32)}`}
              style={{ width:"100%", maxWidth:400, display:"block", margin:"0 auto" }}
            >
              {(() => {
                const cx=170,cy=140,R=100;
                const angles = FLAVORS.map((_,i) => Math.PI/2 + 2*Math.PI*i/5);
                const toXY = (a,r) => [cx+r*Math.cos(a), cy-r*Math.sin(a)];
                const colors = ["#C94435","#2E86C1","#27AE60","#8E44AD","#F39C12","#16A085","#7D3C98","#2C3E50"];
                const levels = [20,40,60,80,100];
                const legendCols = 3;
                const legendColWidth = 108;
                const legendStartY = 264;
                const legendRowHeight = 20;
                return (
                  <g>
                    {levels.map(l => <polygon key={l} points={angles.map(a => toXY(a,R*l/100).join(",")).join(" ")} fill="none" stroke="#eee" strokeWidth={0.5} />)}
                    {angles.map((a,i) => <line key={i} x1={cx} y1={cy} x2={toXY(a,R)[0]} y2={toXY(a,R)[1]} stroke="#eee" strokeWidth={0.5} />)}
                    {items.map((fm,fi) => {
                      const pts = FLAVORS.map((f,i) => toXY(angles[i], (fm.fp[f]||0)/100*R));
                      return <polygon key={fi} points={pts.map(p=>p.join(",")).join(" ")} fill={colors[fi%8]} fillOpacity={0.12} stroke={colors[fi%8]} strokeWidth={2} />;
                    })}
                    {FLAVORS.map((f,i) => {
                      const [lx,ly] = toXY(angles[i], R+24);

function QuizPage({ favs }) {
  const browserStorage = createBrowserStorageAdapter(window.localStorage);
  const wrongBookStore = createWrongBookStore(browserStorage);
  const [mode, setMode] = useState(null);
  const [scope, setScope] = useState("all");
  const [q, setQ] = useState(null);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState({ total:0, correct:0 });
  const [history, setHistory] = useState([]);
  const [questionCount, setQuestionCount] = useState(10);
  const [quizStarted, setQuizStarted] = useState(false);
  const [quizFinished, setQuizFinished] = useState(false);
  const [reviewWrongOnly, setReviewWrongOnly] = useState(false);
  const [reviewTotal, setReviewTotal] = useState(0);
  const [wrongBook, setWrongBook] = useState(() => wrongBookStore.load());

  const pool = useMemo(() => {
    if (scope === "fav") return DATA.filter(d => favs.includes(d.n));
    if (scope !== "all") return DATA.filter(d => d.c === scope);
    return DATA;
  }, [scope, favs]);

  const saveWrongBook = (next) => {
    setWrongBook(next);
    try { wrongBookStore.save(next); } catch(e) {}
  };
  const resetQuizState = () => {
    setQ(null);
    setChosen(null);
    setScore({total:0,correct:0});
    setHistory([]);
    setQuizStarted(false);
    setQuizFinished(false);
    setReviewTotal(0);
  };
  const reviewPool = useMemo(() => {
    if (!reviewWrongOnly) return [];
    return wrongBook;
  }, [reviewWrongOnly, wrongBook]);

  const genQuestion = () => {
    if (quizFinished || score.total >= questionCount) {
      setQuizFinished(true);
      setQ(null);
      return;
    }
    if (reviewWrongOnly) {
      if (reviewPool.length === 0) {
        if (!quizStarted) alert("目前沒有錯題可複習");
        else setQuizFinished(true);
        setQ(null);
        return;
      }
      setQuizStarted(true);
      if (!quizStarted) setReviewTotal(reviewPool.length);
      setChosen(null);
      const reviewQ = reviewPool[Math.floor(Math.random() * reviewPool.length)];
      setQ({ ...reviewQ, review: true });
      return;
    }
    if (pool.length < 4) { alert("方劑數量不足，請擴大範圍"); return; }
    setQuizStarted(true);
    setChosen(null);
    const nextQuestion = createQuizQuestion({ data: DATA, mode, scope, favorites: favs });
    if (nextQuestion.error) { alert(nextQuestion.error); return; }
    setQ(nextQuestion);
  };

  const handleAnswer = (idx) => {
    if (chosen !== null) return;
    setChosen(idx);
    const isCorrect = idx === q.answer;
    const wrongEntry = buildWrongEntry(q);
    setScore(s => {
      const next = { total: s.total + 1, correct: s.correct + (isCorrect ? 1 : 0) };
      if (next.total >= questionCount) setQuizFinished(true);
      return next;
    });
    setHistory(h => [...h, { q: q.question.slice(0, 30), correct: isCorrect, formula: q.formulaName }]);
    if (isCorrect) {
      if (q.review) saveWrongBook(wrongBook.filter(item => item.key !== q.key));
    } else {
      if (!wrongBook.some(item => item.key === wrongEntry.key)) {
        saveWrongBook([...wrongBook, wrongEntry]);
      }
    }
  };

  if (!mode && !reviewWrongOnly) return (

          ["random","隨機題型","每題隨機抽一種測驗方式","綜合"],

      </div>
      {wrongBook.length > 0 && !reviewWrongOnly && (
        <div style={{ marginTop:12 }}>

          <button onClick={resetQuizState}
            style={{

              background:"#2c3e50", color:"#fff", fontSize:14, fontWeight:600
            }}>重新測驗</button>
        </div>
      ) : (
        <div>
          {/* Question */}
          <div style={{ background:"#fff", borderRadius:12, padding:24, border:"1px solid #eee", marginBottom:16 }}>
            <div style={{ fontSize:15, lineHeight:1.8, whiteSpace:"pre-wrap" }}>{q.question}</div>
          </div>

          {/* Options */}
          <div style={{ display:"grid", gap:10, marginBottom:16 }}>

                  transition:"all 0.15s"
                }}>
                  <span style={{ fontWeight:600, marginRight:8, color:"#aaa" }}>{String.fromCharCode(65+i)}.</span>

                </div>
              );
            })}

          {chosen !== null && (
            <div style={{ textAlign:"center", marginBottom:16 }}>
              <div style={{ fontSize:20, marginBottom:12 }}>

              {!reviewWrongOnly && chosen !== q.answer && (
                <div style={{ fontSize:12, color:"#C62828", marginBottom:12 }}>

                </div>

              {reviewWrongOnly && chosen === q.answer && (
                <div style={{ fontSize:12, color:"#2E7D32", marginBottom:12 }}>

              )}

                padding:"10px 30px", borderRadius:8, border:"none", cursor:"pointer",

            </div>
          )}

          {/* History */}
          {history.length > 0 && (
            <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginTop:16 }}>
              <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>作答紀錄</div>
              {history.slice(-10).reverse().map((h,i) => (
                <div key={i} style={{ fontSize:12, padding:"4px 0", color: h.correct ? "#4CAF50" : "#E53935" }}>
                  {h.correct ? "✓" : "✗"} {h.formula} — {h.q}...
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  ["發熱","惡寒","惡風","頭痛","汗出","無汗","項強"],
  ["嘔","下利","不大便","腹痛","腹滿","心下痞"],

];

function findSynonyms(term) {
  const t = (term || "").trim();
  if (!t) return [];
  const set = new Set([t]);
  SYMPTOM_SYNONYMS.forEach(g => {
    if (g.some(w => w === t || t.indexOf(w) >= 0 || w.indexOf(t) >= 0)) {
      g.forEach(w => set.add(w));
    }
  });
  return Array.from(set);
}

function parseSymptomTokens(s) {
  return (s || "").split(/[\s,，、;；]+/g).map(x => x.trim()).filter(Boolean);
}

function renderHighlight(text, terms) {
  if (!text || !terms || terms.length === 0) return text;
  const sorted = [...terms].filter(Boolean).sort((a,b) => b.length - a.length);
  let parts = [{ text, mark: false }];
  sorted.forEach(term => {
    const next = [];
    parts.forEach(p => {
      if (p.mark) { next.push(p); return; }
      const segs = p.text.split(term);
      for (let k = 0; k < segs.length; k++) {
        if (segs[k]) next.push({ text: segs[k], mark: false });
        if (k < segs.length - 1) next.push({ text: term, mark: true });
      }
    });
    parts = next;
  });
  return parts.map((p, i) => p.mark
    ? <mark key={i} style={{ background:"#FFE082", color:"#BF360C", padding:"0 2px", borderRadius:2, fontWeight:700 }}>{p.text}</mark>
    : <React.Fragment key={i}>{p.text}</React.Fragment>
  );
}

function SymptomSearchPage({ setPage, setSelected }) {
  const [query, setQuery] = useState("");
  const [mode, setMode] = useState("AND");
  const [submitted, setSubmitted] = useState("");
  const [submittedMode, setSubmittedMode] = useState("AND");
  const [showVariant, setShowVariant] = useState({});

  const addTerm = (t) => {
    const current = parseSymptomTokens(query);
    if (current.indexOf(t) >= 0) return;
    setQuery([...current, t].join(" "));
  };

  const doSearch = () => {
    setSubmitted(query.trim());
    setSubmittedMode(mode);
    setShowVariant({});
  };

  const clearAll = () => {
    setQuery("");
    setSubmitted("");
    setShowVariant({});
  };

  const onKey = (e) => { if (e.key === "Enter") doSearch(); };

  const tokens = parseSymptomTokens(submitted);
  const expandedPerToken = tokens.map(t => findSynonyms(t));
  const allExpansions = Array.from(new Set(expandedPerToken.flat()));

  const results = useMemo(() => {
    if (tokens.length === 0) return [];
    const seen = new Map();
    DATA.forEach(fm => {
      (fm.cl || []).forEach(cl => {
        const text = cl.t || "";
        const matchedTokenSet = new Set();
        const matchedTermSet = new Set();
        tokens.forEach((tk, idx) => {
          expandedPerToken[idx].forEach(syn => {
            if (text.indexOf(syn) >= 0) {
              matchedTokenSet.add(tk);
              matchedTermSet.add(syn);
            }
          });
        });
        if (matchedTokenSet.size === 0) return;
        if (submittedMode === "AND" && matchedTokenSet.size < tokens.length) return;
        const key = String(cl.num);
        if (!seen.has(key)) {
          seen.set(key, {
            num: cl.num,
            text: cl.t,
            diffs: cl.d || [],
            formulas: [fm.n],
            matchedTokens: Array.from(matchedTokenSet),
            matchedTerms: Array.from(matchedTermSet),
          });
        } else {
          const existing = seen.get(key);
          if (existing.formulas.indexOf(fm.n) < 0) existing.formulas.push(fm.n);
          matchedTokenSet.forEach(t => { if (existing.matchedTokens.indexOf(t) < 0) existing.matchedTokens.push(t); });
          matchedTermSet.forEach(t => { if (existing.matchedTerms.indexOf(t) < 0) existing.matchedTerms.push(t); });
        }
      });
    });
    const arr = Array.from(seen.values());
    arr.sort((a,b) => {
      if (b.matchedTokens.length !== a.matchedTokens.length) return b.matchedTokens.length - a.matchedTokens.length;
      return (a.num||0) - (b.num||0);
    });
    return arr;
  }, [submitted, submittedMode]);

  const formulaHitCount = useMemo(() => {
    const map = {};
    results.forEach(r => { r.formulas.forEach(f => { map[f] = (map[f]||0)+1; }); });
    return Object.entries(map).sort((a,b) => b[1]-a[1]);
  }, [results]);

  const jumpToFormula = (name) => {
    const fm = DATA.find(d => d.n === name);
    if (!fm) return;
    setSelected(fm);
    setPage("analysis");
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  const totalClauses = DATA.reduce((s,d)=>s+((d.cl&&d.cl.length)||0),0);

  return (
    <div style={{ padding:"20px 24px", maxWidth:960, margin:"0 auto" }}>
      <div style={{ background:"#fff", borderRadius:12, padding:20, border:"1px solid #eee", marginBottom:16 }}>
        <div style={{ fontSize:17, fontWeight:700, color:"#1a1a2e", marginBottom:4, fontFamily:"'Noto Serif TC',serif" }}>症候檢索</div>
        <div style={{ fontSize:12, color:"#888", marginBottom:14, lineHeight:1.8 }}>
          輸入一個或多個症狀（以空格、逗號或頓號分隔），系統以「關鍵字模糊比對 + 同義詞表」擴充，回傳傷寒論條文與對應方劑。同義詞表含 {SYMPTOM_SYNONYMS.length} 組常見症候群組（如「惡寒 / 嗇嗇惡寒 / 振寒」視為同義）。
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
          <input value={query} onChange={e => setQuery(e.target.value)} onKeyDown={onKey}
            placeholder="例如：頭痛 發熱 惡寒"
            style={{ flex:1, minWidth:220, padding:"10px 14px", borderRadius:8, border:"1px solid #ddd", fontSize:14, outline:"none" }} />
          <div style={{ display:"flex", border:"1px solid #ddd", borderRadius:8, overflow:"hidden" }}>
            <button onClick={()=>setMode("AND")} style={{ padding:"8px 14px", border:"none", cursor:"pointer", background: mode==="AND" ? "#2c3e50" : "#fff", color: mode==="AND" ? "#fff" : "#666", fontSize:13, fontWeight:600 }}>AND 交集</button>
            <button onClick={()=>setMode("OR")} style={{ padding:"8px 14px", border:"none", cursor:"pointer", borderLeft:"1px solid #ddd", background: mode==="OR" ? "#2c3e50" : "#fff", color: mode==="OR" ? "#fff" : "#666", fontSize:13, fontWeight:600 }}>OR 聯集</button>
          </div>
          <button onClick={doSearch} style={{ padding:"10px 22px", borderRadius:8, border:"none", cursor:"pointer", background:"#D4A017", color:"#fff", fontSize:14, fontWeight:700, letterSpacing:2 }}>搜尋</button>
          {query && (<button onClick={clearAll} style={{ padding:"10px 14px", borderRadius:8, border:"1px solid #ddd", cursor:"pointer", background:"#fff", color:"#888", fontSize:13 }}>清除</button>)}
        </div>
        <div style={{ fontSize:11, color:"#999", marginBottom:6 }}>常用症狀（點擊加入）：</div>
        {SYMPTOM_PRESETS.map((row, ri) => (
          <div key={ri} style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:6 }}>
            {row.map(s => (
              <button key={s} onClick={()=>addTerm(s)} style={{ padding:"4px 12px", borderRadius:16, border:"1px solid #e0ddd8", cursor:"pointer", fontSize:12, background:"#FAF8F4", color:"#555" }}>+ {s}</button>
            ))}
          </div>
        ))}
      </div>

      {submitted && tokens.length > 0 && (
        <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginBottom:16 }}>
          <div style={{ fontSize:13, color:"#555", marginBottom:8 }}>
            <span style={{ fontWeight:700, marginRight:6 }}>查詢症狀：</span>
            {tokens.map((t, i) => (<span key={i} style={{ display:"inline-block", padding:"3px 12px", borderRadius:14, background:"#2c3e50", color:"#fff", marginRight:6, fontSize:12, fontWeight:600 }}>{t}</span>))}
            <span style={{ color:"#999", marginLeft:6, fontSize:11 }}>（{submittedMode==="AND" ? "AND 交集" : "OR 聯集"}）</span>
          </div>
          <div style={{ fontSize:11, color:"#999", lineHeight:1.8, marginTop:6 }}>
            同義詞擴充共 <b>{allExpansions.length}</b> 比對詞：
            {allExpansions.slice(0,40).map((e,i)=>(<span key={i} style={{ color:"#777", marginRight:6 }}>{e}</span>))}
            {allExpansions.length > 40 ? " ... 等" : ""}
          </div>
          <div style={{ fontSize:13, color:"#666", marginTop:12 }}>
            命中條文 <b style={{ color:"#C94435", fontSize:15 }}>{results.length}</b> 條，涉及 <b style={{ color:"#1a1a2e" }}>{formulaHitCount.length}</b> 首方劑
          </div>
          {formulaHitCount.length > 0 && (
            <div style={{ marginTop:10 }}>
              <div style={{ fontSize:11, color:"#999", marginBottom:6 }}>高頻對應方劑（點擊跳至分析頁）：</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {formulaHitCount.slice(0,30).map(([name,count]) => (
                  <button key={name} onClick={()=>jumpToFormula(name)} style={{ padding:"4px 12px", borderRadius:14, border:"1px solid #D4A017", cursor:"pointer", fontSize:12, background:"#fff", color:"#8C6D10", fontWeight:600 }}>{name} <span style={{ opacity:0.6 }}>· {count}</span></button>
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {submitted && tokens.length > 0 && results.length === 0 && (
        <div style={{ background:"#fff", borderRadius:12, padding:40, textAlign:"center", color:"#999", border:"1px solid #eee", fontSize:13, lineHeight:1.8 }}>
          查無符合條件的條文。{submittedMode==="AND" ? "可嘗試切換為 OR 聯集檢索，或減少症狀數。" : "請重新確認關鍵字，或嘗試同義詞（如「惡寒」改「畏寒」）。"}
        </div>
      )}

      {results.map((r, idx) => (
        <div key={idx} style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:8 }}>
            <span style={{ display:"inline-block", fontSize:11, fontWeight:700, color:"#fff", background:"#1a1a2e", borderRadius:4, padding:"2px 10px", fontFamily:"monospace" }}>#{r.num}</span>
            <span style={{ fontSize:11, color: r.matchedTokens.length === tokens.length ? "#2E7D32" : "#F57C00", fontWeight:600 }}>命中 {r.matchedTokens.length}/{tokens.length} 症狀</span>
            <span style={{ fontSize:10, color:"#999" }}>· 命中詞：{r.matchedTerms.slice(0,6).join("、")}{r.matchedTerms.length>6?"...":""}</span>
            {r.diffs.length > 0 && (
              <span onClick={()=>setShowVariant(v=>({...v, [r.num]: !v[r.num]}))} style={{ fontSize:10, color:"#C94435", cursor:"pointer", fontWeight:600, padding:"2px 8px", borderRadius:3, border:"1px solid #C94435", marginLeft:"auto" }}>{showVariant[r.num] ? "收合異文" : `異文 ${r.diffs.length}`}</span>
            )}
          </div>
          <div style={{ fontSize:14, lineHeight:2.0, color:"#333", marginBottom:10, fontFamily:"'Noto Serif TC',serif" }}>
            {renderHighlight(r.text, r.matchedTerms)}
          </div>
          {showVariant[r.num] && r.diffs.length > 0 && (
            <div style={{ margin:"6px 0 12px 0", paddingLeft:10, borderLeft:"2px solid #e0ddd8" }}>
              {r.diffs.map((d, j) => (
                <div key={j} style={{ fontSize:12, lineHeight:1.9, color:"#666", marginBottom:6 }}>
                  <span style={{ display:"inline-block", fontSize:9, fontWeight:700, color: d.v === "桂" ? "#2E86C1" : "#E67E22", background: d.v === "桂" ? "#EBF5FB" : "#FEF5E7", borderRadius:3, padding:"1px 6px", marginRight:6 }}>{d.v === "桂" ? "桂林古本" : "康治本"}</span>
                  {renderHighlight(d.t, r.matchedTerms)}
                </div>
              ))}
            </div>
          )}
          <div style={{ fontSize:12, color:"#888", borderTop:"1px dashed #eee", paddingTop:8, display:"flex", flexWrap:"wrap", alignItems:"center", gap:4 }}>
            <span>對應方劑：</span>
            {r.formulas.map((f) => (
              <button key={f} onClick={()=>jumpToFormula(f)} style={{ background:"#F7F5F2", border:"1px solid #D4A017", cursor:"pointer", color:"#8C6D10", fontSize:12, fontWeight:700, padding:"2px 10px", borderRadius:12 }}>{f} →</button>
            ))}
          </div>
        </div>
      ))}

      {!submitted && (
        <div style={{ background:"#fff", borderRadius:12, padding:32, textAlign:"center", color:"#aaa", border:"1px solid #eee", lineHeight:1.9 }}>
          <div style={{ fontSize:14, marginBottom:8, color:"#666" }}>請於上方輸入症狀進行查詢</div>
          <div style={{ fontSize:11 }}>支援：頭痛、發熱、惡寒、汗出、下利、脈浮 等。多症狀以空格、逗號或頓號分隔。</div>
        </div>
      )}

      <div style={{ fontSize:10, color:"#bbb", textAlign:"center", padding:"16px 0", lineHeight:1.8 }}>
        症候檢索以宋本條文（共 {totalClauses} 筆條文－方劑對應，{DATA.length} 首方劑）為比對範圍。同義詞表為概要擴充，僅供研究輔助，不作臨床診斷依據。
      </div>
    </div>
  );
}


function App() {
  const browserStorage = createBrowserStorageAdapter(window.localStorage);
  const favoritesStore = createFavoritesStore(browserStorage);
  const [cat, setCat] = useState("全部");
  const [tend, setTend] = useState("全部");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [compare, setCompare] = useState(null);
  const [view, setView] = useState("list");
  const [page, setPage] = useState("analysis");
  const [favs, setFavs] = useState(() => favoritesStore.load());
  const [compareList, setCompareList] = useState([]);
  const [showFavOnly, setShowFavOnly] = useState(false);

  const toggleFav = (name) => {
    setFavs(prev => {
      const next = prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name];
      try { favoritesStore.save(next); } catch(e) {}
      return next;
    });
  };

  const addToCompare = (name) => {
    let result = "added";
    setCompareList(prev => {
      if (prev.includes(name)) {
        result = "exists";
        return prev;
      }
      if (prev.length >= COMPARE_LIMIT) {
        result = "full";
        return prev;
      }
      return [...prev, name];
    });
    return result;
  };

  const filtered = useMemo(() => {
    return DATA.filter(d => {
      if (cat !== "全部" && d.c !== cat) return false;
      if (tend !== "全部" && d.nt !== tend) return false;
      if (showFavOnly && !favs.includes(d.n)) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!d.n.includes(q) && !d.hd.some(h => h.n.includes(q))) return false;
      }
      return true;
    });
  }, [cat, tend, search, showFavOnly, favs]);

  return (
    <div style={{ fontFamily:"'Noto Sans TC', 'Hiragino Sans', sans-serif", background:"#F7F5F2", minHeight:"100vh" }}>
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", color:"#fff", padding:"32px 24px 24px" }}>
        <h1 style={{ margin:0, fontSize:26, fontWeight:800, fontFamily:"'Noto Serif TC', serif", letterSpacing:2 }}>
          傷寒方析｜傷寒論方劑・症候研究平台
        </h1>
        <p style={{ margin:"8px 0 0", fontSize:13, opacity:0.65, lineHeight:1.8 }}>
          以趙開美翻刻宋本《傷寒論》{DATA.length} 首方劑為底本，結合《神農本草經》五味四氣數據，對方劑進行性味結構量化分析。網站整合五大工具：方劑分析（性味量化與氣機推導）、症候檢索（由症狀反查條文與對應方劑）、方劑比較（多方性味與組成對照）、方劑測驗（含錯題複習）、藥物資料庫；條文支援宋本、桂林古本、康治本三版本異文比較。
        </p>
        <div style={{ display:"flex", gap:4, marginTop:16, flexWrap:"wrap" }}>
          {[["analysis","方劑分析"],["symptom","症候檢索"],["compare","方劑比較"],["quiz","方劑測驗"],["herb","藥物資料庫"],["about","網站說明"],["author","關於作者"]].map(([k,label]) => (
            <button key={k} onClick={() => setPage(k)} style={{
              padding:"8px 20px", borderRadius:"8px 8px 0 0", border:"none", cursor:"pointer",
              fontSize:14, fontWeight:600, letterSpacing:1,
              background: page===k ? "#F7F5F2" : "rgba(255,255,255,0.12)",
              color: page===k ? "#1a1a2e" : "rgba(255,255,255,0.7)",
              transition:"all 0.2s"
            }}>{label}</button>
          ))}
        </div>
      </div>

      {page === "herb" ? <HerbDBPage /> : page === "about" ? <AboutPage /> : page === "author" ? <AuthorPage /> : page === "compare" ? <ComparePage compareList={compareList} setCompareList={setCompareList} /> : page === "quiz" ? <QuizPage favs={favs} /> : page === "symptom" ? <SymptomSearchPage setPage={setPage} setSelected={setSelected} /> : (
      <div style={{ padding:"20px 24px", maxWidth:960, margin:"0 auto" }}>
        <OverviewStats data={filtered} />

        {/* Filters */}
        <div style={{ background:"#fff", borderRadius:12, padding:16, marginBottom:16, border:"1px solid #eee" }}>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"center", marginBottom:12 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋方劑或藥物..."
              style={{ flex:1, minWidth:180, padding:"8px 14px", borderRadius:8, border:"1px solid #ddd", fontSize:14, outline:"none" }} />
            <button onClick={() => setShowFavOnly(!showFavOnly)} style={{
              padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer",
              background: showFavOnly ? "#D4A017" : "#fff", color: showFavOnly ? "#fff" : "#888", fontSize:13, fontWeight:600
            }}>{showFavOnly ? `★ ${favs.length}` : "★ 收藏"}</button>
            <div style={{ display:"flex", gap:4 }}>
              <button onClick={() => setView("list")} style={{
                padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer",
                background: view==="list" ? "#2c3e50" : "#fff", color: view==="list" ? "#fff" : "#333", fontSize:13, fontWeight:600
              }}>列表</button>
              <button onClick={() => setView("scatter")} style={{
                padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer",
                background: view==="scatter" ? "#2c3e50" : "#fff", color: view==="scatter" ? "#fff" : "#333", fontSize:13, fontWeight:600
              }}>散佈圖</button>
            </div>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
            <span style={{ fontSize:12, color:"#888", lineHeight:"28px" }}>六經：</span>
            {CATEGORIES.map(c => (
              <button key={c} onClick={() => setCat(c)} style={{
                padding:"4px 12px", borderRadius:16, border:"1px solid #ddd", cursor:"pointer", fontSize:12,
                background: cat===c ? "#2c3e50" : "#fff", color: cat===c ? "#fff" : "#555", fontWeight: cat===c ? 600 : 400
              }}>{c}</button>
            ))}
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <span style={{ fontSize:12, color:"#888", lineHeight:"28px" }}>偏性：</span>
            {TENDENCIES.map(t => (
              <button key={t} onClick={() => setTend(t)} style={{
                padding:"4px 12px", borderRadius:16, border:"1px solid #ddd", cursor:"pointer", fontSize:12,
                background: tend===t ? (TENDENCY_COLORS[t]||"#2c3e50") : "#fff",
                color: tend===t ? "#fff" : "#555", fontWeight: tend===t ? 600 : 400
              }}>{t}</button>
            ))}
          </div>
        </div>

        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
          共 {filtered.length} 首方劑
        </div>

        {/* Content */}
        {view === "scatter" ? (
          <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginBottom:16 }}>
            <div style={{ display:"flex", gap:12, marginBottom:10, justifyContent:"center", flexWrap:"wrap" }}>
              {FLAVORS.map(f => (
                <span key={f} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11 }}>
                  <span style={{ width:10, height:10, borderRadius:"50%", background:FLAVOR_COLORS[f], display:"inline-block" }} />
                  {f}
                </span>
              ))}
            </div>
            <ScatterPlot data={filtered} selected={selected} onSelect={setSelected} />
          </div>
        ) : null}

        {selected ? (
          <DetailPanel selected={selected} compare={compare} setCompare={setCompare}
            isFav={favs.includes(selected.n)} onToggleFav={toggleFav}
            onAddCompare={addToCompare}
            compareList={compareList}
            compareLimit={COMPARE_LIMIT}
            onClose={() => setSelected(null)}
            filteredList={filtered}
            onNavigate={setSelected} />
        ) : (
        <div style={{ display:"flex", gap:16, flexDirection: view === "list" ? "row" : "column" }}>
          {/* Formula List */}
          <div style={{
            background:"#fff", borderRadius:12, border:"1px solid #eee", overflow:"hidden",
            width: "100%",
            maxHeight: view === "list" ? 600 : "none", overflowY:"auto",
          }}>
            {filtered.map(f => (
              <FormulaCard key={f.n} formula={f} selected={false}
                isFav={favs.includes(f.n)} onToggleFav={toggleFav}
                onClick={() => setSelected(f)} />
            ))}
            {filtered.length === 0 && (
              <div style={{ padding:40, textAlign:"center", color:"#aaa" }}>無符合條件的方劑</div>
            )}
          </div>
        </div>
        )}

        {/* Footer */}
        <div style={{ textAlign:"center", padding:"24px 0", fontSize:11, color:"#bbb", lineHeight:1.8 }}>
          © 2026 吳啓銘 中醫博士　　性味來源：《神農本草經》 · 方劑來源：趙開美翻刻宋本《傷寒論》
        </div>
      </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));


</script>
</body>
</html>
