:{"寒涼":76.5,"溫熱":0.0,"平":23.5},"hd":[{"n":"甘草","w":2,"f":["甘"],"t":"平"},{"n":"芒硝","w":2.5,"f":["苦"],"t":"寒"},{"n":"大黃","w":4,"f":["苦"],"t":"寒"}],"cl":[{"s":"太陽病上","t":"傷寒，脈浮，自汗出，小便數，心煩，微惡寒，腳攣急，反與桂枝欲攻其表，此誤也。得之便厥，咽中乾，煩躁吐逆者，作甘草乾薑湯與之，以復其陽。若厥愈足溫者，更作芍藥甘草湯與之，其腳即伸。若胃氣不和，譫語者，少與調胃承氣湯。若重發汗，復加燒針者，四逆湯主之。"},{"s":"太陽病中","t":"發汗後惡寒者，虛故也。不惡寒但熱者，實也。當和胃氣，與調胃承氣湯。"},{"s":"太陽病中","t":"太陽病未解，脈陰陽俱停，必先振慄汗出而解。但陽脈微者，先汗出而解；但陰脈微者，下之而解。若欲下之，宜調胃承氣湯。"},{"s":"太陽病中","t":"傷寒十三日，過經，譫語者，以有熱也，當以湯下之。若小便利者，大便當鞕，而反下利，脈調和者，知醫以丸藥下之，非其治也。若自下利者，脈當微厥，今反和者，此為內實也，調胃承氣湯主之。"},{"s":"太陽病中","t":"太陽病，過經十餘日，心下溫溫欲吐，而胸中痛，大便反溏，腹微滿，鬱鬱微煩，先此時自極吐下者，與調胃承氣湯。若不爾者，不可與。但欲嘔，胸中痛，微溏者，此非柴胡湯證，以嘔，故知極吐下也。調胃承氣湯。"},{"s":"陽明病","t":"陽明病，不吐不下，心煩者，可與調胃承氣湯。"},{"s":"陽明病","t":"太陽病三日，發汗不解，蒸蒸發熱者，屬胃也，調胃承氣湯主之。"},{"s":"陽明病","t":"傷寒吐後，腹脹滿者，與調胃承氣湯。"}]},{"n":"四逆湯","s":"宋本·太陽病","c":"太陽病","tw":3.8,"fp":{"甘":52.6,"辛":47.4},"pf":"甘","fr":["甘","辛"],"ns":0.95,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":47.4,"平":52.6},"hd":[{"n":"甘草","w":2,"f":["甘"],"t":"平"},{"n":"乾薑","w":1.5,"f":["辛"],"t":"溫"},{"n":"附子","w":0.3,"f":["辛"],"t":"溫"}],"cl":[{"s":"太陽病上","t":"傷寒，脈浮，自汗出，小便數，心煩，微惡寒，腳攣急，反與桂枝欲攻其表，此誤也。得之便厥，咽中乾，煩躁吐逆者，作甘草乾薑湯與之，以復其陽。若厥愈足溫者，更作芍藥甘草湯與之，其腳即伸。若胃氣不和，譫語者，少與調胃承氣湯。若重發汗，復加燒針者，四逆湯主之。"},{"s":"太陽病中","t":"發汗，若下之，病仍不解，煩躁者，茯苓四逆湯主之。"},{"s":"太陽病中","t":"傷寒，醫下之，續得下利清穀不止，身疼痛者，急當救裏；後身疼痛，清便自調者，急當救表。救裏宜四逆湯，救表宜桂枝湯。"},{"s":"太陽病中","t":"病發熱，頭痛，脈反沈，若不差，身體疼痛，當救其裏，宜四逆湯。"},{"s":"陽明病","t":"脈浮而遲，表熱裏寒，下利清穀者，四逆湯主之。"},{"s":"少陰病","t":"少陰病，下利清穀，裏寒外熱，手足厥逆，脈微欲絕，身反不惡寒。其人面色赤，或腹痛，或乾嘔，或咽痛，或利止脈不出者，通脈四逆湯主之。"},{"s":"少陰病","t":"少陰病，脈沈者，急溫之，宜四逆湯。"},{"s":"少陰病","t":"少陰病，飲食入口則吐，心中溫溫欲吐，復不能吐，始得之，手足寒，脈弦遲者，此胸中實，不可下也，當吐之。若膈上有寒飲，乾嘔者，不可吐也，當溫之，宜四逆湯。"},{"s":"厥陰病","t":"手足厥寒，脈細欲絕者，當歸四逆湯主之。"},{"s":"厥陰病","t":"大汗出，熱不去，內拘急，四肢疼，又下利厥逆而惡寒者，四逆湯主之。"},{"s":"厥陰病","t":"大汗，若大下利而厥冷者，四逆湯主之。"},{"s":"厥陰病","t":"下利清穀，裏寒外熱，汗出而厥者，通脈四逆湯主之。"},{"s":"厥陰病","t":"下利腹脹滿，身體疼痛者，先溫其裏，乃攻其表。溫裏宜四逆湯，攻表宜桂枝湯。"},{"s":"厥陰病","t":"嘔而脈弱，小便復利，身有微熱，見厥者難治，四逆湯主之。"},{"s":"霍亂病","t":"吐利，汗出，發熱，惡寒，四肢拘急，手足厥冷者，四逆湯主之。"},{"s":"霍亂病","t":"既吐且利，小便復利而大汗出，下利清穀，內寒外熱，脈微欲絕者，四逆湯主之。"},{"s":"不可下","t":" 前第六方）"},{"s":"太陽病下","t":"本以下之，故心下痞，與瀉心湯，痞不解，其人渴而口燥，煩，小便不利者，五苓散主之。"},{"s":"陽明病","t":"太陽病，寸緩、關浮、尺弱，其人發熱汗出，復惡寒，不嘔，但心下痞者，此以醫下之也。如其不下者，病人不惡寒而渴者，此轉屬陽明也，小便數者，大便必鞕，不更衣十日，無所苦也。渴欲飲水，少少與之，但以法救之，渴者，宜五苓散。"},{"s":"霍亂病","t":"霍亂，頭痛，發熱，身疼痛，熱多欲飲水者，五苓散主之。寒多不用水者，理中丸主之。"}]},{"n":"茯苓甘草湯","s":"宋本·太陽病","c":"太陽病","tw":8,"fp":{"甘":62.5,"辛":62.5},"pf":"甘","fr":["甘","辛"],"ns":0.88,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":62.5,"平":37.5},"hd":[{"n":"茯苓","w":2,"f":["甘"],"t":"平"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫"},{"n":"甘草","w":1,"f":["甘"],"t":"平"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫"}],"cl":[{"s":"太陽病中","t":"傷寒汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"s":"厥陰病","t":"傷寒，厥而心下悸，宜先治水，當服茯苓甘草湯，卻治其厥。不爾，水漬入胃，必作利也。"}]},{"n":"梔子豉湯","s":"宋本·太陽病","c":"太陽病","tw":3.4,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-2.0,"nt":"大寒","ng":{"寒涼":100.0,"溫熱":0.0,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒"},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒"}],"cl":[{"s":"太陽病中","t":"發汗後，水藥不得入口，為逆；若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"},{"s":"太陽病中","t":"發汗，若下之，而煩熱，胸中窒者，梔子豉湯主之。"},{"s":"太陽病中","t":"傷寒五六日，大下之後，身熱不去，心中結痛者，未欲解也，梔子豉湯主之。"},{"s":"陽明病","t":"陽明病，脈浮而緊，咽燥，口苦，腹滿而喘，發熱汗出，不惡寒，反惡熱，身重。若發汗則躁，心憒憒，反譫語，若加溫針，必怵惕，煩躁不得眠。若下之，則胃中空虛，客氣動膈，心中懊憹，舌上胎者，梔子豉湯主之。"},{"s":"陽明病","t":"陽明病，下之，其外有熱，手足溫，不結胸，心中懊憹，飢不能食，但頭汗出者，梔子豉湯主之。"},{"s":"厥陰病","t":"下利後，更煩，按之心下濡者，為虛煩也，宜梔子豉湯。"},{"s":"差後病","t":"大病差後，勞復者，枳實梔子豉湯主之。"},{"s":"汗吐下後","t":"於梔子豉湯方內，加入甘草二兩，餘依前法。得吐，止後服。"},{"s":"汗吐下後","t":"於梔子豉湯方內，加生薑五兩，餘依前法。得吐，止後服。"}]},{"n":"梔子甘草豉湯","s":"宋本·太陽病","c":"太陽病","tw":5.4,"fp":{"苦":63.0,"甘":37.0},"pf":"苦","fr":["苦","甘"],"ns":-1.26,"nt":"偏寒","ng":{"寒涼":63.0,"溫熱":0.0,"平":37.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒"},{"n":"甘草","w":2,"f":["甘"],"t":"平"},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒"}],"cl":[{"s":"太陽病中","t":"發汗後，水藥不得入口，為逆；若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。"}]},{"n":"梔子生薑豉湯","s":"宋本·太陽病","c":"太陽病","tw":8.4,"fp":{"苦":40.5,"辛":59.5},"pf":"辛","fr":["辛","苦"],"ns":-0.21,"nt":"平性","ng":{"寒涼":40.5,"溫熱":59.5,"平":0.0},"hd":[{"n":"梔子","w":1. 嘔也，小柴胡湯主之。服柴胡湯已，渴者屬陽明，以法治之。"},{"s":"太陽病中","t":"傷寒四五日，身熱，惡風，頸項強，脇下滿，手足溫而渴者，小柴胡湯主之。"},{"s":"太陽病中","t":"傷寒，陽脈濇，陰脈弦，法當腹中急痛，先與小建中湯，不差者，與小柴胡湯主之。"},{"s":"太陽病中","t":"太陽病，過經十餘日，反二三下之。後四五日，柴胡證仍在者，先與小柴胡湯；嘔不止，心下急，鬱鬱微煩者，為未解也，與大柴胡湯下之則愈。"},{"s":"太陽病中","t":"傷寒十三日不解，胸脇滿而嘔，日晡所發潮熱，已而微利。此本柴胡證，下之以不得利，今反利者，知醫以丸藥下之，此非其治也。潮熱者，實也。先宜服小柴胡湯以解外，後以柴胡加芒硝湯主之。"},{"s":"太陽病下","t":"婦人中風，七八日續得寒熱，發作有時，經水適斷者，此為熱入血室，其血必結，故使如瘧狀，發作有時，小柴胡湯主之。"},{"s":"太陽病下","t":"傷寒五六日，頭汗出，微惡寒，手足冷，心下滿，口不欲食，大便鞕，脈細者，此為陽微結，必有表，復有裏也。脈沈，亦在裏也。汗出，為陽微。假令純陰結，不得復有外證，悉入在裏，此為半在裏半在外也。脈雖沈緊，不得為少陰病。所以然者，陰不得有汗，今頭汗出，故知非少陰也。可與小柴胡湯，設不了了者，得屎而解。"},{"s":"陽明病","t":"陽明病，發潮熱，大便溏，小便自可，胸脇滿不去者，與小柴胡湯。"},{"s":"陽明病","t":"陽明病，脇下鞕滿，不大便，而嘔，舌上白胎者，可與小柴胡湯。上焦得通，津液得下，胃氣因和，身濈然汗出而解。"},{"s":"陽明病","t":"陽明中風，脈弦浮大而短氣，腹都滿，脇下及心痛，久按之氣不通，鼻乾，不得汗，嗜臥，一身及目悉黃，小便難，有潮熱，時時噦，耳前後腫。刺之小差，外不解，病過十日，脈續浮者，與小柴胡湯。"},{"s":"少陽病","t":"本太陽病不解，轉入少陽者，脇下鞕滿，乾嘔不能食，往來寒熱，尚未吐下，脈沈緊者，與小柴胡湯。"},{"s":"厥陰病","t":"嘔而發熱者，小柴胡湯主之。"},{"s":"差後病","t":"傷寒差以後，更發熱，小柴胡湯主之。脈浮者，以汗解之；脈沈實者，以下解之。"},{"s":"汗吐下後","t":"於小柴胡湯方內，加芒硝六兩，餘依前法。服不解，更服。"}]},{"n":"小建中湯","s":"宋本·太陽病","c":"太陽病","tw":25.0,"fp":{"辛":24.0,"甘":64.0,"苦":24.0},"pf":"甘","fr":["甘","辛","苦"],"ns":0.76,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":44.0,"平":32.0},"hd":[{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫"},{"n":"甘草","w":2,"f":["甘"],"t":"平"},{"n":"大棗","w":6.0,"f":["甘"],"t":"平"},{"n":"芍藥","w":6,"f":["苦"],"t":""},{"n":"生薑","w":3,"f":["辛"],"t":"微溫"},{"n":"膠飴","w":5,"f":["甘"],"t":"溫"}],"cl":[{"s":"太陽病中","t":"傷寒，陽脈濇，陰脈弦，法當腹中急痛，先與小建中湯，不差者，與小柴胡湯主之。"},{"s":"太陽病中","t":"傷寒二三日，心中悸而煩者，小建中湯主之。"}]},{"n":"大柴胡湯","s":"宋本·太陽病","c":"太陽病","tw":26.3,"fp":{"苦":57.8,"辛":28.5,"甘":13.7},"pf":"苦","fr":["苦","辛","甘"],"ns":0.1,"nt":"平性","ng":{"寒涼":4.6,"溫熱":19.0,"平":65.0},"hd":[{"n":"柴胡","w":8,"f":["苦"],"t":"平"},{"n":"黃芩","w":3,"f":["苦"],"t":"平"},{"n":"芍藥","w":3,"f":["苦"],"t":""},{"n":"半夏","w":2.5,"f":["辛"],"t":"平"},{"n":"生薑","w":5,"f":["辛"],"t":"微溫"},{"n":"枳實","w":1.2,"f":["苦"],"t":"寒"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平"}],"cl":[{"s":"太陽病中","t":"太陽病，過經十餘日，反二三下之。後四五日，柴胡證仍在者，先與小柴胡湯；嘔不止，心下急，鬱鬱微煩者，為未解也，與大柴胡湯下之則愈。"},{" 惡寒者，外未解也，其熱不潮，未可與承氣湯；若腹大滿不通者，可與小承氣湯，微和胃氣，勿令致大泄下。"},{"s":"陽明病","t":"陽明病，潮熱，大便微鞕者，可與大承氣湯，不鞕者，不可與之。若不大便六七日，恐有燥屎，欲知之法，少與小承氣湯。湯入腹中，轉矢氣者，此有燥屎也，乃可攻之；若不轉矢氣者，此但初頭鞕，後必溏，不可攻之，攻之必脹滿不能食也。欲飲水者，與水則噦。其後發熱者，必大便復鞕而少也，以小承氣湯和之。不轉矢氣者，慎不可攻也。"},{"s":"陽明病","t":"傷寒若吐若下後，不解，不大便五六日，上至十餘日。日晡所發潮熱，不惡寒，獨語如見鬼狀。若劇者，發則不識人，循衣摸床，惕而不安，微喘直視。脈弦者生，濇者死。微者，但發熱譫語者，大承氣湯主之。若一服利，則止後服。"},{"s":"陽明病","t":"陽明病，譫語，有潮熱，反不能食者，胃中必有燥屎五六枚也。若能食者，但鞕耳。宜大承氣湯下之。"},{"s":"陽明病","t":"汗出，譫語者，以有燥屎在胃中，此為風也。須下者，過經乃可下之。下之若早，語言必亂，以表虛裏實故也。下之愈，宜大承氣湯。"},{"s":"陽明病","t":"二陽并病，太陽證罷，但發潮熱，手足漐漐汗出，大便難而譫語者，下之則愈，宜大承氣湯。"},{"s":"陽明病","t":"陽明病，下之，心中懊憹而煩，胃中有燥屎者，可攻。腹微滿，初頭鞕，後必溏，不可攻之。若有燥屎者，宜大承氣湯。"},{"s":"陽明病","t":"病人煩熱，汗出則解，又如瘧狀，日晡所發熱者，屬陽明也。脈實者，宜下之；脈浮虛者，宜發汗。下之，與大承氣湯；發汗，宜桂枝湯。"},{"s":"陽明病","t":"大下後，六七日不大便，煩不解，腹滿痛者，此有燥屎也。所以然者，本有宿食故也，宜大承氣湯。"},{"s":"陽明病","t":"病人小便不利，大便乍難乍易，時有微熱，喘冒不能臥者，有燥屎也。宜大承氣湯。"},{"s":"陽明病","t":"得病二三日，脈弱，無太陽柴胡證，煩躁，心下鞕，至四五日，雖能食，以小承氣湯少少與，微和之，令小安。至六日，與承氣湯一升。若不大便六七日，小便少者，雖不受食，但初頭鞕，後必溏，未定成鞕，攻之必溏，須小便利，屎定鞕，乃可攻之，宜大承氣湯。"},{"s":"陽明病","t":"傷寒六七日，目中不了了，睛不和，無表裏證，大便難，身微熱者，此為實也。急下之，宜大承氣湯。"},{"s":"陽明病","t":"陽明病，發熱，汗多者，急下之，宜大承氣湯。"},{"s":"陽明病","t":"發汗不解，腹滿痛者，急下之，宜大承氣湯。"},{"s":"陽明病","t":"腹滿不減，減不足言，當下之，宜大承氣湯。"},{"s":"陽明病","t":"陽明少陽合病，必下利，其脈不負者，為順也。負者，失也。互相剋賊，名為負也。脈滑而數者，有宿食也。當下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，得之二三日，口燥，咽乾者，急下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，自利清水，色純青，心下必痛，口乾燥者，可下之，宜大承氣湯。"},{"s":"少陰病","t":"少陰病，六七日，腹脹，不大便者，急下之，宜大承氣湯。"},{"s":"可下","t":"下利，三部脈皆平，按之心下鞕者，急下之，宜大承氣湯。"},{"s":"可下","t":"下利，脈遲而滑者，內實也。利未欲止，當下之，宜大承氣湯。"},{"s":"可下","t":"問曰：人病有宿食，何以別之？師曰：寸口脈浮而大，按之反濇，尺中亦微而濇，故知有宿食，當下之，宜大承氣湯。"},{"s":"可下","t":"下利，不欲食者，以有宿食故也，當宜下之，與大承氣湯。"},{"s":"可下","t":"下利差後，至其年月日復發者，以病不盡故也，當下之，宜大承氣湯。"},{"s":"可下","t":"下利，脈反滑，當有所去，下之乃愈，宜大承氣湯。"},{"s":"可下","t":"病腹中滿痛者，此為實也，當下之，宜大承氣湯。"},{"s":"可下","t":"脈雙弦而遲者，必心下鞕。脈大而緊者，陽中有陰也，可以下之，宜大承氣湯。"}]},{"n":"小承氣湯","s":"宋本·陽明病","c":"陽明病","tw":6.9,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-0.84,"nt":"偏寒","ng":{"寒涼":71.0,"溫熱":29.0,"平":0.0},"hd":[{"n":"大黃","w":4,"f":["苦"],"t":"寒"},{"n":"厚朴","w":2,"f":["苦"],"t":"溫"},{"n":"枳實","w":0.9,"f":["苦"],"t":"寒"}],"cl":[{"s":"陽明病","t":"陽明病，脈遲，雖汗出不惡寒者，其身必重，短氣，腹滿而喘，有潮熱者，此外欲解，可攻裏也。手足濈然汗出者，此大便已鞕也，大承氣湯主之；若汗多，微發熱惡寒者，外未解也，其熱不潮，未可與承氣湯；若腹大滿不通者，可與小承氣湯，微和胃氣，勿令致大泄下。"},{"s":"陽明病","t":"陽明病，潮熱，大便微鞕者，可與大承氣湯，不鞕者，不可與之。若不大便六七日，恐有燥屎，欲知之法，少與小承氣湯。湯入腹中，轉矢氣者，此有燥屎也，乃可攻之；若不轉矢氣者，此但初頭鞕，後必溏，不可攻之，攻之必脹滿不能食也。欲飲水者，與水則噦。其後發熱者，必大便復鞕而少也，以小承氣湯和之。不轉矢氣者，慎不可攻也。"},{"s":"陽明病","t":"陽明病，其人多汗，以津液外出，胃中燥，大便必鞕，鞕則譫語。小承氣湯主之。若一服譫語止者，更莫復服。"},{"s":"陽明病","t":"陽明病，譫語，發潮熱，脈滑而疾者，小承氣湯主之。因與承氣湯一升，腹中轉氣者，更服一升；若不轉氣者，勿更與之。明日又不大便，脈反微濇者，裏虛也，為難治，不可更與承氣湯也。"},{"s":"陽明病","t":"太陽病，若吐、若下，若發汗後，微煩，小便數，大便因鞕者，與小承氣湯，和之愈。"},{"s":"陽明病","t":"得病二三日，脈弱，無太陽柴胡證，煩躁，心下鞕，至四五日，雖能食，以小承氣湯少少與，微和之，令小安。至六日，與承氣湯一升。若不大便六七日，小便少者，雖不受食，但初頭鞕，後必溏，未定成鞕，攻之必溏，須小便利，屎定鞕，乃可攻之，宜大承氣湯。"},{"s":"厥陰病","t":"下利譫語者，有燥屎也，宜小承氣湯。"}]},{"n":"豬苓湯","s":"宋本·陽明病","c":"陽明病","tw":5,"fp":{"甘":100.0},"pf":"甘","fr":["甘"],"ns":-0.8,"nt":"偏寒","ng":{"寒涼":40.0,"溫熱":0.0,"平":60.0},"hd":[{"n":"豬苓","w":1,"f":["甘"],"t":"平"},{"n":"茯苓","w":1,"f":["甘"],"t":"平"},{"n":"澤瀉","w":1,"f":["甘"],"t":"寒"},{"n":"阿膠","w":1,"f":["甘"],"t":"平"},{"n":"滑石","w":1,"f":["甘"],"t":"寒"}],"cl":[{"s":"陽明病","t":"若脈浮，發熱，渴欲飲水，小便不利者，豬苓湯主之。"},{"s":"陽明病","t":"陽明病，汗出多而渴者，不可與豬苓湯，以汗多胃中燥，豬苓湯復利其小便故也。"},{"s":"少陰病","t":"少陰病，下利，六七日，欬而嘔渴，心煩不得眠者，豬苓湯主之。"}]},{"n":"蜜煎導","s":"宋本·陽明病","c":"陽明病","tw":3.5,"fp":{"甘":100.0},"pf":"甘","fr":["甘"],"ns":0.0,"nt":"平性","ng":{"寒涼":0.0,"溫熱":0.0,"平":100.0},"hd":[{"n":"食蜜","w":3.5,"f":["甘"],"t":"平"}],"cl":[{"s":"陽明病","t":"陽明病，自汗出，若發汗，小便自利者，此為津液內竭，雖鞕不可攻之，當須自欲大便，宜蜜煎導而通之，若土瓜根及大豬膽汁，皆可為導。"}]},{"n":"茵陳蒿湯","s":"宋本·陽明病","c":"陽明病","tw":12.2,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-1.02,"nt":"偏寒","ng":{"寒涼":50.8,"溫熱":0.0,"平":0.0},"hd":[{"n":"茵陳蒿","w":6,"f":["苦"],"t":""},{"n":"梔子","w":4.2,"f":["苦"],"t":"寒"},{"n":"大黃","w":2,"f":["苦"],"t":"寒"}],"cl":[{"s":"陽明病","t":"陽明病，發熱汗出者，此為熱越，不能發黃也；但頭汗出，身無汗，劑頸而還，小便不利，渴引水漿者，此為瘀熱在裏，身必發黃，茵陳蒿湯主之。"},{"s":"陽明病","t":"傷寒七八日，身黃如橘子色，小便不利，腹微滿者，茵陳蒿湯主之。"}]},{"n":"吳茱萸湯","s":"宋本·陽明病","c":"陽明病","tw":17.6,"fp":{"辛":62.5,"甘":37.5},"pf":"辛","fr":["辛","甘"],"ns":0.74,"nt":"偏溫","ng":{"寒涼":17.0,"溫熱":62.5,"平":20.5},"hd":[{"n const CATEGORIES = ["全部","太陽病","陽明病","少陽病","太陰病","少陰病","厥陰病","霍亂病","差後病"];
const TENDENCIES = ["全部","大溫","偏溫","平性","偏寒","大寒"];
const FLAVORS = ["辛","甘","苦","酸","鹹"];
const FLAVOR_COLORS = { "辛":"#E8673C", "甘":"#D4A843", "苦":"#5B8C5A", "酸":"#8E6FB0", "鹹":"#4A7B9D" };
const TENDENCY_COLORS = { "大溫":"#C0392B", "偏溫":"#E67E22", "平性":"#7F8C8D", "偏寒":"#3498DB", "大寒":"#2471A3" };

function RadarChart({ fp, fp2, label, label2, size = 200 }) {
  const cx = size / 2, cy = size / 2;
  const R = size * 0.38;
  const angles = FLAVORS.map((_, i) => (Math.PI / 2) + (2 * Math.PI * i) / 5);
  const toXY = (angle, r) => [cx + r * Math.cos(angle), cy - r * Math.sin(angle)];

  const levels = [20, 40, 60, 80, 100];
  const maxVal = 100;

  const getPoints = (data) => {
    return FLAVORS.map((f, i) => {
      const val = data[f] || 0;
      const r = (val / maxVal) * R;
      return toXY(angles[i], r);
    });
  };

  const pts = getPoints(fp);
  const pathStr = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
  
  let pathStr2 = null;
  if (fp2) {
    const pts2 = getPoints(fp2);
    pathStr2 = pts2.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
  }

  return (
    <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", maxWidth: size }}>
      {/* Grid levels */}
      {levels.map(lv => {
        const r = (lv / maxVal) * R;
        const gridPts = angles.map(a => toXY(a, r));
        const d = gridPts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0]},${p[1]}`).join(" ") + " Z";
        return <path key={lv} d={d} fill="none" stroke="#e0ddd8" strokeWidth={0.8} opacity={0.7} />;
      })}
      {/* Axis lines */}
      {angles.map((a, i) => {
        const [ex, ey] = toXY(a, R);
        return <line key={i} x1={cx} y1={cy} x2={ex} y2={ey} stroke="#d5d0c8" strokeWidth={0.6} />;
      })}
      {/* Comparison fill (if exists) */}
      {pathStr2 && (
        <path d={pathStr2} fill="#3498DB" fillOpacity={0.12} stroke="#3498DB" strokeWidth={1.5} strokeDasharray="4 3" />
      )}
      {/* Data fill */}
      <path d={pathStr} fill="#E8673C" fillOpacity={fp2 ? 0.18 : 0.15} stroke="#E8673C" strokeWidth={2} />
      {/* Data points */}
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={3.5} fill={FLAVOR_COLORS[FLAVORS[i]]} stroke="#fff" strokeWidth={1.5} />
      ))}
      {fp2 && getPoints(fp2).map((p, i) => (
        <circle key={`c${i}`} cx={p[0]} cy={p[1]} r={2.5} fill="#3498DB" stroke="#fff" strokeWidth={1} />
      ))}
      {/* Labels */}
      {FLAVORS.map((f, i) => {
        const labelR = R + 18;
        const [lx, ly] = toXY(angles[i], labelR);
        const val = fp[f] || 0;
        return (
          <g key={f}>
            <text x={lx} y={ly - 6} textAnchor="middle" fontSize={14} fontWeight={700} fill={FLAVOR_COLORS[f]}>{f}</text>
            <text x={lx} y={ly + 8} textAnchor="middle" fontSize={10} fill="#999">{val > 0 ? `${val}%` : "-"}</text>
          </g>
        );
      })}
      {/* Legend */}
      {label && (
        <g>
          <rect x={4} y={size - 16} width={8} height={8} rx={2} fill="#E8673C" opacity={0.6} />
          <text x={16} y={size - 9} fontSize={9} fill="#888">{label}</text>
        </g>
      )}
      {label2 && fp2 && (
        <g>
          <rect x={4} y={size - 28} width={8} height={8} rx={2} fill="#3498DB" opacity={0.6} />
          <text x={16} y={size - 21} fontSize={9} fill="#888">{label2}</text>
        </g>
      )}
    </svg>
  );
}

function FlavorBar({ fp, height = 24 }) {
  const ordered = FLAVORS.filter(f => fp[f]);
  return (
    <div style={{ display:"flex", borderRadius:4, overflow:"hidden", height, width:"100%" }}>
      {ordered.map(f => (
        <div key={f} title={`${f} ${fp[f]}%`} style={{
          width: `${fp[f]}%`, background: FLAVOR_COLORS[f],
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize: fp[f] > 12 ? 11 : 0, color:"#fff", fontWeight:600, letterSpacing:1
        }}>{fp[f] > 12 ? `${f}${fp[f]}%` : ""}</div>
      ))}
    </div>
  );
}

function NatureGauge({ score }) {
  const pct = Math.max(0, Math.min(100, (score + 2.5) / 5 * 100));
  return (
    <div style={{ position:"relative", height:12, background:"linear-gradient(90deg, #2471A3 0%, #3498DB 25%, #95A5A6 50%, #E67E22 75%, #C0392B 100%)", borderRadius:6 }}>
      <div style={{
        position:"absolute", top:-2, left:`${pct}%`, transform:"translateX(-50%)",
        width:16, height:16, borderRadius:"50%", background:"#fff", border:"2px solid #2c3e50",
        boxShadow:"0 1px 4px rgba(0,0,0,0.3)"
      }} />
    </div>
  );
}

function HerbPill({ herb }) {
  const bg = herb.t === "溫" ? "#FDEBD0" : herb.t === "微溫" ? "#FEF5E7" :
    herb.t === "寒" ? "#D6EAF8" : herb.t === "微寒" ? "#EBF5FB" :
    herb.t === "小寒" ? "#EBF5FB" : herb.t === "涼" ? "#E8F8F5" : "#F2F3F4";
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20,
      background: bg, fontSize:13, margin:"2px 3px", border:"1px solid rgba(0,0,0,0.08)"

      <span style={{ fontWeight:600 }}>{herb.n}</span>
      <span style={{ color:"#888", fontSize:11 }}>{herb.w}兩</span>

        const r = Math.max(4, Math.min(12, d.hd.length * 1.5));
        const color = FLAVOR_COLORS[allFlavors[i]];
        const isSel = selected && selected.n === d.n;
        return (
          <g key={i} onClick={() => onSelect(d)} style={{ cursor:"pointer" }}>
            <circle cx={x} cy={y} r={isSel ? r + 3 : r} fill={color} opacity={isSel ? 1 : 0.7}
              stroke={isSel ? "#2c3e50" : "none"} strokeWidth={2} />
            {(isSel || d.tw > 30) && (
              <text x={x} y={y - r - 4} textAnchor="middle" fontSize={10} fill="#333" fontWeight={600}>{d.n}</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function OverviewStats({ data }) {
  const tendCount = {};
  data.forEach(d => { tendCount[d.nt] = (tendCount[d.nt]||0)+1; });
  const flavorTotals = {};
  FLAVORS.forEach(f => { flavorTotals[f] = 0; });
  data.forEach(d => { FLAVORS.forEach(f => { if(d.fp[f]) flavorTotals[f] += d.fp[f]; }); });
  const flavorSum = Object.values(flavorTotals).reduce((a,b)=>a+b,0);

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:20 }}>
      <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee" }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:10, fontWeight:600 }}>四氣偏性分佈</div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          {TENDENCIES.slice(1).map(t => (
            <div key={t} style={{ textAlign:"center", flex:1, minWidth:50 }}>
              <div style={{ fontSize:22, fontWeight:800, color: TENDENCY_COLORS[t] }}>{tendCount[t]||0}</div>
              <div style={{ fontSize:11, color:"#666" }}>{t}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", display:"flex", flexDirection:"column", alignItems:"center" }}>
        <div style={{ fontSize:12, color:"#888", marginBottom:4, fontWeight:600, alignSelf:"flex-start" }}>五味累計分佈</div>
        {(() => {
          const fpNorm = {};
          const maxF = Math.max(...FLAVORS.map(f => flavorTotals[f]));
          FLAVORS.forEach(f => { fpNorm[f] = maxF > 0 ? Math.round(flavorTotals[f] / maxF * 100) : 0; });
          return <RadarChart fp={fpNorm} size={180} />;
        })()}
      </div>
    </div>
  );
}

  const [compare, setCompare] = useState(null);
  const [view, setView] = useState("list"); // list | scatter
  const [page, setPage] = useState("analysis"); // analysis | about | author

  const filtered = useMemo(() => {
    return DATA.filter(d => {
      if (cat !== "全部" && d.c !== cat) return false;
      if (tend !== "全部" && d.nt !== tend) return false;
      if (search) {
        const q = search.toLowerCase();
        if (!d.n.includes(q) && !d.hd.some(h => h.n.includes(q))) return false;
      }
      return true;
    });
  }, [cat, tend, search]);

  return (
    <div style={{ fontFamily:"'Noto Sans TC', 'Hiragino Sans', sans-serif", background:"#F7F5F2", minHeight:"100vh" }}>
      {/* Header */}
      <div style={{ background:"linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)", color:"#fff", padding:"32px 24px 24px" }}>
        <h1 style={{ margin:0, fontSize:26, fontWeight:800, fontFamily:"'Noto Serif TC', serif", letterSpacing:2 }}>
          傷寒論方劑性味分析（宋本）
        </h1>
        <p style={{ margin:"8px 0 0", fontSize:13, opacity:0.7, lineHeight:1.6 }}>
          以《神農本草經》性味數據為基礎，結合藥物用量權重，分析趙開美翻刻宋本 {DATA.length} 首方劑的五味四氣偏性
        </p>
        <div style={{ display:"flex", gap:4, marginTop:16 }}>
          {[["analysis","方劑分析"],["about","研究說明"],["author","關於作者"]].map(([k,label]) => (
            <button key={k} onClick={() => setPage(k)} style={{
              padding:"8px 20px", borderRadius:"8px 8px 0 0", border:"none", cursor:"pointer",
              fontSize:14, fontWeight:600, letterSpacing:1,
              background: page===k ? "#F7F5F2" : "rgba(255,255,255,0.12)",
              color: page===k ? "#1a1a2e" : "rgba(255,255,255,0.7)",
              transition:"all 0.2s"
            }}>{label}</button>
          ))}
        </div>
      </div>

      {page === "about" ? <AboutPage /> : page === "author" ? <AuthorPage /> : (
      <div style={{ padding:"20px 24px", maxWidth:960, margin:"0 auto" }}>
        <OverviewStats data={filtered} />

        {/* Filters */}
        <div style={{ background:"#fff", borderRadius:12, padding:16, marginBottom:16, border:"1px solid #eee" }}>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", alignItems:"center", marginBottom:12 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋方劑或藥物..."
              style={{ flex:1, minWidth:180, padding:"8px 14px", borderRadius:8, border:"1px solid #ddd", fontSize:14, outline:"none" }} />
            <div style={{ display:"flex", gap:4 }}>
              <button onClick={() => setView("list")} style={{
                padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer",
                background: view==="list" ? "#2c3e50" : "#fff", color: view==="list" ? "#fff" : "#333", fontSize:13, fontWeight:600
              }}>列表</button>
              <button onClick={() => setView("scatter")} style={{
                padding:"6px 14px", borderRadius:6, border:"1px solid #ddd", cursor:"pointer",
                background: view==="scatter" ? "#2c3e50" : "#fff", color: view==="scatter" ? "#fff" : "#333", fontSize:13, fontWeight:600
              }}>散佈圖</button>
            </div>
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
            <span style={{ fontSize:12, color:"#888", lineHeight:"28px" }}>六經：</span>
            {CATEGORIES.map(c => (
              <button key={c} onClick={() => setCat(c)} style={{
                padding:"4px 12px", borderRadius:16, border:"1px solid #ddd", cursor:"pointer", fontSize:12,
                background: cat===c ? "#2c3e50" : "#fff", color: cat===c ? "#fff" : "#555", fontWeight: cat===c ? 600 : 400
              }}>{c}</button>
            ))}
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            <span style={{ fontSize:12, color:"#888", lineHeight:"28px" }}>偏性：</span>
            {TENDENCIES.map(t => (
              <button key={t} onClick={() => setTend(t)} style={{
                padding:"4px 12px", borderRadius:16, border:"1px solid #ddd", cursor:"pointer", fontSize:12,
                background: tend===t ? (TENDENCY_COLORS[t]||"#2c3e50") : "#fff",
                color: tend===t ? "#fff" : "#555", fontWeight: tend===t ? 600 : 400
              }}>{t}</button>
            ))}
          </div>
        </div>

        <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
          共 {filtered.length} 首方劑
        </div>

        {/* Content */}
        {view === "scatter" ? (
          <div style={{ background:"#fff", borderRadius:12, padding:16, border:"1px solid #eee", marginBottom:16 }}>
            <div style={{ display:"flex", gap:12, marginBottom:10, justifyContent:"center", flexWrap:"wrap" }}>
              {FLAVORS.map(f => (
                <span key={f} style={{ display:"flex", alignItems:"center", gap:4, fontSize:11 }}>
                  <span style={{ width:10, height:10, borderRadius:"50%", background:FLAVOR_COLORS[f], display:"inline-block" }} />
                  {f}
                </span>
              ))}
            </div>
            <ScatterPlot data={filtered} selected={selected} onSelect={setSelected} />
          </div>
        ) : null}

        <div style={{ display:"flex", gap:16, flexDirection: view === "list" ? "row" : "column" }}>
          {/* Formula List */}
          <div style={{
            background:"#fff", borderRadius:12, border:"1px solid #eee", overflow:"hidden",
            width: view === "list" && selected ? "45%" : "100%",
            maxHeight: view === "list" ? 600 : "none", overflowY:"auto",
            transition:"width 0.2s"
          }}>
            {filtered.map(f => (
              <FormulaCard key={f.n} formula={f} selected={selected && selected.n === f.n}
                onClick={() => setSelected(selected && selected.n === f.n ? null : f)} />
            ))}
            {filtered.length === 0 && (
              <div style={{ padding:40, textAlign:"center", color:"#aaa" }}>無符合條件的方劑</div>
            )}
          </div>

          {/* Detail Panel */}
          {selected && (
            <div style={{
              flex:1, background:"#fff", borderRadius:12, padding:20, border:"1px solid #eee",
              position: view === "list" ? "sticky" : "static", top:20, alignSelf:"flex-start"
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                <div>
                  <h2 style={{ margin:0, fontSize:22, fontFamily:"'Noto Serif TC', serif" }}>{selected.n}</h2>
                  <div style={{ fontSize:13, color:"#888", marginTop:4 }}>{selected.c}</div>
                </div>
                <button onClick={() => setSelected(null)} style={{
                  background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#aaa", padding:4
                }}>✕</button>
              </div>

              {/* Nature score */}
              <div style={{ marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                  <span style={{ fontSize:12, color:"#888" }}>寒熱指數</span>
                  <span style={{ fontSize:14, fontWeight:700, color: TENDENCY_COLORS[selected.nt] }}>
                    {selected.ns > 0 ? "+" : ""}{selected.ns} ({selected.nt})
                  </span>
                </div>
                <NatureGauge score={selected.ns} />
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:"#aaa", marginTop:4 }}>
                  <span>大寒</span><span>偏寒</span><span>平</span><span>偏溫</span><span>大溫</span>
                </div>
              </div>

              {/* Flavor radar */}
              <div style={{ marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                  <span style={{ fontSize:12, color:"#888" }}>五味分佈</span>
                  <select value={compare ? compare.n : ""} onChange={e => {
                    const f = DATA.find(d => d.n === e.target.value);
                    setCompare(f || null);
                  }} style={{ fontSize:11, padding:"2px 6px", borderRadius:4, border:"1px solid #ddd", color:"#555", background:"#fafafa" }}>
                    <option value="">對比方劑...</option>
                    {DATA.filter(d => d.n !== selected.n).map(d => (
                      <option key={d.n} value={d.n}>{d.n}</option>
                    ))}
                  </select>
                </div>
                <div style={{ display:"flex", justifyContent:"center" }}>
                  <RadarChart fp={selected.fp} fp2={compare ? compare.fp : null}
                    label={selected.n} label2={compare ? compare.n : null} size={220} />
                </div>
              </div>

              {/* Nature groups */}
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:12, color:"#888", marginBottom:6 }}>四氣構成</div>
                <div style={{ display:"flex", gap:8 }}>
                  {["寒涼","平","溫熱"].map(g => (
                    <div key={g} style={{ flex:1, textAlign:"center", padding:"8px 0", borderRadius:8, background:"#f8f8f8" }}>
                      <div style={{ fontSize:18, fontWeight:700, color: g==="寒涼"?"#3498DB":g==="溫熱"?"#E67E22":"#7F8C8D" }}>
                        {selected.ng[g]}%
                      </div>
                      <div style={{ fontSize:11, color:"#888" }}>{g}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Herbs */}
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
                  藥物組成（{selected.hd.length} 味，總 {selected.tw} 兩）
                </div>
                <div style={{ display:"flex", flexWrap:"wrap" }}>
                  {selected.hd.sort((a,b) => b.w - a.w).map((h,i) => <HerbPill key={i} herb={h} />)}
                </div>
              </div>

              {/* Clauses */}
              {selected.cl && selected.cl.length > 0 && (
              <div>
                <div style={{ fontSize:12, color:"#888", marginBottom:8 }}>
                  相關條文（{selected.cl.length} 條）
                </div>
                <div style={{ maxHeight:300, overflowY:"auto", borderRadius:8, border:"1px solid #eee" }}>
                  {selected.cl.map((cl, i) => (
                    <div key={i} style={{
                      padding:"10px 14px", borderBottom: i < selected.cl.length-1 ? "1px solid #f0f0f0" : "none",
                      fontSize:13, lineHeight:1.8, color:"#444",
                    }}>
                      <span style={{
                        display:"inline-block", fontSize:10, fontWeight:600, color:"#fff",
                        background:"#5B8C5A", borderRadius:4, padding:"1px 6px", marginRight:8,
                        verticalAlign:"middle", letterSpacing:0.5,
                      }}>{cl.s}</span>
                      <span>{cl.t}</span>
                    </div>
                  ))}
                </div>
              </div>
              )}
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{ textAlign:"center", padding:"24px 0", fontSize:11, color:"#bbb", lineHeight:1.8 }}>
          © 2026 吳啓銘 中醫博士　　性味來源：《神農本草經》 · 方劑來源：趙開美翻刻宋本《傷寒論》
        </div>
      </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
