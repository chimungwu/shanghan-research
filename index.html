:[{"n":"麻黃","w":3,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"杏仁","w":1.4,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世多以杏仁味苦。《名醫別錄》載「味苦，溫，有毒」。"}],"cl":[{"num":23,"t":"太陽病，得之八九日，如瘧狀，發熱惡寒，熱多寒少，其人不嘔，清便欲自可，一日二三度發。脈微緩者，為欲愈也；脈微而惡寒者，此陰陽俱虛，不可更發汗、更下、更吐也；面色反有熱色者，未欲解也，以其不能得小汗出，身必癢，宜桂枝麻黃各半湯。","d":[{"v":"桂","t":"太陽病，得之八九日，如瘧狀，發熱惡寒，熱多寒少，其人不嘔，清便欲自可，一日二三度發。脈微緩者，為欲愈也；脈微而惡寒者，此陰陽俱虛，不可更發汗、更吐、更下也；面色反有熱色者，未欲解也，以其不能得小汗出，身必癢，宜桂枝麻黃各半湯。"},{"v":"康","t":"大陽病，得之八九日，如瘧狀，發熱惡寒，熱多寒少，其人不嘔，清便欲自可，一日二三度發(註脈微緩者。為欲愈也。脈微而惡寒者。此陰陽俱虛。不可更發汗。更下。更吐也。面色反有熱色者。未欲解也。經)以其不能得小汗出，身必癢，宜桂枝麻黃各半湯"}]},{"num":25,"t":"服桂枝湯，大汗出，脈洪大者，與桂枝湯，如前法。若形似瘧，一日再發者，汗出必解，宜桂枝二麻黃一湯。","d":[{"v":"桂","t":"太陽病，服桂枝湯後，大汗出，脈洪大者，與白虎湯；若形似瘧，一日再發者，宜桂枝二麻黃一湯。"}]},{"num":35,"t":"太陽病，頭痛，發熱，身疼，腰痛，骨節疼痛，惡風，無汗而喘者，麻黃湯主之。","d":[{"v":"康","t":"大陽病，頭痛發熱，身疼腰痛，骨節疼痛，惡風，無汗而喘者，麻黃湯主之"}]},{"num":36,"t":"太陽與陽明合病，喘而胸滿者，不可下，宜麻黃湯。"},{"num":37,"t":"太陽病，十日已去，脈浮細而嗜臥者，外已解也，設胸滿脅痛者，與小柴胡湯；脈但浮者，與麻黃湯。","d":[{"v":"桂","t":"太陽與陽明合病，喘而胸滿者，不可下也，宜麻黃湯。（方見上）"},{"v":"桂","t":"太陽病，十日已去，脈浮細而嗜臥者，外已解也。設胸滿、脅痛，與小柴胡湯；脈但浮者，與麻黃湯（方見上）。"},{"v":"康","t":"大陽與陽明合病，喘而胸滿者，不可下，宜麻黃湯，大陽病，十日已去，脈浮細而嗜臥者，外已解也，設胸滿脅痛者，與小柴胡湯，脈但浮者，與麻黃湯"}]},{"num":46,"t":"太陽病，脈浮緊、無汗、發熱、身疼痛，八九日不解，表證仍在，此當發其汗。服藥已微除，其人發煩目瞑，劇者必衄，衄乃解。所以然者，陽氣重故也。麻黃湯主之。","d":[{"v":"桂","t":"太陽病，脈浮緊，無汗，發熱，身疼痛，八九日不解，表證仍在，此當發其汗；服藥已，微除，其人發煩，目瞑，劇者必衄，衄乃解。所以然者，陽氣重故也。麻黃湯主之。（方見上）"},{"v":"康","t":"大陽病，脈浮緊無汗，發熱身疼痛，八九日不解，表證仍在，(註此當發其汗。服藥已微除也。經)其人發煩，目瞑，劇者必衄（衄乃愈），所以然者，陽氣重故也，麻黃湯主之"}]},{"num":51,"t":"脈浮者，病在表，可發汗，宜麻黃湯。"},{"num":52,"t":"脈浮而數者，可發汗，宜麻黃湯。","d":[{"v":"桂","t":"脈浮者，病在表，可發汗，宜麻黃湯。（方見上）"},{"v":"桂","t":"脈浮而緊者，可發汗，宜麻黃湯。（方見上）"},{"v":"康","t":"脈浮者，病在表，可發汗，宜麻黃湯，脈浮而數，可發汗，宜麻黃湯"}]},{"num":55,"t":"傷寒脈浮緊，不發汗，因致衄者，麻黃湯主之。","d":[{"v":"桂","t":"傷寒，脈浮緊，不發汗，因致衄者，麻黃湯主之。（方見上）"},{"v":"康","t":"傷寒脈浮緊，不發汗，因到衄者，麻黃湯主之"}]},{"num":232,"t":"脈但浮，無餘證者，與麻黃湯。若不尿，腹滿加噦者，不治。","d":[{"v":"桂","t":"陽明中風，脈弦浮大，而短氣，腹都滿，脅下及心痛，久按之氣不通，鼻乾不得涕，嗜臥，一身及目悉黃，小便難，有潮熱，時時噦，耳前後腫，刺之小差，外不解。病過十日，脈續浮者，與小柴胡湯；脈但浮，無餘證者，與麻黃湯；若不尿，腹滿加噦者，不治。（小柴胡湯見上）"},{"v":"桂","t":"動作頭痛，短氣，有潮熱者，屬陽明也，白蜜煎主之。"},{"v":"康","t":"陽明病，中風，脈弦浮大，而短氣，腹都滿，脅下及心痛，久按之氣不通，鼻乾不得汗，嗜臥，一身及面目悉黃，小便難，有潮熱，時時噦，耳前後腫，刺之小差，外不解，病過十日，脈續浮者，與小柴胡湯，脈但浮，無餘症者，與麻黃湯，(註若不尿。腹滿加噦者。不治。)"}]},{"num":235,"t":"陽明病，脈浮，無汗而喘者，發汗則愈，宜麻黃湯。","d":[{"v":"桂","t":"陽明病，脈浮，無汗而喘者，發汗則愈，宜麻黃湯。（方見前）"}]},{"num":398,"t":"病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩，損穀則愈。","d":[{"v":"桂","t":"大病已解，而日暮微煩者，以病新差，人強與穀，脾胃之氣尚弱，不能消穀，故令微煩，損穀則愈。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨百合狐惑陰陽毒病脈證並治"},{"v":"桂","t":"百合病者，百脈一宗，悉致其病也。意欲食，複不能食，常默默，欲臥不能臥，欲行不能行，飲食或有美時，或有不欲聞食臭時，如寒無寒，如熱無熱，口苦，小便赤，諸藥不能治，得藥則劇吐利，如有神靈者，身形如和，其脈微數。每溺時頭痛者，六十日乃愈；若溺時頭不痛，淅淅然者，四十日愈；若溺時快然，但頭眩者，二十日愈。其證或未病而預見，或病四、五日始見，或病至二十日，或一月後見者，各隨其證，依法治之。"},{"v":"桂","t":"百合病，見於發汗之後者，百合知母湯主之。"},{"v":"桂","t":"百合病，見於下之後者，百合滑石代赭湯主之。"},{"v":"桂","t":"百合病，見於吐之後者，百合雞子黃湯主之。"},{"v":"桂","t":"百合病，不經發汗、吐下，病形如初者，百合地黃湯主之。"},{"v":"桂","t":"百合病一月不解，變成渴者，百合洗方主之。不差，栝蔞牡蠣散主之。"},{"v":"桂","t":"百合病變發熱者，百合滑石散主之。"},{"v":"桂","t":"百合病，見於陰者，以陽法救之；見於陽者，以陰法救之。見陽攻陰，復發其汗，此為逆；見陰攻陽，乃複下之，此亦為逆。"},{"v":"桂","t":"狐惑之為病，狀如傷寒，默默欲眠，目不得閉，臥起不安。蝕於喉為惑，蝕于陰為狐。不欲飲食，惡聞食臭，其面目乍赤、乍黑、乍白。蝕於上部則聲嗄，甘草瀉心湯主之；蝕於下部則咽乾，苦參湯洗之；蝕於肛者，雄黃薰之。"},{"v":"桂","t":"病者脈數，無熱，微煩，默默但欲臥，汗出。初得之三、四日，目赤如鳩眼；七、八日，目四眥黑。若能食者，膿已成也，赤豆當歸散主之。"},{"v":"桂","t":"陽毒之為病，面赤斑斑如錦紋，咽喉痛，唾膿血。五日可治，七日不可治，升麻鱉甲湯主之。"},{"v":"桂","t":"陰毒之為病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治。升麻鱉甲湯去雄黃蜀椒主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨瘧病脈證並治"},{"v":"桂","t":"師曰：瘧病，其脈弦數者，熱多寒少；其脈弦遲者，寒多熱少。脈弦而小緊者，可下之；弦遲者，可溫之；弦緊者，可汗之、針之、灸之；浮大者，可吐之；弦數者，風發也，當於少陽中求之。"},{"v":"桂","t":"問曰：瘧病以月一日發者，當以十五日愈，甚者當月盡解。如其不差，當云何？師曰：此結為癥瘕，必有瘧母，急治之，宜鱉甲煎丸。"},{"v":"桂","t":"師曰：陰氣孤絕，陽氣獨發，則熱而少氣煩悗，手足熱而欲嘔，此名疸瘧，白虎加桂枝人參湯主之。"},{"v":"桂","t":"瘧病，其病如平，身無寒，但熱，骨節疼煩，時作嘔，此名溫瘧，宜白虎加桂枝湯。"},{"v":"桂","t":"瘧病，多寒，或但寒不熱者，此名牡瘧，蜀漆散主之，柴胡桂薑湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨血痹虛勞病脈證並治"},{"v":"桂","t":"問曰：血痹之病，從何得之？師曰：夫尊榮之人，骨弱肌膚盛，重因疲勞汗出，臥不時動搖，加被微風，遂得之。但以脈寸口微澀，關上小緊，宜針引陽氣，令脈和、緊去則愈。"},{"v":"桂","t":"血痹，陰陽俱微，或寸口關上微，尺中小緊，外證身體不仁，如風痹狀，黃耆桂枝五物湯主之。"},{"v":"桂","t":"男子平人，脈大為勞，極虛亦為勞。"},{"v":"桂","t":"男子面色薄者，主渴及亡血。卒喘悸，脈浮者，裡虛也。"},{"v":"桂","t":"男子脈虛沉弦，無寒熱，短氣裡急，小便不利，面色白，時目瞑兼衄，少腹滿，此為勞使之然。"},{"v":"桂","t":"勞之為病，其脈浮大，手足煩，春夏劇，秋冬差，陰寒精自出，酸削不能行。"},{"v":"桂","t":"男子脈浮弱澀，為無子，精氣清冷。"},{"v":"桂","t":"失精家，少陰脈弦急，陰頭寒，目眩，發落。脈極虛芤遲者，為清穀、亡血、失精；脈得諸芤動微緊者，男子則失精，女子則夢交。桂枝龍骨牡蠣湯主之。天雄散亦主之。"},{"v":"桂","t":"男子平人，脈虛弱細微者，喜盜汗也。"},{"v":"桂","t":"人年五、六十，其脈大者，病痹挾背行；若腸鳴，馬刀挾癭者，皆為勞得之也。其脈小沉遲者，病脫氣，疾行則喘渴；手足逆寒者，亦勞之為病也。"},{"v":"桂","t":"虛勞裡急，悸，衄，腹中痛，夢失精，四肢酸疼，手足煩熱，咽乾口燥者，小建中湯主之。"},{"v":"桂","t":"虛勞裡急，諸不足者，黃耆建中湯主之。"},{"v":"桂","t":"虛勞腰痛，少腹拘急，小便不利者，腎氣丸主之。"},{"v":"桂","t":"虛勞虛煩不得眠，酸棗仁湯主之。"},{"v":"桂","t":"五勞虛極羸瘦，腹滿不能飲食，食傷，憂傷，飲傷，房室傷，饑傷，勞傷，經絡榮衛氣傷，內有乾血，肌膚甲錯，兩目黯黑，緩中補虛，大黃.蟲丸主之。"},{"v":"桂","t":"女勞，膀胱急，少腹滿，身盡黃，額上黑，足下熱，其腹脹如水狀，大便溏而黑，胸滿者難治。硝石礬石散主之。"},{"v":"桂","t":"傷寒雜病論卷第十四·辨咳嗽水飲黃汗歷節病脈證並治"},{"v":"桂","t":"師曰：咳嗽發於肺，不專屬於肺病也，五臟六腑感受客邪皆能致咳。"},{"v":"桂","t":"肺咳，脈短而澀。假令浮而澀，知受風邪；緊短而澀，知受寒邪；數短而澀，知受熱邪；急短而澀，知受燥邪；濡短而澀，知受濕邪。此肺咳之因也。其狀則喘息有音，甚則唾血。"},{"v":"桂","t":"心咳，脈大而散。假令浮大而散，知受風邪；緊大而散，知受寒邪；數大而散，知受熱邪；急大而散，知受燥邪；濡大而散，知受濕邪。此心咳之因也。其狀則心痛，喉仲介介如梗，甚則咽腫喉痹。"},{"v":"桂","t":"肝咳，脈弦而澀。假令浮弦而澀，知受風邪；弦緊而澀，知受寒邪；弦數而澀，知受熱邪；弦急而澀，知受燥邪；弦濡而澀，知受濕邪。此肝咳之因也。其狀則兩脅下痛，甚則不可以轉，轉則兩胠下滿。"},{"v":"桂","t":"脾咳，脈濡而澀。假令浮濡而澀，知受風邪；沉濡而澀，知受寒邪；數濡而澀，知受熱邪；急濡而澀，知受燥邪；遲濡而澀，知受濕邪。此脾咳之因也。其狀則右肋下痛，隱隱引背，甚則不可以動，動則咳劇。"},{"v":"桂","t":"腎咳，脈沉而濡。假令沉弦而濡，知受風邪；沉緊而濡，知受寒邪；沉數而濡，知受熱邪；沉急而濡，知受燥邪；沉滯而濡，知受濕邪。此腎咳之因也。其狀則肩背相引而痛，甚則咳涎。"},{"v":"桂","t":"肺咳不已，則流於大腸，脈與肺同，其狀則咳而遺矢也。"},{"v":"桂","t":"心咳不已，則流於小腸，脈與心同，其狀則咳而失氣，氣與咳俱失也。"},{"v":"桂","t":"肝咳不已，則流於膽，脈與肝同，其狀則嘔苦汁也。"},{"v":"桂","t":"脾咳不已，則流於胃，脈與脾同，其狀則嘔，嘔甚則長蟲出也。"},{"v":"桂","t":"腎咳不已，則流於膀胱，脈與腎同，其狀則咳而遺溺也。"},{"v":"桂","t":"久咳不已，則移于三焦，脈隨證易，其狀則咳而腹滿，不欲食飲也。"},{"v":"桂","t":"咳而有飲者，咳不得臥，臥則氣急，此為實；咳不能言，言則氣短，此為虛。咳病多端，治各異法。謹守其道，庶可萬全。"},{"v":"桂","t":"咳家其脈弦者，此為有水，十棗湯主之。"},{"v":"桂","t":"咳而氣逆，喉中作水雞聲者，射干麻黃湯主之。"},{"v":"桂","t":"咳逆上氣，時唾濁痰，但坐不得眠者，皂莢丸主之。"},{"v":"桂","t":"咳而脈浮者，厚朴麻黃湯主之。"},{"v":"桂","t":"咳而脈沉者，澤漆湯主之。"},{"v":"桂","t":"咳而上氣，咽喉不利，脈數者，麥門冬湯主之。"},{"v":"桂","t":"咳逆倚息，不得臥，脈浮弦者，小青龍湯主之。"},{"v":"桂","t":"咳而胸滿，振寒脈數，咽乾不渴，時出濁唾腥臭，久久吐膿，如米粥者，此為肺癰，桔梗湯主之。"},{"v":"桂","t":"咳而氣喘，目如脫狀，脈浮大者，此為肺脹，越婢加半夏湯主之；小青龍加石膏湯亦主之。"},{"v":"桂","t":"咳而氣逆，迫塞，胸滿而脹，一身面目浮腫，鼻出清涕，不聞香臭，此為肺脹，葶藶大棗瀉肺湯主之。"},{"v":"桂","t":"似咳非咳，唾多涎沫，其人不渴，此為肺冷，甘草乾薑湯主之。"},{"v":"桂","t":"咳而唾涎沫不止，咽燥，口渴，其脈浮細而數者，此為肺痿，炙甘草湯主之。"},{"v":"桂","t":"問曰：飲病奈何？師曰：飲病有四，曰痰飲，曰懸飲，曰溢飲，曰支飲。其人素盛今瘦，水走腸間，瀝瀝有聲，為痰飲；水流脅下，咳唾引痛，為懸飲；水歸四肢，當汗不汗，身體疼重，為溢飲；水停膈下，咳逆倚息，短氣不得臥，其形如腫，為支飲。"},{"v":"桂","t":"水在心，則心下堅築，短氣，惡水不欲飲；水在肺，必吐涎沫，欲飲水；水在脾，則少氣身重；水在肝，則脅下支滿，嚏則脅痛；水在腎，則心下悸。"},{"v":"桂","t":"心下有留飲，其人必背寒冷如掌大，咳則肋下痛引缺盆。"},{"v":"桂","t":"胸中有留飲，其人必短氣而渴，四肢歷節痛。"},{"v":"桂","t":"夫平人食少飲多，水停心下，久久成病。甚者則悸，微者短氣。脈雙弦者寒也，脈偏弦者飲也。"},{"v":"桂","t":"夫短氣有微飲者，當從小便去之。"},{"v":"桂","t":"病者脈伏，其人欲自利，利反快，雖利，心下續堅滿，此為留飲，甘遂半夏湯主之。"},{"v":"桂","t":"心下有痰飲，胸脅支滿，目眩，脈沉弦者，茯苓桂枝白朮甘草湯主之。"},{"v":"桂","t":"懸飲內痛，脈沉而弦者，十棗湯主之。（方見前）"},{"v":"桂","t":"病溢飲者，當發其汗，大青龍湯主之；小青龍湯亦主之。（方見前）"},{"v":"桂","t":"膈間支飲，其人喘滿，心下痞堅，面色黧黑，其脈沉緊，得之數十日，醫吐下之不愈者，木防己湯主之；不差，木防己去石膏加茯苓芒硝湯主之。"},{"v":"桂","t":"心下有支飲，其人苦冒眩，澤瀉湯主之。"},{"v":"桂","t":"支飲，胸滿者，厚朴大黃湯主之。"},{"v":"桂","t":"支飲，不得息，葶藶大棗瀉肺湯主之。（方見前）"},{"v":"桂","t":"支飲，口不渴，作嘔者，或吐水者，小半夏湯主之。"},{"v":"桂","t":"腹滿，口舌乾燥，腸間有水氣者，防己椒目葶藶大黃丸主之。"},{"v":"桂","t":"膈間有水氣，嘔吐眩悸者，小半夏加茯苓湯主之。"},{"v":"桂","t":"病人臍下悸，吐涎沫而頭眩者，此有水也，五苓散主之。"},{"v":"桂","t":"師曰：病有風水，有皮水，有正水，有石水，有黃汗。"},{"v":"桂","t":"風水其脈自浮，其證骨節疼痛，惡風。皮水其脈亦浮，其證胕腫，按之沒指，不惡風，腹如鼓，不渴，當發其汗。正水其脈沉遲，其證為喘。石水其脈自沉，其證腹滿不喘，當利其小便。黃汗其脈沉遲，其證發熱，胸滿，四肢頭面腫，久不愈，必致癰膿。"},{"v":"桂","t":"脈浮而洪，浮則為風，洪則為氣。風氣相搏，風強則為癮疹，身體為癢，癢者為瀉風，久為痂癩；氣強則為水，難以俯仰，身體洪腫，汗出乃愈。惡風則虛，此為風水；不惡風者，小便通利，上焦有寒，其口多涎，此為黃汗。"},{"v":"桂","t":"寸口脈沉滑者，中有水氣，面目腫大，有熱，名曰風水。其人之目窠上微腫，如蠶新臥起狀，其頸脈動，時時咳，按其手足上，陷而不起者，亦曰風水。"},{"v":"桂","t":"太陽病，脈浮而緊，法當骨節疼痛，今反不痛，體重而酸，其人不渴，此為風水，汗出即愈；惡寒者此為極虛，發汗得之。渴而不惡寒者，此為皮水。身腫而冷，狀如周痹，胸中窒，不能食，反聚痛，躁不得眠，此為黃汗。痛在骨節，咳而喘，不渴者，此為正水，其狀如腫，發汗則愈。然諸病此者，若渴而下利、小便數者，皆不可發汗，但當利其小便。"},{"v":"桂","t":"心水為病，其身重而少氣，不得臥，煩躁，陰腫。"},{"v":"桂","t":"肝水為病，其腹大，不能自轉側，脅下痛，津液微生，小便續通。"},{"v":"桂","t":"肺水為病，其身腫，小便難，時時鴨溏。"},{"v":"桂","t":"脾水為病，其腹大，四肢苦重，津液不生，但苦少氣，小便難。"},{"v":"桂","t":"腎水為病，其腹大，臍腫，腰痛，不行溺，陰下濕如牛鼻上汗，其足逆冷，面反瘦。"},{"v":"桂","t":"諸有水者，腰以下腫，當利小便；腰以上腫，當發汗乃愈。"},{"v":"桂","t":"寸口脈沉而遲，沉則為水，遲則為寒。寒水相搏，脾氣衰則鶩溏，胃氣衰則身腫，名曰水分。"},{"v":"桂","t":"少陽脈卑，少陰脈細，男子則小便不利，婦人則經水不利，名曰血分。"},{"v":"桂","t":"婦人經水，前斷後病水者，名曰血分，此病難治；先病水，後經水斷，名曰水分，此病易治，水去則經自下也。"},{"v":"桂","t":"寸口脈沉而數，數則為出，沉則為入，出為陽實，入為陰結；趺陽脈微而弦，微則無胃氣，弦則不得息；少陰脈沉而滑，沉為在裡，滑則為實，沉滑相搏，血結胞門，其瘕不瀉，經絡不通，名曰血分。"},{"v":"桂","t":"問曰：病者苦水，面目身體皆腫，四肢亦腫，小便不利，脈之，不言水，反言胸中痛，氣上沖咽，狀如炙肉，當微咳喘，審如師言，其脈何類？師曰：寸口脈沉而緊，沉為水，緊為寒，沉緊相搏，結在關元。"},{"v":"桂","t":"水之為病，其脈沉小者，屬少陰為石水；沉遲者，屬少陰為正水；浮而惡風者，為風水，屬太陽；浮而不惡風者，為皮水，屬太陽。虛腫者，屬氣分，發其汗即已；脈沉者，麻黃附子甘草湯主之；脈浮者，麻黃加朮湯主之。"},{"v":"桂","t":"風水，脈浮身重，汗出惡風者，防己黃耆湯主之。"},{"v":"桂","t":"風水，惡風，一身悉腫，脈浮不渴，續自汗出，無大熱者，越婢湯主之。"},{"v":"桂","t":"皮水，四肢腫，水氣在皮膚中，四肢聶聶動者，防己茯苓湯主之。"},{"v":"桂","t":"裡水，一身面目黃腫，其脈沉，小便不利，甘草麻黃湯主之；越婢加朮湯亦主之。"},{"v":"桂","t":"問曰：黃汗之為病，身體腫，若重汗出而發熱口渴，狀如風水，汗沾衣，色正黃如柏汁，脈自沉，從何得之？師曰：以汗出入水中浴，水從汗孔入得之，宜黃耆芍藥桂枝湯。"},{"v":"桂","t":"黃汗之為病，兩脛自冷；假令發熱，此屬歷節。食已汗出，暮常盜汗，此榮氣熱也；若汗出已，反發熱者，久久身必甲錯；若發熱不止者，久久必生惡瘡；若身重，汗出已，輒輕者，久久身必瞤，瞤即胸痛；"},{"v":"桂","t":"寸口脈沉而弱，沉即主骨，弱即主筋，沉即為腎，弱即為肝，汗出入水中，如水傷心，歷節痛，黃汗出，故曰歷節。"},{"v":"桂","t":"味酸則傷筋，筋傷則緩，名曰泄；鹹則傷骨，骨傷則痿，名曰枯；枯泄相搏，名曰斷泄。榮氣不通，衛不獨行，榮衛俱微，三焦無禦，四屬斷絕，身體羸瘦，獨足腫大，黃汗出，兩脛熱，便為歷節。"},{"v":"桂","t":"少陰脈浮而弱，弱則血不足，浮則為風，風血相搏，即疼痛如掣。"},{"v":"桂","t":"肥盛之人，脈澀小，短氣，自汗出，歷節疼，不可屈伸，此皆飲酒汗出當風所致也。"},{"v":"桂","t":"諸肢節疼痛，身體羸瘦，腳腫如脫，頭眩短氣，溫溫欲吐者，桂枝芍藥知母甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛不可屈伸，脈沉弱者，烏頭麻黃黃耆芍藥甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛，兩足腫，大小便不利，脈沉緊者，甘草麻黃湯主之；脈沉而細數者，越婢加白朮湯主之。（二方俱見前）"},{"v":"桂","t":"師曰：寸口脈遲而澀，遲則為寒，澀為血不足；趺陽脈微而遲，微則為氣，遲則為寒。胃氣不足，則手足逆冷；榮衛不利，則腹滿腸鳴相逐，氣轉膀胱，榮衛俱勞。陽氣不通即身冷，陰氣不通即骨疼。陽前通則惡寒，陰前通則痹不仁。陰陽相得，其氣乃行。大氣一轉，寒氣乃散。實則失氣，虛則遺溺，名曰氣分。"},{"v":"桂","t":"氣分，心下堅，大如盤，邊如旋杯，桂枝甘草麻黃生薑大棗細辛附子湯主之。"},{"v":"桂","t":"水飲，心下堅，大如盤，邊如旋杯，枳實白朮湯主之。"},{"v":"桂","t":"小便不利，其人有水氣，若渴者，栝蔞瞿麥薯蕷丸主之。"},{"v":"桂","t":"小便不利，其人有水氣在血分者，滑石亂髮白魚散主之；茯苓白朮戎鹽湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨瘀血吐衄下血瘡癰病脈證並治"},{"v":"桂","t":"病人胸滿、唇痿、舌青、口燥，但欲漱水，不欲咽，無寒熱，脈微大來遲，腹不滿，其言我滿，此為有瘀血。"},{"v":"桂","t":"病人如有熱狀，煩滿，口乾燥而渴，其脈反無熱，此為陰伏，是瘀血也，當下之，宜下瘀血湯。"},{"v":"桂","t":"膈間停留瘀血，若吐血色黑者，桔梗湯主之。"},{"v":"桂","t":"吐血不止者，柏葉湯主之；黃土湯亦主之。"},{"v":"桂","t":"心氣不足，吐血，若衄血者，瀉心湯主之。"},{"v":"桂","t":"下血，先便而後血者，此遠血也，黃土湯主之。（方見前）"},{"v":"桂","t":"下血，先血而便者，此近血也，赤豆當歸散主之。"},{"v":"桂","t":"師曰：病人面無色，無寒熱，脈沉弦者，必衄血；脈浮而弱，按之則絕者，必下血；煩而咳者，必吐血。"},{"v":"桂","t":"從春至夏衄血者，屬太陽也；從秋至冬衄血者，屬陽明也。"},{"v":"桂","t":"尺脈浮，目睛暈黃者，衄未止也；黃去睛慧了者，知衄已止。"},{"v":"桂","t":"問曰：寸口脈微浮而澀，法當亡血，若汗出，設不汗出者云何？師曰：若身有瘡，被刀斧所傷，亡血故也，此名金瘡。無膿者，王不留行散主之；有膿者，排膿散主之，排膿湯亦主之。"},{"v":"桂","t":"浸淫瘡，從口流向四肢者，可治；從四肢流來入口者，不可治。"},{"v":"桂","t":"浸淫瘡，黃連粉主之。"},{"v":"桂","t":"諸脈浮數，法當發熱，而反灑淅惡寒，若有痛處，當發其癰。"},{"v":"桂","t":"師曰：諸癰腫者，欲知有膿無膿，以手掩腫上，熱者，為有膿；不熱者，為無膿也。"},{"v":"桂","t":"腸癰之為病，其身甲錯，腹皮急，按之濡，如腫狀，腹無積聚，身無熱，脈數，此為腸內有癰也，薏苡附子敗醬散主之。"},{"v":"桂","t":"少腹腫痞，按之即痛如淋，小便自調，時時發熱，自汗出，複惡寒，此為腸外有癰也。其脈沉緊者，膿未成也，下之當有血；脈洪數者，膿已成也，可下之，大黃牡丹湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨胸痹病脈證並治"},{"v":"桂","t":"師曰：夫脈當取太過不及，陽微陰弦，即胸痹而痛；所以然者，責其極虛也。今陽虛，知在上焦，胸痹而痛者，以其陰弦故也。"},{"v":"桂","t":"平人無寒熱，胸痹，短氣不足以息者，實也。"},{"v":"桂","t":"胸痹，喘息、咳唾、胸背痛，寸脈沉遲，關上小緊數者，栝蔞薤白白酒湯主之。"},{"v":"桂","t":"胸痹不得臥，心痛徹背者，栝蔞薤白半夏湯主之。"},{"v":"桂","t":"胸痹，心中痞，留氣結在胸，胸滿，脅下逆搶心者，枳實薤白桂枝厚朴栝蔞湯主之；桂枝人參湯亦主之。"},{"v":"桂","t":"胸痹，胸中氣塞或短氣者，此胸中有水氣也，茯苓杏仁甘草湯主之；橘皮枳實生薑湯亦主之。"},{"v":"桂","t":"胸痹，時緩時急者，薏苡附子散主之。"},{"v":"桂","t":"胸痹，心中懸痛者，桂枝生薑枳實湯主之。"},{"v":"桂","t":"胸痹，胸痛徹背，背痛徹胸者，烏頭赤石脂丸主之。"},{"v":"桂","t":"胸痹，其人常欲蹈其胸上，先未苦時，但欲飲熱者，旋覆花湯主之。"},{"v":"桂","t":"胸痹，心下悸者，責其有痰也，半夏麻黃丸主之。"},{"v":"桂","t":"胸痹，心下痛，或有惡血積冷者，九痛丸主之。"},{"v":"桂","t":"傷寒雜病論卷第十六·辨婦人各病脈證並治"},{"v":"桂","t":"師曰：婦人得平脈，陰脈小弱，其人嘔，不能食，無寒熱，此為妊娠，桂枝湯主之。於法六十日當有此證。設有醫治逆者，卻一月加吐下者，則絕之。"},{"v":"桂","t":"婦人宿有癥病，經斷未及三月，而得漏下不止，胎動在臍上者，此為癥痼害。妊娠六月動者，前三月經水利時，胎也。下血者，斷後三月衄也。所以血不止者，其癥不去故也，當下其癥，桂枝茯苓丸主之。"},{"v":"桂","t":"婦人懷孕六七月，脈弦，發熱，其胎愈脹，腹痛，惡寒，少腹如扇，所以然者，子藏開故也，當以附子湯溫之。"},{"v":"桂","t":"師曰：婦人有漏下者；有半產後續下血都不絕者；假令妊娠腹中痛者，此為胞阻，膠艾湯主之。"},{"v":"桂","t":"婦人懷妊，腹中.痛，當歸芍藥散主之。"},{"v":"桂","t":"妊娠，嘔吐不止，乾薑人參半夏丸主之。"},{"v":"桂","t":"妊娠，小便難，飲食如故，當歸貝母苦參丸主之。"},{"v":"桂","t":"妊娠，有水氣，小便不利，灑淅惡寒，起即頭眩，葵子茯苓散主之。"},{"v":"桂","t":"婦人妊娠，身無他病，宜常服當歸散，則臨產不難，產後亦免生他病。"},{"v":"桂","t":"妊娠，身有寒濕，或腹痛，或心煩心痛，不能飲食，其胎躍躍動者，宜養之，白朮散主之。"},{"v":"桂","t":"婦人懷身七月，腹滿不得小便，從腰以下如有水狀，此太陰當養不養，心氣實也，宜瀉勞宮、關元，小便利則愈。"},{"v":"桂","t":"問曰：新產婦人有三病，一者病痙，二者郁冒，三者大便難，何謂也？"},{"v":"桂","t":"產婦郁冒，其脈微弱，嘔不能食，大便反堅，但頭汗出。所以然者，血虛而厥，厥則必冒，冒家欲解，必大汗出，以血虛下厥，孤陽上出，故頭汗出也。所以產婦喜汗出者，亡陰血虛，陽氣獨盛，故當汗出，陰陽乃複。大便堅，嘔不能食者，小柴胡湯主之。"},{"v":"桂","t":"郁冒病解，能食，七八日更發熱者，此為胃實，大承氣湯主之。"},{"v":"桂","t":"產後腹中絞痛，若虛寒不足者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"產後腹痛，煩滿不得臥，不可下也，宜枳實芍藥散和之。"},{"v":"桂","t":"師曰：產後腹痛，法當以枳實芍藥散；假令不愈，必腹中有瘀血著臍下也，下瘀血湯主之。"},{"v":"桂","t":"產後七八日，無太陽證，少腹堅痛，此惡露不盡也；若不大便，煩躁發熱，脈微實者，宜和之；若日晡所煩躁，食則譫語，至夜即愈者，大承氣湯主之。（方見前）"},{"v":"桂","t":"產後中風，數十日不解，頭痛，惡寒，發熱，心下滿，乾嘔，續自微汗出，小柴胡湯主之。（方見前）"},{"v":"桂","t":"產後中風，發熱，面赤，頭痛，汗出而喘，脈弦數者，竹葉湯主之。"},{"v":"桂","t":"產後煩亂，嘔逆，無外證者，此乳中虛也，竹皮大丸主之。"},{"v":"桂","t":"產後下利，脈虛極者，白頭翁加甘草阿膠湯主之。"},{"v":"桂","t":"婦人咽中如有炙臠者，半夏厚朴茯苓生薑湯主之。"},{"v":"桂","t":"婦人臟燥，悲傷欲哭，數欠伸，象如神靈所作者，甘草小麥大棗湯主之。"},{"v":"桂","t":"婦人吐涎沫，醫反下之，心下即痞，當先治其吐涎沫，後治其痞。治吐宜桔梗甘草茯苓澤瀉湯，治痞宜瀉心湯。"},{"v":"桂","t":"婦人之病，因虛積冷結，為諸經水斷絕，血結胞門。或繞臍疼痛，狀如寒疝；或痛在關元，肌若魚鱗；或陰中掣痛，少腹惡寒；或引腰脊，或下氣街；此皆帶下。萬病一言，察其寒、熱、虛、實、緊、弦，行其針藥，各探其源。子當辨記，勿謂不然。"},{"v":"桂","t":"問曰：婦人年五十所，病下血數十日不止，暮即發熱，少腹裡急，腹滿，手掌煩熱，唇口乾燥，何也？師曰：此病屬帶下，何以知之？曾經半產，瘀血在少腹不去，故唇口乾燥也，溫經湯主之。"},{"v":"桂","t":"經水不利，少腹滿痛，或一月再經者，王瓜根散主之。陰腫者，亦主之。"},{"v":"桂","t":"婦人半產，若漏下者，旋覆花湯主之；脈虛弱者，黃耆當歸湯主之。"},{"v":"桂","t":"婦人陷經漏下，色黑如塊者，膠薑湯主之。"},{"v":"桂","t":"婦人少腹滿如敦狀，小便微難而不渴，或經後產後者，此為水與血俱結在血室也，大黃甘遂阿膠湯主之。"},{"v":"桂","t":"婦人時腹痛，經水時行時止，止而複行者，抵當湯主之。"},{"v":"桂","t":"婦人經水閉，臟堅癖，下白物不止，此中有乾血也，礬石丸主之。"},{"v":"桂","t":"婦人六十二種風證，腹中氣血如刺痛者，紅藍花酒主之。"},{"v":"桂","t":"婦人腹中諸病痛者，當歸芍藥散主之，小建中湯亦主之。（當歸芍藥散見前）"},{"v":"桂","t":"問曰：婦人病，飲食如故，煩熱不得臥，而反倚息者，何也？師曰：此名轉胞，不得溺也，以胞系了戾，故致此病，但利小便則愈，腎氣丸主之。"},{"v":"桂","t":"婦人陰寒，蛇床子散主之。"},{"v":"桂","t":"少陰脈滑而數者，陰中瘡也，蝕爛者，狼牙湯主之。"},{"v":"桂","t":"胃氣下泄，陰吹而喧，如失氣者，此穀道實也，豬膏髮煎主之。"},{"v":"康","t":"凡療治之方有奇恆之理奧毒藥之化機又經旨之所秘多傳方文字傳法□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□中之學先講家傳之論說而後可令逅四部之教習□也"},{"v":"康","t":"康平三年二月十七日"}]}],"hl":"麻黃（三兩，去節）　桂枝（二兩，去皮）　甘草（一兩，炙）　杏仁（七十個，去皮尖）","cm":"右四味，以水九升，先煮麻黃，減二升，去上沫，內諸藥，煮取二升半，去滓，溫服八合。覆取微似汗，不須啜粥。餘如桂枝法將息。"},{"n":"大青龍湯","c":"太陽病","tw":31.0,"fp":{"苦":19.4,"辛":25.8,"甘":61.3},"pf":"甘","fr":["甘","辛","苦"],"ns":1.29,"nt":"偏溫","ng":{"寒涼":9.7,"溫熱":74.2,"平":16.1},"hd":[{"n":"麻黃","w":6,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"杏仁","w":12.0,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世多以杏仁味苦。《名醫別錄》載「味苦，溫，有毒」。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。\n【按】生薑為鮮品，本研究設辛微溫，以區別乾姜辛溫。"},{"n":"大棗","w":3.0,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"石膏","w":3,"f":["辛"],"t":"微寒","bt":"石膏　味辛微寒。主治中風寒熱，心下逆氣驚喘，口乾舌焦不得息，腹中堅痛，除邪鬼，產乳，金創。生山谷。"}],"cl":[{"num":38,"t":"太陽中風，脈浮緊，發熱，惡寒，身疼痛，不汗出而煩躁者，大青龍湯主之。若脈微弱，汗出惡風者，不可服之，服之則厥逆、筋惕肉瞤，此為逆也。","d":[{"v":"桂","t":"太陽傷寒，脈浮緊，發熱，惡寒，身疼痛，不汗出而煩躁者，大青龍湯主之；若脈微弱，汗出惡風者，不可服之，服之則厥逆，筋惕肉瞤，此為逆也。"},{"v":"康","t":"大陽中風，脈浮緊，發熱惡寒，身疼痛，不汗出而煩燥者，大青龍湯主之，若脈微弱，汗出惡風者，不可服之，服之則厥逆，筋惕肉瞤"}]},{"num":39,"t":"傷寒脈浮緩，身不疼，但重，乍有輕時，無少陰證者，大青龍湯發之。"},{"num":398,"t":"病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩，損穀則愈。","d":[{"v":"桂","t":"大病已解，而日暮微煩者，以病新差，人強與穀，脾胃之氣尚弱，不能消穀，故令微煩，損穀則愈。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨百合狐惑陰陽毒病脈證並治"},{"v":"桂","t":"百合病者，百脈一宗，悉致其病也。意欲食，複不能食，常默默，欲臥不能臥，欲行不能行，飲食或有美時，或有不欲聞食臭時，如寒無寒，如熱無熱，口苦，小便赤，諸藥不能治，得藥則劇吐利，如有神靈者，身形如和，其脈微數。每溺時頭痛者，六十日乃愈；若溺時頭不痛，淅淅然者，四十日愈；若溺時快然，但頭眩者，二十日愈。其證或未病而預見，或病四、五日始見，或病至二十日，或一月後見者，各隨其證，依法治之。"},{"v":"桂","t":"百合病，見於發汗之後者，百合知母湯主之。"},{"v":"桂","t":"百合病，見於下之後者，百合滑石代赭湯主之。"},{"v":"桂","t":"百合病，見於吐之後者，百合雞子黃湯主之。"},{"v":"桂","t":"百合病，不經發汗、吐下，病形如初者，百合地黃湯主之。"},{"v":"桂","t":"百合病一月不解，變成渴者，百合洗方主之。不差，栝蔞牡蠣散主之。"},{"v":"桂","t":"百合病變發熱者，百合滑石散主之。"},{"v":"桂","t":"百合病，見於陰者，以陽法救之；見於陽者，以陰法救之。見陽攻陰，復發其汗，此為逆；見陰攻陽，乃複下之，此亦為逆。"},{"v":"桂","t":"狐惑之為病，狀如傷寒，默默欲眠，目不得閉，臥起不安。蝕於喉為惑，蝕于陰為狐。不欲飲食，惡聞食臭，其面目乍赤、乍黑、乍白。蝕於上部則聲嗄，甘草瀉心湯主之；蝕於下部則咽乾，苦參湯洗之；蝕於肛者，雄黃薰之。"},{"v":"桂","t":"病者脈數，無熱，微煩，默默但欲臥，汗出。初得之三、四日，目赤如鳩眼；七、八日，目四眥黑。若能食者，膿已成也，赤豆當歸散主之。"},{"v":"桂","t":"陽毒之為病，面赤斑斑如錦紋，咽喉痛，唾膿血。五日可治，七日不可治，升麻鱉甲湯主之。"},{"v":"桂","t":"陰毒之為病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治。升麻鱉甲湯去雄黃蜀椒主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨瘧病脈證並治"},{"v":"桂","t":"師曰：瘧病，其脈弦數者，熱多寒少；其脈弦遲者，寒多熱少。脈弦而小緊者，可下之；弦遲者，可溫之；弦緊者，可汗之、針之、灸之；浮大者，可吐之；弦數者，風發也，當於少陽中求之。"},{"v":"桂","t":"問曰：瘧病以月一日發者，當以十五日愈，甚者當月盡解。如其不差，當云何？師曰：此結為癥瘕，必有瘧母，急治之，宜鱉甲煎丸。"},{"v":"桂","t":"師曰：陰氣孤絕，陽氣獨發，則熱而少氣煩悗，手足熱而欲嘔，此名疸瘧，白虎加桂枝人參湯主之。"},{"v":"桂","t":"瘧病，其病如平，身無寒，但熱，骨節疼煩，時作嘔，此名溫瘧，宜白虎加桂枝湯。"},{"v":"桂","t":"瘧病，多寒，或但寒不熱者，此名牡瘧，蜀漆散主之，柴胡桂薑湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨血痹虛勞病脈證並治"},{"v":"桂","t":"問曰：血痹之病，從何得之？師曰：夫尊榮之人，骨弱肌膚盛，重因疲勞汗出，臥不時動搖，加被微風，遂得之。但以脈寸口微澀，關上小緊，宜針引陽氣，令脈和、緊去則愈。"},{"v":"桂","t":"血痹，陰陽俱微，或寸口關上微，尺中小緊，外證身體不仁，如風痹狀，黃耆桂枝五物湯主之。"},{"v":"桂","t":"男子平人，脈大為勞，極虛亦為勞。"},{"v":"桂","t":"男子面色薄者，主渴及亡血。卒喘悸，脈浮者，裡虛也。"},{"v":"桂","t":"男子脈虛沉弦，無寒熱，短氣裡急，小便不利，面色白，時目瞑兼衄，少腹滿，此為勞使之然。"},{"v":"桂","t":"勞之為病，其脈浮大，手足煩，春夏劇，秋冬差，陰寒精自出，酸削不能行。"},{"v":"桂","t":"男子脈浮弱澀，為無子，精氣清冷。"},{"v":"桂","t":"失精家，少陰脈弦急，陰頭寒，目眩，發落。脈極虛芤遲者，為清穀、亡血、失精；脈得諸芤動微緊者，男子則失精，女子則夢交。桂枝龍骨牡蠣湯主之。天雄散亦主之。"},{"v":"桂","t":"男子平人，脈虛弱細微者，喜盜汗也。"},{"v":"桂","t":"人年五、六十，其脈大者，病痹挾背行；若腸鳴，馬刀挾癭者，皆為勞得之也。其脈小沉遲者，病脫氣，疾行則喘渴；手足逆寒者，亦勞之為病也。"},{"v":"桂","t":"虛勞裡急，悸，衄，腹中痛，夢失精，四肢酸疼，手足煩熱，咽乾口燥者，小建中湯主之。"},{"v":"桂","t":"虛勞裡急，諸不足者，黃耆建中湯主之。"},{"v":"桂","t":"虛勞腰痛，少腹拘急，小便不利者，腎氣丸主之。"},{"v":"桂","t":"虛勞虛煩不得眠，酸棗仁湯主之。"},{"v":"桂","t":"五勞虛極羸瘦，腹滿不能飲食，食傷，憂傷，飲傷，房室傷，饑傷，勞傷，經絡榮衛氣傷，內有乾血，肌膚甲錯，兩目黯黑，緩中補虛，大黃.蟲丸主之。"},{"v":"桂","t":"女勞，膀胱急，少腹滿，身盡黃，額上黑，足下熱，其腹脹如水狀，大便溏而黑，胸滿者難治。硝石礬石散主之。"},{"v":"桂","t":"傷寒雜病論卷第十四·辨咳嗽水飲黃汗歷節病脈證並治"},{"v":"桂","t":"師曰：咳嗽發於肺，不專屬於肺病也，五臟六腑感受客邪皆能致咳。"},{"v":"桂","t":"肺咳，脈短而澀。假令浮而澀，知受風邪；緊短而澀，知受寒邪；數短而澀，知受熱邪；急短而澀，知受燥邪；濡短而澀，知受濕邪。此肺咳之因也。其狀則喘息有音，甚則唾血。"},{"v":"桂","t":"心咳，脈大而散。假令浮大而散，知受風邪；緊大而散，知受寒邪；數大而散，知受熱邪；急大而散，知受燥邪；濡大而散，知受濕邪。此心咳之因也。其狀則心痛，喉仲介介如梗，甚則咽腫喉痹。"},{"v":"桂","t":"肝咳，脈弦而澀。假令浮弦而澀，知受風邪；弦緊而澀，知受寒邪；弦數而澀，知受熱邪；弦急而澀，知受燥邪；弦濡而澀，知受濕邪。此肝咳之因也。其狀則兩脅下痛，甚則不可以轉，轉則兩胠下滿。"},{"v":"桂","t":"脾咳，脈濡而澀。假令浮濡而澀，知受風邪；沉濡而澀，知受寒邪；數濡而澀，知受熱邪；急濡而澀，知受燥邪；遲濡而澀，知受濕邪。此脾咳之因也。其狀則右肋下痛，隱隱引背，甚則不可以動，動則咳劇。"},{"v":"桂","t":"腎咳，脈沉而濡。假令沉弦而濡，知受風邪；沉緊而濡，知受寒邪；沉數而濡，知受熱邪；沉急而濡，知受燥邪；沉滯而濡，知受濕邪。此腎咳之因也。其狀則肩背相引而痛，甚則咳涎。"},{"v":"桂","t":"肺咳不已，則流於大腸，脈與肺同，其狀則咳而遺矢也。"},{"v":"桂","t":"心咳不已，則流於小腸，脈與心同，其狀則咳而失氣，氣與咳俱失也。"},{"v":"桂","t":"肝咳不已，則流於膽，脈與肝同，其狀則嘔苦汁也。"},{"v":"桂","t":"脾咳不已，則流於胃，脈與脾同，其狀則嘔，嘔甚則長蟲出也。"},{"v":"桂","t":"腎咳不已，則流於膀胱，脈與腎同，其狀則咳而遺溺也。"},{"v":"桂","t":"久咳不已，則移于三焦，脈隨證易，其狀則咳而腹滿，不欲食飲也。"},{"v":"桂","t":"咳而有飲者，咳不得臥，臥則氣急，此為實；咳不能言，言則氣短，此為虛。咳病多端，治各異法。謹守其道，庶可萬全。"},{"v":"桂","t":"咳家其脈弦者，此為有水，十棗湯主之。"},{"v":"桂","t":"咳而氣逆，喉中作水雞聲者，射干麻黃湯主之。"},{"v":"桂","t":"咳逆上氣，時唾濁痰，但坐不得眠者，皂莢丸主之。"},{"v":"桂","t":"咳而脈浮者，厚朴麻黃湯主之。"},{"v":"桂","t":"咳而脈沉者，澤漆湯主之。"},{"v":"桂","t":"咳而上氣，咽喉不利，脈數者，麥門冬湯主之。"},{"v":"桂","t":"咳逆倚息，不得臥，脈浮弦者，小青龍湯主之。"},{"v":"桂","t":"咳而胸滿，振寒脈數，咽乾不渴，時出濁唾腥臭，久久吐膿，如米粥者，此為肺癰，桔梗湯主之。"},{"v":"桂","t":"咳而氣喘，目如脫狀，脈浮大者，此為肺脹，越婢加半夏湯主之；小青龍加石膏湯亦主之。"},{"v":"桂","t":"咳而氣逆，迫塞，胸滿而脹，一身面目浮腫，鼻出清涕，不聞香臭，此為肺脹，葶藶大棗瀉肺湯主之。"},{"v":"桂","t":"似咳非咳，唾多涎沫，其人不渴，此為肺冷，甘草乾薑湯主之。"},{"v":"桂","t":"咳而唾涎沫不止，咽燥，口渴，其脈浮細而數者，此為肺痿，炙甘草湯主之。"},{"v":"桂","t":"問曰：飲病奈何？師曰：飲病有四，曰痰飲，曰懸飲，曰溢飲，曰支飲。其人素盛今瘦，水走腸間，瀝瀝有聲，為痰飲；水流脅下，咳唾引痛，為懸飲；水歸四肢，當汗不汗，身體疼重，為溢飲；水停膈下，咳逆倚息，短氣不得臥，其形如腫，為支飲。"},{"v":"桂","t":"水在心，則心下堅築，短氣，惡水不欲飲；水在肺，必吐涎沫，欲飲水；水在脾，則少氣身重；水在肝，則脅下支滿，嚏則脅痛；水在腎，則心下悸。"},{"v":"桂","t":"心下有留飲，其人必背寒冷如掌大，咳則肋下痛引缺盆。"},{"v":"桂","t":"胸中有留飲，其人必短氣而渴，四肢歷節痛。"},{"v":"桂","t":"夫平人食少飲多，水停心下，久久成病。甚者則悸，微者短氣。脈雙弦者寒也，脈偏弦者飲也。"},{"v":"桂","t":"夫短氣有微飲者，當從小便去之。"},{"v":"桂","t":"病者脈伏，其人欲自利，利反快，雖利，心下續堅滿，此為留飲，甘遂半夏湯主之。"},{"v":"桂","t":"心下有痰飲，胸脅支滿，目眩，脈沉弦者，茯苓桂枝白朮甘草湯主之。"},{"v":"桂","t":"懸飲內痛，脈沉而弦者，十棗湯主之。（方見前）"},{"v":"桂","t":"病溢飲者，當發其汗，大青龍湯主之；小青龍湯亦主之。（方見前）"},{"v":"桂","t":"膈間支飲，其人喘滿，心下痞堅，面色黧黑，其脈沉緊，得之數十日，醫吐下之不愈者，木防己湯主之；不差，木防己去石膏加茯苓芒硝湯主之。"},{"v":"桂","t":"心下有支飲，其人苦冒眩，澤瀉湯主之。"},{"v":"桂","t":"支飲，胸滿者，厚朴大黃湯主之。"},{"v":"桂","t":"支飲，不得息，葶藶大棗瀉肺湯主之。（方見前）"},{"v":"桂","t":"支飲，口不渴，作嘔者，或吐水者，小半夏湯主之。"},{"v":"桂","t":"腹滿，口舌乾燥，腸間有水氣者，防己椒目葶藶大黃丸主之。"},{"v":"桂","t":"膈間有水氣，嘔吐眩悸者，小半夏加茯苓湯主之。"},{"v":"桂","t":"病人臍下悸，吐涎沫而頭眩者，此有水也，五苓散主之。"},{"v":"桂","t":"師曰：病有風水，有皮水，有正水，有石水，有黃汗。"},{"v":"桂","t":"風水其脈自浮，其證骨節疼痛，惡風。皮水其脈亦浮，其證胕腫，按之沒指，不惡風，腹如鼓，不渴，當發其汗。正水其脈沉遲，其證為喘。石水其脈自沉，其證腹滿不喘，當利其小便。黃汗其脈沉遲，其證發熱，胸滿，四肢頭面腫，久不愈，必致癰膿。"},{"v":"桂","t":"脈浮而洪，浮則為風，洪則為氣。風氣相搏，風強則為癮疹，身體為癢，癢者為瀉風，久為痂癩；氣強則為水，難以俯仰，身體洪腫，汗出乃愈。惡風則虛，此為風水；不惡風者，小便通利，上焦有寒，其口多涎，此為黃汗。"},{"v":"桂","t":"寸口脈沉滑者，中有水氣，面目腫大，有熱，名曰風水。其人之目窠上微腫，如蠶新臥起狀，其頸脈動，時時咳，按其手足上，陷而不起者，亦曰風水。"},{"v":"桂","t":"太陽病，脈浮而緊，法當骨節疼痛，今反不痛，體重而酸，其人不渴，此為風水，汗出即愈；惡寒者此為極虛，發汗得之。渴而不惡寒者，此為皮水。身腫而冷，狀如周痹，胸中窒，不能食，反聚痛，躁不得眠，此為黃汗。痛在骨節，咳而喘，不渴者，此為正水，其狀如腫，發汗則愈。然諸病此者，若渴而下利、小便數者，皆不可發汗，但當利其小便。"},{"v":"桂","t":"心水為病，其身重而少氣，不得臥，煩躁，陰腫。"},{"v":"桂","t":"肝水為病，其腹大，不能自轉側，脅下痛，津液微生，小便續通。"},{"v":"桂","t":"肺水為病，其身腫，小便難，時時鴨溏。"},{"v":"桂","t":"脾水為病，其腹大，四肢苦重，津液不生，但苦少氣，小便難。"},{"v":"桂","t":"腎水為病，其腹大，臍腫，腰痛，不行溺，陰下濕如牛鼻上汗，其足逆冷，面反瘦。"},{"v":"桂","t":"諸有水者，腰以下腫，當利小便；腰以上腫，當發汗乃愈。"},{"v":"桂","t":"寸口脈沉而遲，沉則為水，遲則為寒。寒水相搏，脾氣衰則鶩溏，胃氣衰則身腫，名曰水分。"},{"v":"桂","t":"少陽脈卑，少陰脈細，男子則小便不利，婦人則經水不利，名曰血分。"},{"v":"桂","t":"婦人經水，前斷後病水者，名曰血分，此病難治；先病水，後經水斷，名曰水分，此病易治，水去則經自下也。"},{"v":"桂","t":"寸口脈沉而數，數則為出，沉則為入，出為陽實，入為陰結；趺陽脈微而弦，微則無胃氣，弦則不得息；少陰脈沉而滑，沉為在裡，滑則為實，沉滑相搏，血結胞門，其瘕不瀉，經絡不通，名曰血分。"},{"v":"桂","t":"問曰：病者苦水，面目身體皆腫，四肢亦腫，小便不利，脈之，不言水，反言胸中痛，氣上沖咽，狀如炙肉，當微咳喘，審如師言，其脈何類？師曰：寸口脈沉而緊，沉為水，緊為寒，沉緊相搏，結在關元。"},{"v":"桂","t":"水之為病，其脈沉小者，屬少陰為石水；沉遲者，屬少陰為正水；浮而惡風者，為風水，屬太陽；浮而不惡風者，為皮水，屬太陽。虛腫者，屬氣分，發其汗即已；脈沉者，麻黃附子甘草湯主之；脈浮者，麻黃加朮湯主之。"},{"v":"桂","t":"風水，脈浮身重，汗出惡風者，防己黃耆湯主之。"},{"v":"桂","t":"風水，惡風，一身悉腫，脈浮不渴，續自汗出，無大熱者，越婢湯主之。"},{"v":"桂","t":"皮水，四肢腫，水氣在皮膚中，四肢聶聶動者，防己茯苓湯主之。"},{"v":"桂","t":"裡水，一身面目黃腫，其脈沉，小便不利，甘草麻黃湯主之；越婢加朮湯亦主之。"},{"v":"桂","t":"問曰：黃汗之為病，身體腫，若重汗出而發熱口渴，狀如風水，汗沾衣，色正黃如柏汁，脈自沉，從何得之？師曰：以汗出入水中浴，水從汗孔入得之，宜黃耆芍藥桂枝湯。"},{"v":"桂","t":"黃汗之為病，兩脛自冷；假令發熱，此屬歷節。食已汗出，暮常盜汗，此榮氣熱也；若汗出已，反發熱者，久久身必甲錯；若發熱不止者，久久必生惡瘡；若身重，汗出已，輒輕者，久久身必瞤，瞤即胸痛；"},{"v":"桂","t":"寸口脈沉而弱，沉即主骨，弱即主筋，沉即為腎，弱即為肝，汗出入水中，如水傷心，歷節痛，黃汗出，故曰歷節。"},{"v":"桂","t":"味酸則傷筋，筋傷則緩，名曰泄；鹹則傷骨，骨傷則痿，名曰枯；枯泄相搏，名曰斷泄。榮氣不通，衛不獨行，榮衛俱微，三焦無禦，四屬斷絕，身體羸瘦，獨足腫大，黃汗出，兩脛熱，便為歷節。"},{"v":"桂","t":"少陰脈浮而弱，弱則血不足，浮則為風，風血相搏，即疼痛如掣。"},{"v":"桂","t":"肥盛之人，脈澀小，短氣，自汗出，歷節疼，不可屈伸，此皆飲酒汗出當風所致也。"},{"v":"桂","t":"諸肢節疼痛，身體羸瘦，腳腫如脫，頭眩短氣，溫溫欲吐者，桂枝芍藥知母甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛不可屈伸，脈沉弱者，烏頭麻黃黃耆芍藥甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛，兩足腫，大小便不利，脈沉緊者，甘草麻黃湯主之；脈沉而細數者，越婢加白朮湯主之。（二方俱見前）"},{"v":"桂","t":"師曰：寸口脈遲而澀，遲則為寒，澀為血不足；趺陽脈微而遲，微則為氣，遲則為寒。胃氣不足，則手足逆冷；榮衛不利，則腹滿腸鳴相逐，氣轉膀胱，榮衛俱勞。陽氣不通即身冷，陰氣不通即骨疼。陽前通則惡寒，陰前通則痹不仁。陰陽相得，其氣乃行。大氣一轉，寒氣乃散。實則失氣，虛則遺溺，名曰氣分。"},{"v":"桂","t":"氣分，心下堅，大如盤，邊如旋杯，桂枝甘草麻黃生薑大棗細辛附子湯主之。"},{"v":"桂","t":"水飲，心下堅，大如盤，邊如旋杯，枳實白朮湯主之。"},{"v":"桂","t":"小便不利，其人有水氣，若渴者，栝蔞瞿麥薯蕷丸主之。"},{"v":"桂","t":"小便不利，其人有水氣在血分者，滑石亂髮白魚散主之；茯苓白朮戎鹽湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨瘀血吐衄下血瘡癰病脈證並治"},{"v":"桂","t":"病人胸滿、唇痿、舌青、口燥，但欲漱水，不欲咽，無寒熱，脈微大來遲，腹不滿，其言我滿，此為有瘀血。"},{"v":"桂","t":"病人如有熱狀，煩滿，口乾燥而渴，其脈反無熱，此為陰伏，是瘀血也，當下之，宜下瘀血湯。"},{"v":"桂","t":"膈間停留瘀血，若吐血色黑者，桔梗湯主之。"},{"v":"桂","t":"吐血不止者，柏葉湯主之；黃土湯亦主之。"},{"v":"桂","t":"心氣不足，吐血，若衄血者，瀉心湯主之。"},{"v":"桂","t":"下血，先便而後血者，此遠血也，黃土湯主之。（方見前）"},{"v":"桂","t":"下血，先血而便者，此近血也，赤豆當歸散主之。"},{"v":"桂","t":"師曰：病人面無色，無寒熱，脈沉弦者，必衄血；脈浮而弱，按之則絕者，必下血；煩而咳者，必吐血。"},{"v":"桂","t":"從春至夏衄血者，屬太陽也；從秋至冬衄血者，屬陽明也。"},{"v":"桂","t":"尺脈浮，目睛暈黃者，衄未止也；黃去睛慧了者，知衄已止。"},{"v":"桂","t":"問曰：寸口脈微浮而澀，法當亡血，若汗出，設不汗出者云何？師曰：若身有瘡，被刀斧所傷，亡血故也，此名金瘡。無膿者，王不留行散主之；有膿者，排膿散主之，排膿湯亦主之。"},{"v":"桂","t":"浸淫瘡，從口流向四肢者，可治；從四肢流來入口者，不可治。"},{"v":"桂","t":"浸淫瘡，黃連粉主之。"},{"v":"桂","t":"諸脈浮數，法當發熱，而反灑淅惡寒，若有痛處，當發其癰。"},{"v":"桂","t":"師曰：諸癰腫者，欲知有膿無膿，以手掩腫上，熱者，為有膿；不熱者，為無膿也。"},{"v":"桂","t":"腸癰之為病，其身甲錯，腹皮急，按之濡，如腫狀，腹無積聚，身無熱，脈數，此為腸內有癰也，薏苡附子敗醬散主之。"},{"v":"桂","t":"少腹腫痞，按之即痛如淋，小便自調，時時發熱，自汗出，複惡寒，此為腸外有癰也。其脈沉緊者，膿未成也，下之當有血；脈洪數者，膿已成也，可下之，大黃牡丹湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨胸痹病脈證並治"},{"v":"桂","t":"師曰：夫脈當取太過不及，陽微陰弦，即胸痹而痛；所以然者，責其極虛也。今陽虛，知在上焦，胸痹而痛者，以其陰弦故也。"},{"v":"桂","t":"平人無寒熱，胸痹，短氣不足以息者，實也。"},{"v":"桂","t":"胸痹，喘息、咳唾、胸背痛，寸脈沉遲，關上小緊數者，栝蔞薤白白酒湯主之。"},{"v":"桂","t":"胸痹不得臥，心痛徹背者，栝蔞薤白半夏湯主之。"},{"v":"桂","t":"胸痹，心中痞，留氣結在胸，胸滿，脅下逆搶心者，枳實薤白桂枝厚朴栝蔞湯主之；桂枝人參湯亦主之。"},{"v":"桂","t":"胸痹，胸中氣塞或短氣者，此胸中有水氣也，茯苓杏仁甘草湯主之；橘皮枳實生薑湯亦主之。"},{"v":"桂","t":"胸痹，時緩時急者，薏苡附子散主之。"},{"v":"桂","t":"胸痹，心中懸痛者，桂枝生薑枳實湯主之。"},{"v":"桂","t":"胸痹，胸痛徹背，背痛徹胸者，烏頭赤石脂丸主之。"},{"v":"桂","t":"胸痹，其人常欲蹈其胸上，先未苦時，但欲飲熱者，旋覆花湯主之。"},{"v":"桂","t":"胸痹，心下悸者，責其有痰也，半夏麻黃丸主之。"},{"v":"桂","t":"胸痹，心下痛，或有惡血積冷者，九痛丸主之。"},{"v":"桂","t":"傷寒雜病論卷第十六·辨婦人各病脈證並治"},{"v":"桂","t":"師曰：婦人得平脈，陰脈小弱，其人嘔，不能食，無寒熱，此為妊娠，桂枝湯主之。於法六十日當有此證。設有醫治逆者，卻一月加吐下者，則絕之。"},{"v":"桂","t":"婦人宿有癥病，經斷未及三月，而得漏下不止，胎動在臍上者，此為癥痼害。妊娠六月動者，前三月經水利時，胎也。下血者，斷後三月衄也。所以血不止者，其癥不去故也，當下其癥，桂枝茯苓丸主之。"},{"v":"桂","t":"婦人懷孕六七月，脈弦，發熱，其胎愈脹，腹痛，惡寒，少腹如扇，所以然者，子藏開故也，當以附子湯溫之。"},{"v":"桂","t":"師曰：婦人有漏下者；有半產後續下血都不絕者；假令妊娠腹中痛者，此為胞阻，膠艾湯主之。"},{"v":"桂","t":"婦人懷妊，腹中.痛，當歸芍藥散主之。"},{"v":"桂","t":"妊娠，嘔吐不止，乾薑人參半夏丸主之。"},{"v":"桂","t":"妊娠，小便難，飲食如故，當歸貝母苦參丸主之。"},{"v":"桂","t":"妊娠，有水氣，小便不利，灑淅惡寒，起即頭眩，葵子茯苓散主之。"},{"v":"桂","t":"婦人妊娠，身無他病，宜常服當歸散，則臨產不難，產後亦免生他病。"},{"v":"桂","t":"妊娠，身有寒濕，或腹痛，或心煩心痛，不能飲食，其胎躍躍動者，宜養之，白朮散主之。"},{"v":"桂","t":"婦人懷身七月，腹滿不得小便，從腰以下如有水狀，此太陰當養不養，心氣實也，宜瀉勞宮、關元，小便利則愈。"},{"v":"桂","t":"問曰：新產婦人有三病，一者病痙，二者郁冒，三者大便難，何謂也？"},{"v":"桂","t":"產婦郁冒，其脈微弱，嘔不能食，大便反堅，但頭汗出。所以然者，血虛而厥，厥則必冒，冒家欲解，必大汗出，以血虛下厥，孤陽上出，故頭汗出也。所以產婦喜汗出者，亡陰血虛，陽氣獨盛，故當汗出，陰陽乃複。大便堅，嘔不能食者，小柴胡湯主之。"},{"v":"桂","t":"郁冒病解，能食，七八日更發熱者，此為胃實，大承氣湯主之。"},{"v":"桂","t":"產後腹中絞痛，若虛寒不足者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"產後腹痛，煩滿不得臥，不可下也，宜枳實芍藥散和之。"},{"v":"桂","t":"師曰：產後腹痛，法當以枳實芍藥散；假令不愈，必腹中有瘀血著臍下也，下瘀血湯主之。"},{"v":"桂","t":"產後七八日，無太陽證，少腹堅痛，此惡露不盡也；若不大便，煩躁發熱，脈微實者，宜和之；若日晡所煩躁，食則譫語，至夜即愈者，大承氣湯主之。（方見前）"},{"v":"桂","t":"產後中風，數十日不解，頭痛，惡寒，發熱，心下滿，乾嘔，續自微汗出，小柴胡湯主之。（方見前）"},{"v":"桂","t":"產後中風，發熱，面赤，頭痛，汗出而喘，脈弦數者，竹葉湯主之。"},{"v":"桂","t":"產後煩亂，嘔逆，無外證者，此乳中虛也，竹皮大丸主之。"},{"v":"桂","t":"產後下利，脈虛極者，白頭翁加甘草阿膠湯主之。"},{"v":"桂","t":"婦人咽中如有炙臠者，半夏厚朴茯苓生薑湯主之。"},{"v":"桂","t":"婦人臟燥，悲傷欲哭，數欠伸，象如神靈所作者，甘草小麥大棗湯主之。"},{"v":"桂","t":"婦人吐涎沫，醫反下之，心下即痞，當先治其吐涎沫，後治其痞。治吐宜桔梗甘草茯苓澤瀉湯，治痞宜瀉心湯。"},{"v":"桂","t":"婦人之病，因虛積冷結，為諸經水斷絕，血結胞門。或繞臍疼痛，狀如寒疝；或痛在關元，肌若魚鱗；或陰中掣痛，少腹惡寒；或引腰脊，或下氣街；此皆帶下。萬病一言，察其寒、熱、虛、實、緊、弦，行其針藥，各探其源。子當辨記，勿謂不然。"},{"v":"桂","t":"問曰：婦人年五十所，病下血數十日不止，暮即發熱，少腹裡急，腹滿，手掌煩熱，唇口乾燥，何也？師曰：此病屬帶下，何以知之？曾經半產，瘀血在少腹不去，故唇口乾燥也，溫經湯主之。"},{"v":"桂","t":"經水不利，少腹滿痛，或一月再經者，王瓜根散主之。陰腫者，亦主之。"},{"v":"桂","t":"婦人半產，若漏下者，旋覆花湯主之；脈虛弱者，黃耆當歸湯主之。"},{"v":"桂","t":"婦人陷經漏下，色黑如塊者，膠薑湯主之。"},{"v":"桂","t":"婦人少腹滿如敦狀，小便微難而不渴，或經後產後者，此為水與血俱結在血室也，大黃甘遂阿膠湯主之。"},{"v":"桂","t":"婦人時腹痛，經水時行時止，止而複行者，抵當湯主之。"},{"v":"桂","t":"婦人經水閉，臟堅癖，下白物不止，此中有乾血也，礬石丸主之。"},{"v":"桂","t":"婦人六十二種風證，腹中氣血如刺痛者，紅藍花酒主之。"},{"v":"桂","t":"婦人腹中諸病痛者，當歸芍藥散主之，小建中湯亦主之。（當歸芍藥散見前）"},{"v":"桂","t":"問曰：婦人病，飲食如故，煩熱不得臥，而反倚息者，何也？師曰：此名轉胞，不得溺也，以胞系了戾，故致此病，但利小便則愈，腎氣丸主之。"},{"v":"桂","t":"婦人陰寒，蛇床子散主之。"},{"v":"桂","t":"少陰脈滑而數者，陰中瘡也，蝕爛者，狼牙湯主之。"},{"v":"桂","t":"胃氣下泄，陰吹而喧，如失氣者，此穀道實也，豬膏髮煎主之。"},{"v":"康","t":"凡療治之方有奇恆之理奧毒藥之化機又經旨之所秘多傳方文字傳法□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□中之學先講家傳之論說而後可令逅四部之教習□也"},{"v":"康","t":"康平三年二月十七日"}]}],"hl":"麻黃（六兩，去節）　桂枝（二兩，去皮）　甘草（二兩，炙）　杏仁（四十枚，去皮尖）　生薑（三兩，切）　大棗（十枚，擘）　石膏（如雞子大，碎）","cm":"右七味，以水九升，先煮麻黃，減二升，去上沫，內諸藥，煮取三升，去滓，溫服一升，取微似汗。汗出多者，溫粉撲之。一服汗者，停後服。若復服，汗多亡陽，遂虛，惡風、煩躁、不得眠也。"},{"n":"小青龍湯","c":"太陽病","tw":23.0,"fp":{"苦":26.1,"辛":50.0,"甘":26.1,"酸":10.9},"pf":"辛","fr":["辛","苦","甘","酸"],"ns":1.26,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":63.0,"平":23.9},"hd":[{"n":"麻黃","w":3,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"細辛","w":3,"f":["辛"],"t":"溫","bt":"【按】本草經無獨立條目。《名醫別錄》載味辛溫。"},{"n":"乾薑","w":3,"f":["辛"],"t":"溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。久服去臭氣，通神明。生川谷。"},{"n":"甘草","w":3,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"五味子","w":2.5,"f":["酸"],"t":"溫","bt":"五味　味酸溫。主益氣、咳逆上氣，勞傷羸瘦，補不足，強陰，益男子精。生山谷。"},{"n":"半夏","w":2.5,"f":["辛"],"t":"平","bt":"半夏　味辛平。主治傷寒寒熱，心下堅，下氣，喉咽腫痛，頭眩胸脹，咳逆腸鳴，止汗。一名地文，一名水玉。生川谷。"}],"cl":[{"num":40,"t":"傷寒表不解，心下有水氣，乾嘔，發熱而咳，或渴，或利，或噎，或小便不利，少腹滿，或喘者，小青龍湯主之。","d":[{"v":"桂","t":"太陽中風，脈浮緩，身不疼，但重，乍有輕時，無少陰證者，大青龍湯發之。（方見上）"},{"v":"康","t":"傷寒脈浮緩，身不疼，但重，乍有輕時無少陰症者，大青龍湯主之，傷寒表不解，心下有水氣，乾嘔發熱而咳，或渴，或利，或噎，小便不利，少腹滿，或喘者，小青龍湯主之"}]},{"num":41,"t":"傷寒，心下有水氣，咳而微喘、發熱不渴。服湯已，渴者，此寒去欲解也，小青龍湯主之。","d":[{"v":"桂","t":"傷寒，心下有水氣，咳而微喘，發熱不渴，服湯已渴者，此寒去欲解也，小青龍湯主之。（方見上）"},{"v":"康","t":"傷寒心下有水氣，咳而微喘（服湯已渴者。此寒去欲解也。），發熱不渴，小青龍湯主之"}]},{"num":398,"t":"病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩，損穀則愈。","d":[{"v":"桂","t":"大病已解，而日暮微煩者，以病新差，人強與穀，脾胃之氣尚弱，不能消穀，故令微煩，損穀則愈。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨百合狐惑陰陽毒病脈證並治"},{"v":"桂","t":"百合病者，百脈一宗，悉致其病也。意欲食，複不能食，常默默，欲臥不能臥，欲行不能行，飲食或有美時，或有不欲聞食臭時，如寒無寒，如熱無熱，口苦，小便赤，諸藥不能治，得藥則劇吐利，如有神靈者，身形如和，其脈微數。每溺時頭痛者，六十日乃愈；若溺時頭不痛，淅淅然者，四十日愈；若溺時快然，但頭眩者，二十日愈。其證或未病而預見，或病四、五日始見，或病至二十日，或一月後見者，各隨其證，依法治之。"},{"v":"桂","t":"百合病，見於發汗之後者，百合知母湯主之。"},{"v":"桂","t":"百合病，見於下之後者，百合滑石代赭湯主之。"},{"v":"桂","t":"百合病，見於吐之後者，百合雞子黃湯主之。"},{"v":"桂","t":"百合病，不經發汗、吐下，病形如初者，百合地黃湯主之。"},{"v":"桂","t":"百合病一月不解，變成渴者，百合洗方主之。不差，栝蔞牡蠣散主之。"},{"v":"桂","t":"百合病變發熱者，百合滑石散主之。"},{"v":"桂","t":"百合病，見於陰者，以陽法救之；見於陽者，以陰法救之。見陽攻陰，復發其汗，此為逆；見陰攻陽，乃複下之，此亦為逆。"},{"v":"桂","t":"狐惑之為病，狀如傷寒，默默欲眠，目不得閉，臥起不安。蝕於喉為惑，蝕于陰為狐。不欲飲食，惡聞食臭，其面目乍赤、乍黑、乍白。蝕於上部則聲嗄，甘草瀉心湯主之；蝕於下部則咽乾，苦參湯洗之；蝕於肛者，雄黃薰之。"},{"v":"桂","t":"病者脈數，無熱，微煩，默默但欲臥，汗出。初得之三、四日，目赤如鳩眼；七、八日，目四眥黑。若能食者，膿已成也，赤豆當歸散主之。"},{"v":"桂","t":"陽毒之為病，面赤斑斑如錦紋，咽喉痛，唾膿血。五日可治，七日不可治，升麻鱉甲湯主之。"},{"v":"桂","t":"陰毒之為病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治。升麻鱉甲湯去雄黃蜀椒主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨瘧病脈證並治"},{"v":"桂","t":"師曰：瘧病，其脈弦數者，熱多寒少；其脈弦遲者，寒多熱少。脈弦而小緊者，可下之；弦遲者，可溫之；弦緊者，可汗之、針之、灸之；浮大者，可吐之；弦數者，風發也，當於少陽中求之。"},{"v":"桂","t":"問曰：瘧病以月一日發者，當以十五日愈，甚者當月盡解。如其不差，當云何？師曰：此結為癥瘕，必有瘧母，急治之，宜鱉甲煎丸。"},{"v":"桂","t":"師曰：陰氣孤絕，陽氣獨發，則熱而少氣煩悗，手足熱而欲嘔，此名疸瘧，白虎加桂枝人參湯主之。"},{"v":"桂","t":"瘧病，其病如平，身無寒，但熱，骨節疼煩，時作嘔，此名溫瘧，宜白虎加桂枝湯。"},{"v":"桂","t":"瘧病，多寒，或但寒不熱者，此名牡瘧，蜀漆散主之，柴胡桂薑湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨血痹虛勞病脈證並治"},{"v":"桂","t":"問曰：血痹之病，從何得之？師曰：夫尊榮之人，骨弱肌膚盛，重因疲勞汗出，臥不時動搖，加被微風，遂得之。但以脈寸口微澀，關上小緊，宜針引陽氣，令脈和、緊去則愈。"},{"v":"桂","t":"血痹，陰陽俱微，或寸口關上微，尺中小緊，外證身體不仁，如風痹狀，黃耆桂枝五物湯主之。"},{"v":"桂","t":"男子平人，脈大為勞，極虛亦為勞。"},{"v":"桂","t":"男子面色薄者，主渴及亡血。卒喘悸，脈浮者，裡虛也。"},{"v":"桂","t":"男子脈虛沉弦，無寒熱，短氣裡急，小便不利，面色白，時目瞑兼衄，少腹滿，此為勞使之然。"},{"v":"桂","t":"勞之為病，其脈浮大，手足煩，春夏劇，秋冬差，陰寒精自出，酸削不能行。"},{"v":"桂","t":"男子脈浮弱澀，為無子，精氣清冷。"},{"v":"桂","t":"失精家，少陰脈弦急，陰頭寒，目眩，發落。脈極虛芤遲者，為清穀、亡血、失精；脈得諸芤動微緊者，男子則失精，女子則夢交。桂枝龍骨牡蠣湯主之。天雄散亦主之。"},{"v":"桂","t":"男子平人，脈虛弱細微者，喜盜汗也。"},{"v":"桂","t":"人年五、六十，其脈大者，病痹挾背行；若腸鳴，馬刀挾癭者，皆為勞得之也。其脈小沉遲者，病脫氣，疾行則喘渴；手足逆寒者，亦勞之為病也。"},{"v":"桂","t":"虛勞裡急，悸，衄，腹中痛，夢失精，四肢酸疼，手足煩熱，咽乾口燥者，小建中湯主之。"},{"v":"桂","t":"虛勞裡急，諸不足者，黃耆建中湯主之。"},{"v":"桂","t":"虛勞腰痛，少腹拘急，小便不利者，腎氣丸主之。"},{"v":"桂","t":"虛勞虛煩不得眠，酸棗仁湯主之。"},{"v":"桂","t":"五勞虛極羸瘦，腹滿不能飲食，食傷，憂傷，飲傷，房室傷，饑傷，勞傷，經絡榮衛氣傷，內有乾血，肌膚甲錯，兩目黯黑，緩中補虛，大黃.蟲丸主之。"},{"v":"桂","t":"女勞，膀胱急，少腹滿，身盡黃，額上黑，足下熱，其腹脹如水狀，大便溏而黑，胸滿者難治。硝石礬石散主之。"},{"v":"桂","t":"傷寒雜病論卷第十四·辨咳嗽水飲黃汗歷節病脈證並治"},{"v":"桂","t":"師曰：咳嗽發於肺，不專屬於肺病也，五臟六腑感受客邪皆能致咳。"},{"v":"桂","t":"肺咳，脈短而澀。假令浮而澀，知受風邪；緊短而澀，知受寒邪；數短而澀，知受熱邪；急短而澀，知受燥邪；濡短而澀，知受濕邪。此肺咳之因也。其狀則喘息有音，甚則唾血。"},{"v":"桂","t":"心咳，脈大而散。假令浮大而散，知受風邪；緊大而散，知受寒邪；數大而散，知受熱邪；急大而散，知受燥邪；濡大而散，知受濕邪。此心咳之因也。其狀則心痛，喉仲介介如梗，甚則咽腫喉痹。"},{"v":"桂","t":"肝咳，脈弦而澀。假令浮弦而澀，知受風邪；弦緊而澀，知受寒邪；弦數而澀，知受熱邪；弦急而澀，知受燥邪；弦濡而澀，知受濕邪。此肝咳之因也。其狀則兩脅下痛，甚則不可以轉，轉則兩胠下滿。"},{"v":"桂","t":"脾咳，脈濡而澀。假令浮濡而澀，知受風邪；沉濡而澀，知受寒邪；數濡而澀，知受熱邪；急濡而澀，知受燥邪；遲濡而澀，知受濕邪。此脾咳之因也。其狀則右肋下痛，隱隱引背，甚則不可以動，動則咳劇。"},{"v":"桂","t":"腎咳，脈沉而濡。假令沉弦而濡，知受風邪；沉緊而濡，知受寒邪；沉數而濡，知受熱邪；沉急而濡，知受燥邪；沉滯而濡，知受濕邪。此腎咳之因也。其狀則肩背相引而痛，甚則咳涎。"},{"v":"桂","t":"肺咳不已，則流於大腸，脈與肺同，其狀則咳而遺矢也。"},{"v":"桂","t":"心咳不已，則流於小腸，脈與心同，其狀則咳而失氣，氣與咳俱失也。"},{"v":"桂","t":"肝咳不已，則流於膽，脈與肝同，其狀則嘔苦汁也。"},{"v":"桂","t":"脾咳不已，則流於胃，脈與脾同，其狀則嘔，嘔甚則長蟲出也。"},{"v":"桂","t":"腎咳不已，則流於膀胱，脈與腎同，其狀則咳而遺溺也。"},{"v":"桂","t":"久咳不已，則移于三焦，脈隨證易，其狀則咳而腹滿，不欲食飲也。"},{"v":"桂","t":"咳而有飲者，咳不得臥，臥則氣急，此為實；咳不能言，言則氣短，此為虛。咳病多端，治各異法。謹守其道，庶可萬全。"},{"v":"桂","t":"咳家其脈弦者，此為有水，十棗湯主之。"},{"v":"桂","t":"咳而氣逆，喉中作水雞聲者，射干麻黃湯主之。"},{"v":"桂","t":"咳逆上氣，時唾濁痰，但坐不得眠者，皂莢丸主之。"},{"v":"桂","t":"咳而脈浮者，厚朴麻黃湯主之。"},{"v":"桂","t":"咳而脈沉者，澤漆湯主之。"},{"v":"桂","t":"咳而上氣，咽喉不利，脈數者，麥門冬湯主之。"},{"v":"桂","t":"咳逆倚息，不得臥，脈浮弦者，小青龍湯主之。"},{"v":"桂","t":"咳而胸滿，振寒脈數，咽乾不渴，時出濁唾腥臭，久久吐膿，如米粥者，此為肺癰，桔梗湯主之。"},{"v":"桂","t":"咳而氣喘，目如脫狀，脈浮大者，此為肺脹，越婢加半夏湯主之；小青龍加石膏湯亦主之。"},{"v":"桂","t":"咳而氣逆，迫塞，胸滿而脹，一身面目浮腫，鼻出清涕，不聞香臭，此為肺脹，葶藶大棗瀉肺湯主之。"},{"v":"桂","t":"似咳非咳，唾多涎沫，其人不渴，此為肺冷，甘草乾薑湯主之。"},{"v":"桂","t":"咳而唾涎沫不止，咽燥，口渴，其脈浮細而數者，此為肺痿，炙甘草湯主之。"},{"v":"桂","t":"問曰：飲病奈何？師曰：飲病有四，曰痰飲，曰懸飲，曰溢飲，曰支飲。其人素盛今瘦，水走腸間，瀝瀝有聲，為痰飲；水流脅下，咳唾引痛，為懸飲；水歸四肢，當汗不汗，身體疼重，為溢飲；水停膈下，咳逆倚息，短氣不得臥，其形如腫，為支飲。"},{"v":"桂","t":"水在心，則心下堅築，短氣，惡水不欲飲；水在肺，必吐涎沫，欲飲水；水在脾，則少氣身重；水在肝，則脅下支滿，嚏則脅痛；水在腎，則心下悸。"},{"v":"桂","t":"心下有留飲，其人必背寒冷如掌大，咳則肋下痛引缺盆。"},{"v":"桂","t":"胸中有留飲，其人必短氣而渴，四肢歷節痛。"},{"v":"桂","t":"夫平人食少飲多，水停心下，久久成病。甚者則悸，微者短氣。脈雙弦者寒也，脈偏弦者飲也。"},{"v":"桂","t":"夫短氣有微飲者，當從小便去之。"},{"v":"桂","t":"病者脈伏，其人欲自利，利反快，雖利，心下續堅滿，此為留飲，甘遂半夏湯主之。"},{"v":"桂","t":"心下有痰飲，胸脅支滿，目眩，脈沉弦者，茯苓桂枝白朮甘草湯主之。"},{"v":"桂","t":"懸飲內痛，脈沉而弦者，十棗湯主之。（方見前）"},{"v":"桂","t":"病溢飲者，當發其汗，大青龍湯主之；小青龍湯亦主之。（方見前）"},{"v":"桂","t":"膈間支飲，其人喘滿，心下痞堅，面色黧黑，其脈沉緊，得之數十日，醫吐下之不愈者，木防己湯主之；不差，木防己去石膏加茯苓芒硝湯主之。"},{"v":"桂","t":"心下有支飲，其人苦冒眩，澤瀉湯主之。"},{"v":"桂","t":"支飲，胸滿者，厚朴大黃湯主之。"},{"v":"桂","t":"支飲，不得息，葶藶大棗瀉肺湯主之。（方見前）"},{"v":"桂","t":"支飲，口不渴，作嘔者，或吐水者，小半夏湯主之。"},{"v":"桂","t":"腹滿，口舌乾燥，腸間有水氣者，防己椒目葶藶大黃丸主之。"},{"v":"桂","t":"膈間有水氣，嘔吐眩悸者，小半夏加茯苓湯主之。"},{"v":"桂","t":"病人臍下悸，吐涎沫而頭眩者，此有水也，五苓散主之。"},{"v":"桂","t":"師曰：病有風水，有皮水，有正水，有石水，有黃汗。"},{"v":"桂","t":"風水其脈自浮，其證骨節疼痛，惡風。皮水其脈亦浮，其證胕腫，按之沒指，不惡風，腹如鼓，不渴，當發其汗。正水其脈沉遲，其證為喘。石水其脈自沉，其證腹滿不喘，當利其小便。黃汗其脈沉遲，其證發熱，胸滿，四肢頭面腫，久不愈，必致癰膿。"},{"v":"桂","t":"脈浮而洪，浮則為風，洪則為氣。風氣相搏，風強則為癮疹，身體為癢，癢者為瀉風，久為痂癩；氣強則為水，難以俯仰，身體洪腫，汗出乃愈。惡風則虛，此為風水；不惡風者，小便通利，上焦有寒，其口多涎，此為黃汗。"},{"v":"桂","t":"寸口脈沉滑者，中有水氣，面目腫大，有熱，名曰風水。其人之目窠上微腫，如蠶新臥起狀，其頸脈動，時時咳，按其手足上，陷而不起者，亦曰風水。"},{"v":"桂","t":"太陽病，脈浮而緊，法當骨節疼痛，今反不痛，體重而酸，其人不渴，此為風水，汗出即愈；惡寒者此為極虛，發汗得之。渴而不惡寒者，此為皮水。身腫而冷，狀如周痹，胸中窒，不能食，反聚痛，躁不得眠，此為黃汗。痛在骨節，咳而喘，不渴者，此為正水，其狀如腫，發汗則愈。然諸病此者，若渴而下利、小便數者，皆不可發汗，但當利其小便。"},{"v":"桂","t":"心水為病，其身重而少氣，不得臥，煩躁，陰腫。"},{"v":"桂","t":"肝水為病，其腹大，不能自轉側，脅下痛，津液微生，小便續通。"},{"v":"桂","t":"肺水為病，其身腫，小便難，時時鴨溏。"},{"v":"桂","t":"脾水為病，其腹大，四肢苦重，津液不生，但苦少氣，小便難。"},{"v":"桂","t":"腎水為病，其腹大，臍腫，腰痛，不行溺，陰下濕如牛鼻上汗，其足逆冷，面反瘦。"},{"v":"桂","t":"諸有水者，腰以下腫，當利小便；腰以上腫，當發汗乃愈。"},{"v":"桂","t":"寸口脈沉而遲，沉則為水，遲則為寒。寒水相搏，脾氣衰則鶩溏，胃氣衰則身腫，名曰水分。"},{"v":"桂","t":"少陽脈卑，少陰脈細，男子則小便不利，婦人則經水不利，名曰血分。"},{"v":"桂","t":"婦人經水，前斷後病水者，名曰血分，此病難治；先病水，後經水斷，名曰水分，此病易治，水去則經自下也。"},{"v":"桂","t":"寸口脈沉而數，數則為出，沉則為入，出為陽實，入為陰結；趺陽脈微而弦，微則無胃氣，弦則不得息；少陰脈沉而滑，沉為在裡，滑則為實，沉滑相搏，血結胞門，其瘕不瀉，經絡不通，名曰血分。"},{"v":"桂","t":"問曰：病者苦水，面目身體皆腫，四肢亦腫，小便不利，脈之，不言水，反言胸中痛，氣上沖咽，狀如炙肉，當微咳喘，審如師言，其脈何類？師曰：寸口脈沉而緊，沉為水，緊為寒，沉緊相搏，結在關元。"},{"v":"桂","t":"水之為病，其脈沉小者，屬少陰為石水；沉遲者，屬少陰為正水；浮而惡風者，為風水，屬太陽；浮而不惡風者，為皮水，屬太陽。虛腫者，屬氣分，發其汗即已；脈沉者，麻黃附子甘草湯主之；脈浮者，麻黃加朮湯主之。"},{"v":"桂","t":"風水，脈浮身重，汗出惡風者，防己黃耆湯主之。"},{"v":"桂","t":"風水，惡風，一身悉腫，脈浮不渴，續自汗出，無大熱者，越婢湯主之。"},{"v":"桂","t":"皮水，四肢腫，水氣在皮膚中，四肢聶聶動者，防己茯苓湯主之。"},{"v":"桂","t":"裡水，一身面目黃腫，其脈沉，小便不利，甘草麻黃湯主之；越婢加朮湯亦主之。"},{"v":"桂","t":"問曰：黃汗之為病，身體腫，若重汗出而發熱口渴，狀如風水，汗沾衣，色正黃如柏汁，脈自沉，從何得之？師曰：以汗出入水中浴，水從汗孔入得之，宜黃耆芍藥桂枝湯。"},{"v":"桂","t":"黃汗之為病，兩脛自冷；假令發熱，此屬歷節。食已汗出，暮常盜汗，此榮氣熱也；若汗出已，反發熱者，久久身必甲錯；若發熱不止者，久久必生惡瘡；若身重，汗出已，輒輕者，久久身必瞤，瞤即胸痛；"},{"v":"桂","t":"寸口脈沉而弱，沉即主骨，弱即主筋，沉即為腎，弱即為肝，汗出入水中，如水傷心，歷節痛，黃汗出，故曰歷節。"},{"v":"桂","t":"味酸則傷筋，筋傷則緩，名曰泄；鹹則傷骨，骨傷則痿，名曰枯；枯泄相搏，名曰斷泄。榮氣不通，衛不獨行，榮衛俱微，三焦無禦，四屬斷絕，身體羸瘦，獨足腫大，黃汗出，兩脛熱，便為歷節。"},{"v":"桂","t":"少陰脈浮而弱，弱則血不足，浮則為風，風血相搏，即疼痛如掣。"},{"v":"桂","t":"肥盛之人，脈澀小，短氣，自汗出，歷節疼，不可屈伸，此皆飲酒汗出當風所致也。"},{"v":"桂","t":"諸肢節疼痛，身體羸瘦，腳腫如脫，頭眩短氣，溫溫欲吐者，桂枝芍藥知母甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛不可屈伸，脈沉弱者，烏頭麻黃黃耆芍藥甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛，兩足腫，大小便不利，脈沉緊者，甘草麻黃湯主之；脈沉而細數者，越婢加白朮湯主之。（二方俱見前）"},{"v":"桂","t":"師曰：寸口脈遲而澀，遲則為寒，澀為血不足；趺陽脈微而遲，微則為氣，遲則為寒。胃氣不足，則手足逆冷；榮衛不利，則腹滿腸鳴相逐，氣轉膀胱，榮衛俱勞。陽氣不通即身冷，陰氣不通即骨疼。陽前通則惡寒，陰前通則痹不仁。陰陽相得，其氣乃行。大氣一轉，寒氣乃散。實則失氣，虛則遺溺，名曰氣分。"},{"v":"桂","t":"氣分，心下堅，大如盤，邊如旋杯，桂枝甘草麻黃生薑大棗細辛附子湯主之。"},{"v":"桂","t":"水飲，心下堅，大如盤，邊如旋杯，枳實白朮湯主之。"},{"v":"桂","t":"小便不利，其人有水氣，若渴者，栝蔞瞿麥薯蕷丸主之。"},{"v":"桂","t":"小便不利，其人有水氣在血分者，滑石亂髮白魚散主之；茯苓白朮戎鹽湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨瘀血吐衄下血瘡癰病脈證並治"},{"v":"桂","t":"病人胸滿、唇痿、舌青、口燥，但欲漱水，不欲咽，無寒熱，脈微大來遲，腹不滿，其言我滿，此為有瘀血。"},{"v":"桂","t":"病人如有熱狀，煩滿，口乾燥而渴，其脈反無熱，此為陰伏，是瘀血也，當下之，宜下瘀血湯。"},{"v":"桂","t":"膈間停留瘀血，若吐血色黑者，桔梗湯主之。"},{"v":"桂","t":"吐血不止者，柏葉湯主之；黃土湯亦主之。"},{"v":"桂","t":"心氣不足，吐血，若衄血者，瀉心湯主之。"},{"v":"桂","t":"下血，先便而後血者，此遠血也，黃土湯主之。（方見前）"},{"v":"桂","t":"下血，先血而便者，此近血也，赤豆當歸散主之。"},{"v":"桂","t":"師曰：病人面無色，無寒熱，脈沉弦者，必衄血；脈浮而弱，按之則絕者，必下血；煩而咳者，必吐血。"},{"v":"桂","t":"從春至夏衄血者，屬太陽也；從秋至冬衄血者，屬陽明也。"},{"v":"桂","t":"尺脈浮，目睛暈黃者，衄未止也；黃去睛慧了者，知衄已止。"},{"v":"桂","t":"問曰：寸口脈微浮而澀，法當亡血，若汗出，設不汗出者云何？師曰：若身有瘡，被刀斧所傷，亡血故也，此名金瘡。無膿者，王不留行散主之；有膿者，排膿散主之，排膿湯亦主之。"},{"v":"桂","t":"浸淫瘡，從口流向四肢者，可治；從四肢流來入口者，不可治。"},{"v":"桂","t":"浸淫瘡，黃連粉主之。"},{"v":"桂","t":"諸脈浮數，法當發熱，而反灑淅惡寒，若有痛處，當發其癰。"},{"v":"桂","t":"師曰：諸癰腫者，欲知有膿無膿，以手掩腫上，熱者，為有膿；不熱者，為無膿也。"},{"v":"桂","t":"腸癰之為病，其身甲錯，腹皮急，按之濡，如腫狀，腹無積聚，身無熱，脈數，此為腸內有癰也，薏苡附子敗醬散主之。"},{"v":"桂","t":"少腹腫痞，按之即痛如淋，小便自調，時時發熱，自汗出，複惡寒，此為腸外有癰也。其脈沉緊者，膿未成也，下之當有血；脈洪數者，膿已成也，可下之，大黃牡丹湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨胸痹病脈證並治"},{"v":"桂","t":"師曰：夫脈當取太過不及，陽微陰弦，即胸痹而痛；所以然者，責其極虛也。今陽虛，知在上焦，胸痹而痛者，以其陰弦故也。"},{"v":"桂","t":"平人無寒熱，胸痹，短氣不足以息者，實也。"},{"v":"桂","t":"胸痹，喘息、咳唾、胸背痛，寸脈沉遲，關上小緊數者，栝蔞薤白白酒湯主之。"},{"v":"桂","t":"胸痹不得臥，心痛徹背者，栝蔞薤白半夏湯主之。"},{"v":"桂","t":"胸痹，心中痞，留氣結在胸，胸滿，脅下逆搶心者，枳實薤白桂枝厚朴栝蔞湯主之；桂枝人參湯亦主之。"},{"v":"桂","t":"胸痹，胸中氣塞或短氣者，此胸中有水氣也，茯苓杏仁甘草湯主之；橘皮枳實生薑湯亦主之。"},{"v":"桂","t":"胸痹，時緩時急者，薏苡附子散主之。"},{"v":"桂","t":"胸痹，心中懸痛者，桂枝生薑枳實湯主之。"},{"v":"桂","t":"胸痹，胸痛徹背，背痛徹胸者，烏頭赤石脂丸主之。"},{"v":"桂","t":"胸痹，其人常欲蹈其胸上，先未苦時，但欲飲熱者，旋覆花湯主之。"},{"v":"桂","t":"胸痹，心下悸者，責其有痰也，半夏麻黃丸主之。"},{"v":"桂","t":"胸痹，心下痛，或有惡血積冷者，九痛丸主之。"},{"v":"桂","t":"傷寒雜病論卷第十六·辨婦人各病脈證並治"},{"v":"桂","t":"師曰：婦人得平脈，陰脈小弱，其人嘔，不能食，無寒熱，此為妊娠，桂枝湯主之。於法六十日當有此證。設有醫治逆者，卻一月加吐下者，則絕之。"},{"v":"桂","t":"婦人宿有癥病，經斷未及三月，而得漏下不止，胎動在臍上者，此為癥痼害。妊娠六月動者，前三月經水利時，胎也。下血者，斷後三月衄也。所以血不止者，其癥不去故也，當下其癥，桂枝茯苓丸主之。"},{"v":"桂","t":"婦人懷孕六七月，脈弦，發熱，其胎愈脹，腹痛，惡寒，少腹如扇，所以然者，子藏開故也，當以附子湯溫之。"},{"v":"桂","t":"師曰：婦人有漏下者；有半產後續下血都不絕者；假令妊娠腹中痛者，此為胞阻，膠艾湯主之。"},{"v":"桂","t":"婦人懷妊，腹中.痛，當歸芍藥散主之。"},{"v":"桂","t":"妊娠，嘔吐不止，乾薑人參半夏丸主之。"},{"v":"桂","t":"妊娠，小便難，飲食如故，當歸貝母苦參丸主之。"},{"v":"桂","t":"妊娠，有水氣，小便不利，灑淅惡寒，起即頭眩，葵子茯苓散主之。"},{"v":"桂","t":"婦人妊娠，身無他病，宜常服當歸散，則臨產不難，產後亦免生他病。"},{"v":"桂","t":"妊娠，身有寒濕，或腹痛，或心煩心痛，不能飲食，其胎躍躍動者，宜養之，白朮散主之。"},{"v":"桂","t":"婦人懷身七月，腹滿不得小便，從腰以下如有水狀，此太陰當養不養，心氣實也，宜瀉勞宮、關元，小便利則愈。"},{"v":"桂","t":"問曰：新產婦人有三病，一者病痙，二者郁冒，三者大便難，何謂也？"},{"v":"桂","t":"產婦郁冒，其脈微弱，嘔不能食，大便反堅，但頭汗出。所以然者，血虛而厥，厥則必冒，冒家欲解，必大汗出，以血虛下厥，孤陽上出，故頭汗出也。所以產婦喜汗出者，亡陰血虛，陽氣獨盛，故當汗出，陰陽乃複。大便堅，嘔不能食者，小柴胡湯主之。"},{"v":"桂","t":"郁冒病解，能食，七八日更發熱者，此為胃實，大承氣湯主之。"},{"v":"桂","t":"產後腹中絞痛，若虛寒不足者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"產後腹痛，煩滿不得臥，不可下也，宜枳實芍藥散和之。"},{"v":"桂","t":"師曰：產後腹痛，法當以枳實芍藥散；假令不愈，必腹中有瘀血著臍下也，下瘀血湯主之。"},{"v":"桂","t":"產後七八日，無太陽證，少腹堅痛，此惡露不盡也；若不大便，煩躁發熱，脈微實者，宜和之；若日晡所煩躁，食則譫語，至夜即愈者，大承氣湯主之。（方見前）"},{"v":"桂","t":"產後中風，數十日不解，頭痛，惡寒，發熱，心下滿，乾嘔，續自微汗出，小柴胡湯主之。（方見前）"},{"v":"桂","t":"產後中風，發熱，面赤，頭痛，汗出而喘，脈弦數者，竹葉湯主之。"},{"v":"桂","t":"產後煩亂，嘔逆，無外證者，此乳中虛也，竹皮大丸主之。"},{"v":"桂","t":"產後下利，脈虛極者，白頭翁加甘草阿膠湯主之。"},{"v":"桂","t":"婦人咽中如有炙臠者，半夏厚朴茯苓生薑湯主之。"},{"v":"桂","t":"婦人臟燥，悲傷欲哭，數欠伸，象如神靈所作者，甘草小麥大棗湯主之。"},{"v":"桂","t":"婦人吐涎沫，醫反下之，心下即痞，當先治其吐涎沫，後治其痞。治吐宜桔梗甘草茯苓澤瀉湯，治痞宜瀉心湯。"},{"v":"桂","t":"婦人之病，因虛積冷結，為諸經水斷絕，血結胞門。或繞臍疼痛，狀如寒疝；或痛在關元，肌若魚鱗；或陰中掣痛，少腹惡寒；或引腰脊，或下氣街；此皆帶下。萬病一言，察其寒、熱、虛、實、緊、弦，行其針藥，各探其源。子當辨記，勿謂不然。"},{"v":"桂","t":"問曰：婦人年五十所，病下血數十日不止，暮即發熱，少腹裡急，腹滿，手掌煩熱，唇口乾燥，何也？師曰：此病屬帶下，何以知之？曾經半產，瘀血在少腹不去，故唇口乾燥也，溫經湯主之。"},{"v":"桂","t":"經水不利，少腹滿痛，或一月再經者，王瓜根散主之。陰腫者，亦主之。"},{"v":"桂","t":"婦人半產，若漏下者，旋覆花湯主之；脈虛弱者，黃耆當歸湯主之。"},{"v":"桂","t":"婦人陷經漏下，色黑如塊者，膠薑湯主之。"},{"v":"桂","t":"婦人少腹滿如敦狀，小便微難而不渴，或經後產後者，此為水與血俱結在血室也，大黃甘遂阿膠湯主之。"},{"v":"桂","t":"婦人時腹痛，經水時行時止，止而複行者，抵當湯主之。"},{"v":"桂","t":"婦人經水閉，臟堅癖，下白物不止，此中有乾血也，礬石丸主之。"},{"v":"桂","t":"婦人六十二種風證，腹中氣血如刺痛者，紅藍花酒主之。"},{"v":"桂","t":"婦人腹中諸病痛者，當歸芍藥散主之，小建中湯亦主之。（當歸芍藥散見前）"},{"v":"桂","t":"問曰：婦人病，飲食如故，煩熱不得臥，而反倚息者，何也？師曰：此名轉胞，不得溺也，以胞系了戾，故致此病，但利小便則愈，腎氣丸主之。"},{"v":"桂","t":"婦人陰寒，蛇床子散主之。"},{"v":"桂","t":"少陰脈滑而數者，陰中瘡也，蝕爛者，狼牙湯主之。"},{"v":"桂","t":"胃氣下泄，陰吹而喧，如失氣者，此穀道實也，豬膏髮煎主之。"},{"v":"康","t":"凡療治之方有奇恆之理奧毒藥之化機又經旨之所秘多傳方文字傳法□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□中之學先講家傳之論說而後可令逅四部之教習□也"},{"v":"康","t":"康平三年二月十七日"}]}],"hl":"麻黃（去節）　芍藥　細辛　乾薑　甘草（炙）　桂枝（去皮，各三兩）　五味子（半升）　半夏（半升，洗）","cm":"右八味，以水一斗，先煮麻黃，減二升，去上沫，內諸藥，煮取三升，去滓，溫服一升。"},{"n":"桂枝加厚朴杏子湯","c":"太陽病","tw":31.6,"fp":{"辛":19.0,"甘":74.7,"苦":15.8},"pf":"甘","fr":["甘","辛","苦"],"ns":1.36,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":72.8,"平":17.7},"hd":[{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。\n【按】生薑為鮮品，本研究設辛微溫，以區別乾姜辛溫。"},{"n":"芍藥","w":3,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"厚朴","w":2,"f":["苦"],"t":"溫","bt":"厚樸　味苦溫無毒。主治中風、傷寒、頭痛，寒熱驚氣，血痺死肌，去三蟲。生山谷。"},{"n":"杏仁","w":15.0,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世多以杏仁味苦。《名醫別錄》載「味苦，溫，有毒」。"}],"cl":[{"num":18,"t":"喘家作，桂枝湯加厚朴、杏子佳。"},{"num":43,"t":"太陽病，下之微喘者，表未解故也，桂枝加厚朴杏子湯主之。","d":[{"v":"康","t":"大陽病，下之微喘者，表未解故也，桂枝加厚朴杏子湯主之"}]}],"hl":"桂枝（三兩，去皮）　甘草（二兩，炙）　生薑（三兩，切）　芍藥（三兩）　大棗（十二枚，擘）　厚朴（二兩，炙，去皮）　杏仁（五十枚，去皮尖）","cm":"右七味，以水七升，微火煮取三升，去滓。溫服一升，覆取微似汗。"},{"n":"乾薑附子湯","c":"太陽病","tw":1.3,"fp":{"辛":100.0},"pf":"辛","fr":["辛"],"ns":2.0,"nt":"大溫","ng":{"寒涼":0.0,"溫熱":100.0,"平":0.0},"hd":[{"n":"乾薑","w":1,"f":["辛"],"t":"溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。久服去臭氣，通神明。生川谷。"},{"n":"附子","w":0.3,"f":["辛"],"t":"溫","bt":"附子　味辛溫有毒。主治風寒咳逆邪氣，溫中，金創，破癥堅積聚，血瘕寒濕，踒躄拘攣，膝痛不能行走。生山谷。"}],"cl":[{"num":61,"t":"下之後，復發汗，晝日煩躁不得眠，夜而安靜，不嘔、不渴，無表證，脈沉微，身無大熱者，乾薑附子湯主之。","d":[{"v":"桂","t":"傷寒，醫以丸藥大下之，身熱不去，微煩者，梔子乾薑湯主之。（方見上）"},{"v":"桂","t":"凡用梔子湯，若病人大便舊微溏者，不可與之。"},{"v":"桂","t":"大汗之後，複下之，小便不利者，亡津液故也，勿治之，久久小便必自利。"},{"v":"桂","t":"大下之後，複發汗，其人必振寒，脈微細。所以然者，內外俱虛故也。"},{"v":"桂","t":"下之後，複發汗，晝日煩躁不得眠，夜而安靜，不嘔不渴，無表證，脈沉而微，身無大熱者，乾薑附子湯主之。"},{"v":"康","t":"傷寒，醫以丸藥，大下之，身熱不去，微煩者，梔子乾薑湯主之，大下之後，復發汗（亡津），小便不利者，勿治之，得小便利必自愈，下之後，復發汗，必振寒脈微細，(註所以然者。以內外俱虛故也。經)下之後，發汗，晝日煩燥不得眠，夜而安靜，不嘔不渴，無表證，脈沈微，身無大熱者，乾薑附子湯主之"}]}],"hl":"乾薑（一兩）　附子（一枚，生用，去皮，切八片）","cm":"右二味，以水三升，煮取一升，去滓，頓服。"},{"n":"桂枝加芍藥生薑各一兩人參三兩新加湯","c":"太陽病","tw":19.6,"fp":{"辛":35.7,"甘":59.2,"苦":20.4},"pf":"甘","fr":["甘","辛","苦"],"ns":0.36,"nt":"平性","ng":{"寒涼":15.3,"溫熱":35.7,"平":28.6},"hd":[{"n":"桂枝","w":3,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"芍藥","w":4,"f":["苦"],"t":"","bt":"勺藥　味苦。主治邪氣腹痛，除血痺，破堅積寒熱疝瘕，止痛，利小便，益氣。生川谷。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"人參","w":3,"f":["甘"],"t":"小寒","bt":"人參　味甘小寒。主補五臟，安精神，定魂魄，止驚悸，除邪氣，明目，開心益智。一名人銜，一名鬼蓋。生山谷。"},{"n":"大棗","w":3.6,"f":["甘"],"t":"平","bt":"大棗　味甘平。主治心腹邪氣，安中養脾，助十二經，平胃氣，通九竅，補少氣少津液，身中不足，大驚，四肢重。和百藥。久服輕身長年。葉覆麻黃，能令出汗。生平澤。"},{"n":"生薑","w":4,"f":["辛"],"t":"微溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。\n【按】生薑為鮮品，本研究設辛微溫，以區別乾姜辛溫。"}],"cl":[],"hl":"桂枝（三兩，去皮）　芍藥（四兩）　甘草（二兩，炙）　人參（三兩）　大棗（十二枚，擘）　生薑（四兩）","cm":"右六味，以水一斗二升，煮取三升，去滓，溫服一升。本云：桂枝湯，今加芍藥、生薑、人參。"},{"n":"麻黃杏仁甘草石膏湯","c":"太陽病","tw":15.0,"fp":{"苦":26.7,"甘":20.0,"辛":53.3},"pf":"辛","fr":["辛","苦","甘"],"ns":0.13,"nt":"平性","ng":{"寒涼":53.3,"溫熱":33.3,"平":13.3},"hd":[{"n":"麻黃","w":4,"f":["苦"],"t":"溫","bt":"麻黃　味苦溫無毒。主治中風傷寒頭痛，溫瘧，發表出汗，去邪熱氣，止欬逆上氣，除寒熱，破癥堅積聚。一名龍沙。生山谷。"},{"n":"杏仁","w":1.0,"f":["甘"],"t":"溫","bt":"杏核　味甘溫。主治欬逆上氣，雷鳴，喉痺，下氣，產乳，金創，寒心，賁豚。生川谷。\n【後世按】本草經載杏核味甘溫。後世多以杏仁味苦。《名醫別錄》載「味苦，溫，有毒」。"},{"n":"甘草","w":2,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"石膏","w":8,"f":["辛"],"t":"微寒","bt":"石膏　味辛微寒。主治中風寒熱，心下逆氣驚喘，口乾舌焦不得息，腹中堅痛，除邪鬼，產乳，金創。生山谷。"}],"cl":[{"num":63,"t":"發汗後，不可更行桂枝湯，汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。","d":[{"v":"桂","t":"發汗若下後，不可更行桂枝湯。汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。"},{"v":"康","t":"發汗後，喘家不可更行桂枝湯，汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯"}]},{"num":162,"t":"下後，不可更行桂枝湯，若汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。","d":[{"v":"桂","t":"發汗若下後，不可更行桂枝湯。汗出而喘，無大熱者，可與麻黃杏仁甘草石膏湯。"},{"v":"康","t":"喘家下後，不可更行桂枝湯，若汗出而喘，無大熱者，可與麻黃杏子甘草石膏湯"}]},{"num":398,"t":"病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩，損穀則愈。","d":[{"v":"桂","t":"大病已解，而日暮微煩者，以病新差，人強與穀，脾胃之氣尚弱，不能消穀，故令微煩，損穀則愈。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨百合狐惑陰陽毒病脈證並治"},{"v":"桂","t":"百合病者，百脈一宗，悉致其病也。意欲食，複不能食，常默默，欲臥不能臥，欲行不能行，飲食或有美時，或有不欲聞食臭時，如寒無寒，如熱無熱，口苦，小便赤，諸藥不能治，得藥則劇吐利，如有神靈者，身形如和，其脈微數。每溺時頭痛者，六十日乃愈；若溺時頭不痛，淅淅然者，四十日愈；若溺時快然，但頭眩者，二十日愈。其證或未病而預見，或病四、五日始見，或病至二十日，或一月後見者，各隨其證，依法治之。"},{"v":"桂","t":"百合病，見於發汗之後者，百合知母湯主之。"},{"v":"桂","t":"百合病，見於下之後者，百合滑石代赭湯主之。"},{"v":"桂","t":"百合病，見於吐之後者，百合雞子黃湯主之。"},{"v":"桂","t":"百合病，不經發汗、吐下，病形如初者，百合地黃湯主之。"},{"v":"桂","t":"百合病一月不解，變成渴者，百合洗方主之。不差，栝蔞牡蠣散主之。"},{"v":"桂","t":"百合病變發熱者，百合滑石散主之。"},{"v":"桂","t":"百合病，見於陰者，以陽法救之；見於陽者，以陰法救之。見陽攻陰，復發其汗，此為逆；見陰攻陽，乃複下之，此亦為逆。"},{"v":"桂","t":"狐惑之為病，狀如傷寒，默默欲眠，目不得閉，臥起不安。蝕於喉為惑，蝕于陰為狐。不欲飲食，惡聞食臭，其面目乍赤、乍黑、乍白。蝕於上部則聲嗄，甘草瀉心湯主之；蝕於下部則咽乾，苦參湯洗之；蝕於肛者，雄黃薰之。"},{"v":"桂","t":"病者脈數，無熱，微煩，默默但欲臥，汗出。初得之三、四日，目赤如鳩眼；七、八日，目四眥黑。若能食者，膿已成也，赤豆當歸散主之。"},{"v":"桂","t":"陽毒之為病，面赤斑斑如錦紋，咽喉痛，唾膿血。五日可治，七日不可治，升麻鱉甲湯主之。"},{"v":"桂","t":"陰毒之為病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治。升麻鱉甲湯去雄黃蜀椒主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨瘧病脈證並治"},{"v":"桂","t":"師曰：瘧病，其脈弦數者，熱多寒少；其脈弦遲者，寒多熱少。脈弦而小緊者，可下之；弦遲者，可溫之；弦緊者，可汗之、針之、灸之；浮大者，可吐之；弦數者，風發也，當於少陽中求之。"},{"v":"桂","t":"問曰：瘧病以月一日發者，當以十五日愈，甚者當月盡解。如其不差，當云何？師曰：此結為癥瘕，必有瘧母，急治之，宜鱉甲煎丸。"},{"v":"桂","t":"師曰：陰氣孤絕，陽氣獨發，則熱而少氣煩悗，手足熱而欲嘔，此名疸瘧，白虎加桂枝人參湯主之。"},{"v":"桂","t":"瘧病，其病如平，身無寒，但熱，骨節疼煩，時作嘔，此名溫瘧，宜白虎加桂枝湯。"},{"v":"桂","t":"瘧病，多寒，或但寒不熱者，此名牡瘧，蜀漆散主之，柴胡桂薑湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨血痹虛勞病脈證並治"},{"v":"桂","t":"問曰：血痹之病，從何得之？師曰：夫尊榮之人，骨弱肌膚盛，重因疲勞汗出，臥不時動搖，加被微風，遂得之。但以脈寸口微澀，關上小緊，宜針引陽氣，令脈和、緊去則愈。"},{"v":"桂","t":"血痹，陰陽俱微，或寸口關上微，尺中小緊，外證身體不仁，如風痹狀，黃耆桂枝五物湯主之。"},{"v":"桂","t":"男子平人，脈大為勞，極虛亦為勞。"},{"v":"桂","t":"男子面色薄者，主渴及亡血。卒喘悸，脈浮者，裡虛也。"},{"v":"桂","t":"男子脈虛沉弦，無寒熱，短氣裡急，小便不利，面色白，時目瞑兼衄，少腹滿，此為勞使之然。"},{"v":"桂","t":"勞之為病，其脈浮大，手足煩，春夏劇，秋冬差，陰寒精自出，酸削不能行。"},{"v":"桂","t":"男子脈浮弱澀，為無子，精氣清冷。"},{"v":"桂","t":"失精家，少陰脈弦急，陰頭寒，目眩，發落。脈極虛芤遲者，為清穀、亡血、失精；脈得諸芤動微緊者，男子則失精，女子則夢交。桂枝龍骨牡蠣湯主之。天雄散亦主之。"},{"v":"桂","t":"男子平人，脈虛弱細微者，喜盜汗也。"},{"v":"桂","t":"人年五、六十，其脈大者，病痹挾背行；若腸鳴，馬刀挾癭者，皆為勞得之也。其脈小沉遲者，病脫氣，疾行則喘渴；手足逆寒者，亦勞之為病也。"},{"v":"桂","t":"虛勞裡急，悸，衄，腹中痛，夢失精，四肢酸疼，手足煩熱，咽乾口燥者，小建中湯主之。"},{"v":"桂","t":"虛勞裡急，諸不足者，黃耆建中湯主之。"},{"v":"桂","t":"虛勞腰痛，少腹拘急，小便不利者，腎氣丸主之。"},{"v":"桂","t":"虛勞虛煩不得眠，酸棗仁湯主之。"},{"v":"桂","t":"五勞虛極羸瘦，腹滿不能飲食，食傷，憂傷，飲傷，房室傷，饑傷，勞傷，經絡榮衛氣傷，內有乾血，肌膚甲錯，兩目黯黑，緩中補虛，大黃.蟲丸主之。"},{"v":"桂","t":"女勞，膀胱急，少腹滿，身盡黃，額上黑，足下熱，其腹脹如水狀，大便溏而黑，胸滿者難治。硝石礬石散主之。"},{"v":"桂","t":"傷寒雜病論卷第十四·辨咳嗽水飲黃汗歷節病脈證並治"},{"v":"桂","t":"師曰：咳嗽發於肺，不專屬於肺病也，五臟六腑感受客邪皆能致咳。"},{"v":"桂","t":"肺咳，脈短而澀。假令浮而澀，知受風邪；緊短而澀，知受寒邪；數短而澀，知受熱邪；急短而澀，知受燥邪；濡短而澀，知受濕邪。此肺咳之因也。其狀則喘息有音，甚則唾血。"},{"v":"桂","t":"心咳，脈大而散。假令浮大而散，知受風邪；緊大而散，知受寒邪；數大而散，知受熱邪；急大而散，知受燥邪；濡大而散，知受濕邪。此心咳之因也。其狀則心痛，喉仲介介如梗，甚則咽腫喉痹。"},{"v":"桂","t":"肝咳，脈弦而澀。假令浮弦而澀，知受風邪；弦緊而澀，知受寒邪；弦數而澀，知受熱邪；弦急而澀，知受燥邪；弦濡而澀，知受濕邪。此肝咳之因也。其狀則兩脅下痛，甚則不可以轉，轉則兩胠下滿。"},{"v":"桂","t":"脾咳，脈濡而澀。假令浮濡而澀，知受風邪；沉濡而澀，知受寒邪；數濡而澀，知受熱邪；急濡而澀，知受燥邪；遲濡而澀，知受濕邪。此脾咳之因也。其狀則右肋下痛，隱隱引背，甚則不可以動，動則咳劇。"},{"v":"桂","t":"腎咳，脈沉而濡。假令沉弦而濡，知受風邪；沉緊而濡，知受寒邪；沉數而濡，知受熱邪；沉急而濡，知受燥邪；沉滯而濡，知受濕邪。此腎咳之因也。其狀則肩背相引而痛，甚則咳涎。"},{"v":"桂","t":"肺咳不已，則流於大腸，脈與肺同，其狀則咳而遺矢也。"},{"v":"桂","t":"心咳不已，則流於小腸，脈與心同，其狀則咳而失氣，氣與咳俱失也。"},{"v":"桂","t":"肝咳不已，則流於膽，脈與肝同，其狀則嘔苦汁也。"},{"v":"桂","t":"脾咳不已，則流於胃，脈與脾同，其狀則嘔，嘔甚則長蟲出也。"},{"v":"桂","t":"腎咳不已，則流於膀胱，脈與腎同，其狀則咳而遺溺也。"},{"v":"桂","t":"久咳不已，則移于三焦，脈隨證易，其狀則咳而腹滿，不欲食飲也。"},{"v":"桂","t":"咳而有飲者，咳不得臥，臥則氣急，此為實；咳不能言，言則氣短，此為虛。咳病多端，治各異法。謹守其道，庶可萬全。"},{"v":"桂","t":"咳家其脈弦者，此為有水，十棗湯主之。"},{"v":"桂","t":"咳而氣逆，喉中作水雞聲者，射干麻黃湯主之。"},{"v":"桂","t":"咳逆上氣，時唾濁痰，但坐不得眠者，皂莢丸主之。"},{"v":"桂","t":"咳而脈浮者，厚朴麻黃湯主之。"},{"v":"桂","t":"咳而脈沉者，澤漆湯主之。"},{"v":"桂","t":"咳而上氣，咽喉不利，脈數者，麥門冬湯主之。"},{"v":"桂","t":"咳逆倚息，不得臥，脈浮弦者，小青龍湯主之。"},{"v":"桂","t":"咳而胸滿，振寒脈數，咽乾不渴，時出濁唾腥臭，久久吐膿，如米粥者，此為肺癰，桔梗湯主之。"},{"v":"桂","t":"咳而氣喘，目如脫狀，脈浮大者，此為肺脹，越婢加半夏湯主之；小青龍加石膏湯亦主之。"},{"v":"桂","t":"咳而氣逆，迫塞，胸滿而脹，一身面目浮腫，鼻出清涕，不聞香臭，此為肺脹，葶藶大棗瀉肺湯主之。"},{"v":"桂","t":"似咳非咳，唾多涎沫，其人不渴，此為肺冷，甘草乾薑湯主之。"},{"v":"桂","t":"咳而唾涎沫不止，咽燥，口渴，其脈浮細而數者，此為肺痿，炙甘草湯主之。"},{"v":"桂","t":"問曰：飲病奈何？師曰：飲病有四，曰痰飲，曰懸飲，曰溢飲，曰支飲。其人素盛今瘦，水走腸間，瀝瀝有聲，為痰飲；水流脅下，咳唾引痛，為懸飲；水歸四肢，當汗不汗，身體疼重，為溢飲；水停膈下，咳逆倚息，短氣不得臥，其形如腫，為支飲。"},{"v":"桂","t":"水在心，則心下堅築，短氣，惡水不欲飲；水在肺，必吐涎沫，欲飲水；水在脾，則少氣身重；水在肝，則脅下支滿，嚏則脅痛；水在腎，則心下悸。"},{"v":"桂","t":"心下有留飲，其人必背寒冷如掌大，咳則肋下痛引缺盆。"},{"v":"桂","t":"胸中有留飲，其人必短氣而渴，四肢歷節痛。"},{"v":"桂","t":"夫平人食少飲多，水停心下，久久成病。甚者則悸，微者短氣。脈雙弦者寒也，脈偏弦者飲也。"},{"v":"桂","t":"夫短氣有微飲者，當從小便去之。"},{"v":"桂","t":"病者脈伏，其人欲自利，利反快，雖利，心下續堅滿，此為留飲，甘遂半夏湯主之。"},{"v":"桂","t":"心下有痰飲，胸脅支滿，目眩，脈沉弦者，茯苓桂枝白朮甘草湯主之。"},{"v":"桂","t":"懸飲內痛，脈沉而弦者，十棗湯主之。（方見前）"},{"v":"桂","t":"病溢飲者，當發其汗，大青龍湯主之；小青龍湯亦主之。（方見前）"},{"v":"桂","t":"膈間支飲，其人喘滿，心下痞堅，面色黧黑，其脈沉緊，得之數十日，醫吐下之不愈者，木防己湯主之；不差，木防己去石膏加茯苓芒硝湯主之。"},{"v":"桂","t":"心下有支飲，其人苦冒眩，澤瀉湯主之。"},{"v":"桂","t":"支飲，胸滿者，厚朴大黃湯主之。"},{"v":"桂","t":"支飲，不得息，葶藶大棗瀉肺湯主之。（方見前）"},{"v":"桂","t":"支飲，口不渴，作嘔者，或吐水者，小半夏湯主之。"},{"v":"桂","t":"腹滿，口舌乾燥，腸間有水氣者，防己椒目葶藶大黃丸主之。"},{"v":"桂","t":"膈間有水氣，嘔吐眩悸者，小半夏加茯苓湯主之。"},{"v":"桂","t":"病人臍下悸，吐涎沫而頭眩者，此有水也，五苓散主之。"},{"v":"桂","t":"師曰：病有風水，有皮水，有正水，有石水，有黃汗。"},{"v":"桂","t":"風水其脈自浮，其證骨節疼痛，惡風。皮水其脈亦浮，其證胕腫，按之沒指，不惡風，腹如鼓，不渴，當發其汗。正水其脈沉遲，其證為喘。石水其脈自沉，其證腹滿不喘，當利其小便。黃汗其脈沉遲，其證發熱，胸滿，四肢頭面腫，久不愈，必致癰膿。"},{"v":"桂","t":"脈浮而洪，浮則為風，洪則為氣。風氣相搏，風強則為癮疹，身體為癢，癢者為瀉風，久為痂癩；氣強則為水，難以俯仰，身體洪腫，汗出乃愈。惡風則虛，此為風水；不惡風者，小便通利，上焦有寒，其口多涎，此為黃汗。"},{"v":"桂","t":"寸口脈沉滑者，中有水氣，面目腫大，有熱，名曰風水。其人之目窠上微腫，如蠶新臥起狀，其頸脈動，時時咳，按其手足上，陷而不起者，亦曰風水。"},{"v":"桂","t":"太陽病，脈浮而緊，法當骨節疼痛，今反不痛，體重而酸，其人不渴，此為風水，汗出即愈；惡寒者此為極虛，發汗得之。渴而不惡寒者，此為皮水。身腫而冷，狀如周痹，胸中窒，不能食，反聚痛，躁不得眠，此為黃汗。痛在骨節，咳而喘，不渴者，此為正水，其狀如腫，發汗則愈。然諸病此者，若渴而下利、小便數者，皆不可發汗，但當利其小便。"},{"v":"桂","t":"心水為病，其身重而少氣，不得臥，煩躁，陰腫。"},{"v":"桂","t":"肝水為病，其腹大，不能自轉側，脅下痛，津液微生，小便續通。"},{"v":"桂","t":"肺水為病，其身腫，小便難，時時鴨溏。"},{"v":"桂","t":"脾水為病，其腹大，四肢苦重，津液不生，但苦少氣，小便難。"},{"v":"桂","t":"腎水為病，其腹大，臍腫，腰痛，不行溺，陰下濕如牛鼻上汗，其足逆冷，面反瘦。"},{"v":"桂","t":"諸有水者，腰以下腫，當利小便；腰以上腫，當發汗乃愈。"},{"v":"桂","t":"寸口脈沉而遲，沉則為水，遲則為寒。寒水相搏，脾氣衰則鶩溏，胃氣衰則身腫，名曰水分。"},{"v":"桂","t":"少陽脈卑，少陰脈細，男子則小便不利，婦人則經水不利，名曰血分。"},{"v":"桂","t":"婦人經水，前斷後病水者，名曰血分，此病難治；先病水，後經水斷，名曰水分，此病易治，水去則經自下也。"},{"v":"桂","t":"寸口脈沉而數，數則為出，沉則為入，出為陽實，入為陰結；趺陽脈微而弦，微則無胃氣，弦則不得息；少陰脈沉而滑，沉為在裡，滑則為實，沉滑相搏，血結胞門，其瘕不瀉，經絡不通，名曰血分。"},{"v":"桂","t":"問曰：病者苦水，面目身體皆腫，四肢亦腫，小便不利，脈之，不言水，反言胸中痛，氣上沖咽，狀如炙肉，當微咳喘，審如師言，其脈何類？師曰：寸口脈沉而緊，沉為水，緊為寒，沉緊相搏，結在關元。"},{"v":"桂","t":"水之為病，其脈沉小者，屬少陰為石水；沉遲者，屬少陰為正水；浮而惡風者，為風水，屬太陽；浮而不惡風者，為皮水，屬太陽。虛腫者，屬氣分，發其汗即已；脈沉者，麻黃附子甘草湯主之；脈浮者，麻黃加朮湯主之。"},{"v":"桂","t":"風水，脈浮身重，汗出惡風者，防己黃耆湯主之。"},{"v":"桂","t":"風水，惡風，一身悉腫，脈浮不渴，續自汗出，無大熱者，越婢湯主之。"},{"v":"桂","t":"皮水，四肢腫，水氣在皮膚中，四肢聶聶動者，防己茯苓湯主之。"},{"v":"桂","t":"裡水，一身面目黃腫，其脈沉，小便不利，甘草麻黃湯主之；越婢加朮湯亦主之。"},{"v":"桂","t":"問曰：黃汗之為病，身體腫，若重汗出而發熱口渴，狀如風水，汗沾衣，色正黃如柏汁，脈自沉，從何得之？師曰：以汗出入水中浴，水從汗孔入得之，宜黃耆芍藥桂枝湯。"},{"v":"桂","t":"黃汗之為病，兩脛自冷；假令發熱，此屬歷節。食已汗出，暮常盜汗，此榮氣熱也；若汗出已，反發熱者，久久身必甲錯；若發熱不止者，久久必生惡瘡；若身重，汗出已，輒輕者，久久身必瞤，瞤即胸痛；"},{"v":"桂","t":"寸口脈沉而弱，沉即主骨，弱即主筋，沉即為腎，弱即為肝，汗出入水中，如水傷心，歷節痛，黃汗出，故曰歷節。"},{"v":"桂","t":"味酸則傷筋，筋傷則緩，名曰泄；鹹則傷骨，骨傷則痿，名曰枯；枯泄相搏，名曰斷泄。榮氣不通，衛不獨行，榮衛俱微，三焦無禦，四屬斷絕，身體羸瘦，獨足腫大，黃汗出，兩脛熱，便為歷節。"},{"v":"桂","t":"少陰脈浮而弱，弱則血不足，浮則為風，風血相搏，即疼痛如掣。"},{"v":"桂","t":"肥盛之人，脈澀小，短氣，自汗出，歷節疼，不可屈伸，此皆飲酒汗出當風所致也。"},{"v":"桂","t":"諸肢節疼痛，身體羸瘦，腳腫如脫，頭眩短氣，溫溫欲吐者，桂枝芍藥知母甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛不可屈伸，脈沉弱者，烏頭麻黃黃耆芍藥甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛，兩足腫，大小便不利，脈沉緊者，甘草麻黃湯主之；脈沉而細數者，越婢加白朮湯主之。（二方俱見前）"},{"v":"桂","t":"師曰：寸口脈遲而澀，遲則為寒，澀為血不足；趺陽脈微而遲，微則為氣，遲則為寒。胃氣不足，則手足逆冷；榮衛不利，則腹滿腸鳴相逐，氣轉膀胱，榮衛俱勞。陽氣不通即身冷，陰氣不通即骨疼。陽前通則惡寒，陰前通則痹不仁。陰陽相得，其氣乃行。大氣一轉，寒氣乃散。實則失氣，虛則遺溺，名曰氣分。"},{"v":"桂","t":"氣分，心下堅，大如盤，邊如旋杯，桂枝甘草麻黃生薑大棗細辛附子湯主之。"},{"v":"桂","t":"水飲，心下堅，大如盤，邊如旋杯，枳實白朮湯主之。"},{"v":"桂","t":"小便不利，其人有水氣，若渴者，栝蔞瞿麥薯蕷丸主之。"},{"v":"桂","t":"小便不利，其人有水氣在血分者，滑石亂髮白魚散主之；茯苓白朮戎鹽湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨瘀血吐衄下血瘡癰病脈證並治"},{"v":"桂","t":"病人胸滿、唇痿、舌青、口燥，但欲漱水，不欲咽，無寒熱，脈微大來遲，腹不滿，其言我滿，此為有瘀血。"},{"v":"桂","t":"病人如有熱狀，煩滿，口乾燥而渴，其脈反無熱，此為陰伏，是瘀血也，當下之，宜下瘀血湯。"},{"v":"桂","t":"膈間停留瘀血，若吐血色黑者，桔梗湯主之。"},{"v":"桂","t":"吐血不止者，柏葉湯主之；黃土湯亦主之。"},{"v":"桂","t":"心氣不足，吐血，若衄血者，瀉心湯主之。"},{"v":"桂","t":"下血，先便而後血者，此遠血也，黃土湯主之。（方見前）"},{"v":"桂","t":"下血，先血而便者，此近血也，赤豆當歸散主之。"},{"v":"桂","t":"師曰：病人面無色，無寒熱，脈沉弦者，必衄血；脈浮而弱，按之則絕者，必下血；煩而咳者，必吐血。"},{"v":"桂","t":"從春至夏衄血者，屬太陽也；從秋至冬衄血者，屬陽明也。"},{"v":"桂","t":"尺脈浮，目睛暈黃者，衄未止也；黃去睛慧了者，知衄已止。"},{"v":"桂","t":"問曰：寸口脈微浮而澀，法當亡血，若汗出，設不汗出者云何？師曰：若身有瘡，被刀斧所傷，亡血故也，此名金瘡。無膿者，王不留行散主之；有膿者，排膿散主之，排膿湯亦主之。"},{"v":"桂","t":"浸淫瘡，從口流向四肢者，可治；從四肢流來入口者，不可治。"},{"v":"桂","t":"浸淫瘡，黃連粉主之。"},{"v":"桂","t":"諸脈浮數，法當發熱，而反灑淅惡寒，若有痛處，當發其癰。"},{"v":"桂","t":"師曰：諸癰腫者，欲知有膿無膿，以手掩腫上，熱者，為有膿；不熱者，為無膿也。"},{"v":"桂","t":"腸癰之為病，其身甲錯，腹皮急，按之濡，如腫狀，腹無積聚，身無熱，脈數，此為腸內有癰也，薏苡附子敗醬散主之。"},{"v":"桂","t":"少腹腫痞，按之即痛如淋，小便自調，時時發熱，自汗出，複惡寒，此為腸外有癰也。其脈沉緊者，膿未成也，下之當有血；脈洪數者，膿已成也，可下之，大黃牡丹湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨胸痹病脈證並治"},{"v":"桂","t":"師曰：夫脈當取太過不及，陽微陰弦，即胸痹而痛；所以然者，責其極虛也。今陽虛，知在上焦，胸痹而痛者，以其陰弦故也。"},{"v":"桂","t":"平人無寒熱，胸痹，短氣不足以息者，實也。"},{"v":"桂","t":"胸痹，喘息、咳唾、胸背痛，寸脈沉遲，關上小緊數者，栝蔞薤白白酒湯主之。"},{"v":"桂","t":"胸痹不得臥，心痛徹背者，栝蔞薤白半夏湯主之。"},{"v":"桂","t":"胸痹，心中痞，留氣結在胸，胸滿，脅下逆搶心者，枳實薤白桂枝厚朴栝蔞湯主之；桂枝人參湯亦主之。"},{"v":"桂","t":"胸痹，胸中氣塞或短氣者，此胸中有水氣也，茯苓杏仁甘草湯主之；橘皮枳實生薑湯亦主之。"},{"v":"桂","t":"胸痹，時緩時急者，薏苡附子散主之。"},{"v":"桂","t":"胸痹，心中懸痛者，桂枝生薑枳實湯主之。"},{"v":"桂","t":"胸痹，胸痛徹背，背痛徹胸者，烏頭赤石脂丸主之。"},{"v":"桂","t":"胸痹，其人常欲蹈其胸上，先未苦時，但欲飲熱者，旋覆花湯主之。"},{"v":"桂","t":"胸痹，心下悸者，責其有痰也，半夏麻黃丸主之。"},{"v":"桂","t":"胸痹，心下痛，或有惡血積冷者，九痛丸主之。"},{"v":"桂","t":"傷寒雜病論卷第十六·辨婦人各病脈證並治"},{"v":"桂","t":"師曰：婦人得平脈，陰脈小弱，其人嘔，不能食，無寒熱，此為妊娠，桂枝湯主之。於法六十日當有此證。設有醫治逆者，卻一月加吐下者，則絕之。"},{"v":"桂","t":"婦人宿有癥病，經斷未及三月，而得漏下不止，胎動在臍上者，此為癥痼害。妊娠六月動者，前三月經水利時，胎也。下血者，斷後三月衄也。所以血不止者，其癥不去故也，當下其癥，桂枝茯苓丸主之。"},{"v":"桂","t":"婦人懷孕六七月，脈弦，發熱，其胎愈脹，腹痛，惡寒，少腹如扇，所以然者，子藏開故也，當以附子湯溫之。"},{"v":"桂","t":"師曰：婦人有漏下者；有半產後續下血都不絕者；假令妊娠腹中痛者，此為胞阻，膠艾湯主之。"},{"v":"桂","t":"婦人懷妊，腹中.痛，當歸芍藥散主之。"},{"v":"桂","t":"妊娠，嘔吐不止，乾薑人參半夏丸主之。"},{"v":"桂","t":"妊娠，小便難，飲食如故，當歸貝母苦參丸主之。"},{"v":"桂","t":"妊娠，有水氣，小便不利，灑淅惡寒，起即頭眩，葵子茯苓散主之。"},{"v":"桂","t":"婦人妊娠，身無他病，宜常服當歸散，則臨產不難，產後亦免生他病。"},{"v":"桂","t":"妊娠，身有寒濕，或腹痛，或心煩心痛，不能飲食，其胎躍躍動者，宜養之，白朮散主之。"},{"v":"桂","t":"婦人懷身七月，腹滿不得小便，從腰以下如有水狀，此太陰當養不養，心氣實也，宜瀉勞宮、關元，小便利則愈。"},{"v":"桂","t":"問曰：新產婦人有三病，一者病痙，二者郁冒，三者大便難，何謂也？"},{"v":"桂","t":"產婦郁冒，其脈微弱，嘔不能食，大便反堅，但頭汗出。所以然者，血虛而厥，厥則必冒，冒家欲解，必大汗出，以血虛下厥，孤陽上出，故頭汗出也。所以產婦喜汗出者，亡陰血虛，陽氣獨盛，故當汗出，陰陽乃複。大便堅，嘔不能食者，小柴胡湯主之。"},{"v":"桂","t":"郁冒病解，能食，七八日更發熱者，此為胃實，大承氣湯主之。"},{"v":"桂","t":"產後腹中絞痛，若虛寒不足者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"產後腹痛，煩滿不得臥，不可下也，宜枳實芍藥散和之。"},{"v":"桂","t":"師曰：產後腹痛，法當以枳實芍藥散；假令不愈，必腹中有瘀血著臍下也，下瘀血湯主之。"},{"v":"桂","t":"產後七八日，無太陽證，少腹堅痛，此惡露不盡也；若不大便，煩躁發熱，脈微實者，宜和之；若日晡所煩躁，食則譫語，至夜即愈者，大承氣湯主之。（方見前）"},{"v":"桂","t":"產後中風，數十日不解，頭痛，惡寒，發熱，心下滿，乾嘔，續自微汗出，小柴胡湯主之。（方見前）"},{"v":"桂","t":"產後中風，發熱，面赤，頭痛，汗出而喘，脈弦數者，竹葉湯主之。"},{"v":"桂","t":"產後煩亂，嘔逆，無外證者，此乳中虛也，竹皮大丸主之。"},{"v":"桂","t":"產後下利，脈虛極者，白頭翁加甘草阿膠湯主之。"},{"v":"桂","t":"婦人咽中如有炙臠者，半夏厚朴茯苓生薑湯主之。"},{"v":"桂","t":"婦人臟燥，悲傷欲哭，數欠伸，象如神靈所作者，甘草小麥大棗湯主之。"},{"v":"桂","t":"婦人吐涎沫，醫反下之，心下即痞，當先治其吐涎沫，後治其痞。治吐宜桔梗甘草茯苓澤瀉湯，治痞宜瀉心湯。"},{"v":"桂","t":"婦人之病，因虛積冷結，為諸經水斷絕，血結胞門。或繞臍疼痛，狀如寒疝；或痛在關元，肌若魚鱗；或陰中掣痛，少腹惡寒；或引腰脊，或下氣街；此皆帶下。萬病一言，察其寒、熱、虛、實、緊、弦，行其針藥，各探其源。子當辨記，勿謂不然。"},{"v":"桂","t":"問曰：婦人年五十所，病下血數十日不止，暮即發熱，少腹裡急，腹滿，手掌煩熱，唇口乾燥，何也？師曰：此病屬帶下，何以知之？曾經半產，瘀血在少腹不去，故唇口乾燥也，溫經湯主之。"},{"v":"桂","t":"經水不利，少腹滿痛，或一月再經者，王瓜根散主之。陰腫者，亦主之。"},{"v":"桂","t":"婦人半產，若漏下者，旋覆花湯主之；脈虛弱者，黃耆當歸湯主之。"},{"v":"桂","t":"婦人陷經漏下，色黑如塊者，膠薑湯主之。"},{"v":"桂","t":"婦人少腹滿如敦狀，小便微難而不渴，或經後產後者，此為水與血俱結在血室也，大黃甘遂阿膠湯主之。"},{"v":"桂","t":"婦人時腹痛，經水時行時止，止而複行者，抵當湯主之。"},{"v":"桂","t":"婦人經水閉，臟堅癖，下白物不止，此中有乾血也，礬石丸主之。"},{"v":"桂","t":"婦人六十二種風證，腹中氣血如刺痛者，紅藍花酒主之。"},{"v":"桂","t":"婦人腹中諸病痛者，當歸芍藥散主之，小建中湯亦主之。（當歸芍藥散見前）"},{"v":"桂","t":"問曰：婦人病，飲食如故，煩熱不得臥，而反倚息者，何也？師曰：此名轉胞，不得溺也，以胞系了戾，故致此病，但利小便則愈，腎氣丸主之。"},{"v":"桂","t":"婦人陰寒，蛇床子散主之。"},{"v":"桂","t":"少陰脈滑而數者，陰中瘡也，蝕爛者，狼牙湯主之。"},{"v":"桂","t":"胃氣下泄，陰吹而喧，如失氣者，此穀道實也，豬膏髮煎主之。"},{"v":"康","t":"凡療治之方有奇恆之理奧毒藥之化機又經旨之所秘多傳方文字傳法□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□中之學先講家傳之論說而後可令逅四部之教習□也"},{"v":"康","t":"康平三年二月十七日"}]}],"hl":"麻黃（四兩，去節）　杏仁（五十個，去皮尖）　甘草（二兩，炙）　石膏（半斤，碎、綿裹）","cm":"右四味，以水七升，煮麻黃，減二升，去上沫，內諸藥，煮取二升，去滓，溫服一升。"},{"n":"桂枝甘草湯","c":"太陽病","tw":6,"fp":{"辛":66.7,"甘":100.0},"pf":"甘","fr":["甘","辛"],"ns":1.33,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":66.7,"平":33.3},"hd":[{"n":"桂枝","w":4,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"甘草","w":2,"f":[" :23.5,"溫熱":41.2,"平":35.3},"hd":[{"n":"豬苓","w":0.75,"f":["甘"],"t":"平","bt":"豬苓　味甘平。主治痎瘧，解毒，蠱毒、蠱注，不祥，利水道。久服輕身耐老。一名叚（犬旁）豬矢。生山谷。"},{"n":"澤瀉","w":1,"f":["甘"],"t":"寒","bt":"澤瀉　味甘寒。主治風寒濕痺，乳難，消水，養五臟，益氣力，肥健。久服耳目聰明，不饑，延年輕身，面生光，能行水上。一名水瀉，一名芒芋，一名鵠瀉。生池澤。"},{"n":"白朮","w":0.75,"f":["苦"],"t":"溫","bt":"术 　味苦溫。主治濕痺、死肌、痙疸，止汗除熱，消食，化煎餌。久服輕身、延年不饑。一名山薊。生鄭山山谷。"},{"n":"茯苓","w":0.75,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"桂枝","w":1.0,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"}],"cl":[{"num":71,"t":"太陽病，發汗後，大汗出，胃中乾，煩躁不得眠，欲得飲水者；少少與飲之，令胃氣和則愈。若脈浮。小便不利，微熱消渴者，五苓散主之。"},{"num":72,"t":"發汗已，脈浮數、煩渴者，五苓散主之。","d":[{"v":"桂","t":"太陽病，發汗後，大汗出，胃中乾，煩躁不得眠，欲得飲水，少少與之，令胃氣和則愈。若脈浮，小便不利，微熱，消渴者，五苓散主之。"},{"v":"桂","t":"太陽病，發汗已，脈浮弦，煩渴者，五苓散主之。（方見前）"},{"v":"康","t":"太陽病，發汗後，大汗出，胃中乾，燥煩不得眠，欲得飲水者，少少與飲之，令胃氣和則愈，若脈浮，小便不利，微熱消渴者，五苓散主之"}]},{"num":73,"t":"傷寒，汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。","d":[{"v":"桂","t":"傷寒，汗出而渴，小便不利者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"v":"康","t":"傷寒汗出而渴者，五苓散主之，小渴者，茯苓甘草湯主之"}]},{"num":74,"t":"中風發熱，六七日不解而煩，有表裏證，渴欲飲水，水入則吐者，名曰水逆，五苓散主之。","d":[{"v":"桂","t":"中風發熱，六七日不解而煩，有表裡證，渴欲飲水，水入則吐者，名曰水逆。五苓散主之。（方見上）"},{"v":"康","t":"中風發熱，六七日不解而煩（有表裏證），渴欲飲水，水入口吐者，五苓散（名曰水逆）主之"}]},{"num":141,"t":"病在陽，應以汗解之，反以冷水灌之。若灌之，其熱被劫不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散；寒實結胸，無熱證者，與三物小白散。","d":[{"v":"桂","t":"病在陽，應以汗解之，反以冷水潠之，若灌之，其熱被劫不得去，彌更益煩，肉上粟起，意欲飲水，反不渴者，服文蛤散；若不差者，與五苓散。寒實結胸，無熱證者，與三物小陷胸湯，白散亦可服。（五苓散小陷胸湯方俱見前）"},{"v":"康","t":"病在陽，應以汗解之，反以冷水潠之，若灌之，其熱被劫不得去，彌更益煩，肉上粟起，意欲飲水，反少渴者，服文蛤散，若不差者，與五苓散，寒實結胸，無熱證者，與三物小陷胸湯(註*白散亦可服。)"}]},{"num":156,"t":"本以下之，故心下痞，與瀉心湯，痞不解，其人渴而口燥，煩，小便不利者，五苓散主之。","d":[{"v":"桂","t":"太陽病，醫發汗，遂發熱惡寒，因複下之，心下痞，表裡俱虛，陰陽氣並竭，無陽則陰獨，複加燒針，因胸煩，面色青黃，膚瞤者，難治；今色微黃，手足溫者易愈。"},{"v":"桂","t":"心下痞，按之濡，其脈關上浮大者，大黃黃連黃芩瀉心湯主之。"},{"v":"桂","t":"心下痞，而複惡寒者，附子瀉心湯主之。"},{"v":"桂","t":"本以下之，故心下痞，與瀉心湯，痞不解，其人渴，而口燥煩，小便不利者，五苓散主之。（方見前）"},{"v":"康","t":"大陽病，醫發汗，遂發熱惡寒，因復下之，心下痞（無陽則陰獨）(註表裏但虛。陰陽氣竝竭。經)復加燒針，因胸煩(註面色青黃。膚瞤者難治。今色微黃。手足溫者易愈。經)心下痞，按之濡，其脈（關上）浮者，大黃黃連瀉心湯主之，心下痞，而復惡寒，汗出者，附子瀉心湯主之，心下痞（本以下之故），與瀉心湯，痞不解，其人渴而口燥者，小便不利者，五苓散主之，(註一方云。忍之一日乃愈。)"}]},{"num":244,"t":"太陽病，寸緩、關浮、尺弱，其人發熱汗出，復惡寒，不嘔，但心下痞者，此以醫下之也。如其不下者，病人不惡寒而渴者，此轉屬陽明也。小便數者，大便必鞕，不更衣十日，無所苦也。渴欲飲水，少少與之，但以法救之，渴者，宜五苓散。","d":[{"v":"桂","t":"太陽病，寸緩、關浮、尺弱，其人發熱汗出，複惡寒，不嘔，但心下痞者，此以醫下之。如其未下，病人不惡寒而渴者，此轉屬陽明也。小便數者，大便必鞕，不更衣十日，無所苦也。渴欲飲水者，少少與之，以法救之；渴而飲水多、小便不利者，宜五苓散。"},{"v":"康","t":"太陽病，（寸）緩（關）浮（尺）弱，其人發熱汗出，復惡寒，不嘔，但心下痞者，此以醫下之也，如其不下者，病人不惡寒而渴（渴者此轉屬陽明也），小便數者，大便必鞕，不更衣十日，無所苦也，渴欲飲水，少少與之，但以法救之，渴者，宜五苓散"}]},{"num":262,"t":"傷寒，瘀熱在裏，身必黃，麻黃連軺赤小豆湯主之。","d":[{"v":"桂","t":"傷寒瘀熱在裡，其身必黃，麻黃連軺赤小豆湯主之。"},{"v":"桂","t":"陽明病，身熱，不能食，食即頭眩，心胸不安，久久發黃，此名穀疸，茵陳蒿湯主之。（方見前）"},{"v":"桂","t":"陽明病，身熱，發黃，心中懊憹，或熱痛，因於酒食者，此名酒疸，梔子大黃湯主之。"},{"v":"桂","t":"陽明病，身黃，津液枯燥，色暗不明者，此熱入於血分也，豬膏髮煎主之。"},{"v":"桂","t":"黃疸，腹滿，小便不利而赤，自汗出，此為表和裡實，當下之，宜大黃硝石湯。"},{"v":"桂","t":"諸黃，腹痛而嘔者，宜大柴胡湯。"},{"v":"桂","t":"黃病，小便色不變，自利，腹滿而喘者，不可除熱，除熱必噦。噦者，小半夏湯主之。（小半夏湯方見前）"},{"v":"桂","t":"諸黃家，但利其小便，五苓散加茵陳蒿主之；假令脈浮，當以汗解者，宜桂枝加黃耆湯。（五苓散見前，加茵陳蒿十分，同末）"},{"v":"桂","t":"諸黃，小便自利者，當以虛勞法，小建中湯主之。"},{"v":"桂","t":"陽明病，腹滿，小便不利，舌萎黃燥，不得眠者，此屬黃家。"},{"v":"桂","t":"黃疸病，當以十八日為期，治之十日以上瘥，反劇者，為難治。"},{"v":"桂","t":"夫病脈沉，渴欲飲水，小便不利者，後必發黃。"},{"v":"桂","t":"趺陽脈微而弦，法當腹滿，若不滿者，必大便難，兩胠疼痛，此為虛寒，當溫之，宜吳茱萸湯。（方見前）"},{"v":"桂","t":"夫病人腹痛繞臍，此為陽明風冷，穀氣不行。若反下之，其氣必沖。若不沖者，心下則痞。當溫之，宜理中湯。"},{"v":"桂","t":"陽明病，發熱十餘日，脈浮而數，腹滿，飲食如故者，厚朴七物湯主之。"},{"v":"桂","t":"陽明病，腹中切痛、雷鳴、逆滿，嘔吐者，此虛寒也，附子粳米湯主之。"},{"v":"桂","t":"陽明病，腹中寒痛，嘔不能食，有物突起，如見頭足，痛不可近者，大建中湯主之。"},{"v":"桂","t":"陽明病，腹滿，脅下偏痛，發微熱，其脈弦緊者，當以溫藥下之，宜大黃附子細辛湯。"},{"v":"桂","t":"問曰：陽明宿食何以別之？師曰：寸口脈浮而大，按之反澀，尺中亦微而澀，故知其有宿食也，大承氣湯主之。（方見前）"},{"v":"桂","t":"寸口脈數而滑者，此為有宿食也。"},{"v":"桂","t":"下利不欲食者，此為有宿食也。"},{"v":"桂","t":"脈緊如轉索者，此為有宿食也。"},{"v":"桂","t":"脈緊，腹中痛，惡風寒者，此為有宿食也。"},{"v":"桂","t":"宿食在上脘者，法當吐之，宜瓜蒂散。"},{"v":"桂","t":"傷寒雜病論卷第十·辨少陽病脈證並治"},{"v":"康","t":"傷寒瘀熱在裏，身必發黃，麻黃連軺赤小豆湯主之"},{"v":"康","t":"辨少陽病"}]},{"num":381,"t":"傷寒，噦而腹滿，視其前後，知何部不利，利之即愈。","d":[{"v":"桂","t":"傷寒，噦而腹滿，視其前後，知何部下利，利之則愈。"},{"v":"桂","t":"下利，腹痛，若胸痛者，紫參湯主之。"},{"v":"桂","t":"氣利，訶黎勒散主之。"},{"v":"桂","t":"乾嘔、吐逆、吐涎沫，半夏乾薑散主之。"},{"v":"桂","t":"病人胸中似喘不喘，似嘔不嘔，似噦不噦，徹心中憒憒然無奈者，生薑半夏湯主之。"},{"v":"桂","t":"乾嘔噦，若手足厥者，橘皮湯主之。"},{"v":"桂","t":"噦逆，其人虛者，橘皮竹茹湯主之。"},{"v":"桂","t":"諸嘔，穀不得下者，小半夏湯主之。"},{"v":"桂","t":"便膿血，相傳為病，此名疫利。其原因于夏，而發於秋，熱燥相搏，逐傷氣血，流於腸間，其後乃重，脈洪變數，黃連茯苓湯主之。"},{"v":"桂","t":"病人嘔吐涎沫，心痛，若腹痛，發作有時，其脈反洪大者，此蟲之為病也，甘草粉蜜湯主之。"},{"v":"桂","t":"厥陰病，脈弦而緊，弦則衛氣不行，緊則不欲食，邪正相搏，即為寒疝。繞臍而痛，手足厥冷，是其候也。脈沉緊者，大烏頭煎主之。"},{"v":"桂","t":"寒疝，腹中痛，若脅痛裡急者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"寒疝，腹中痛，手足不仁，若逆冷，若身疼痛，灸刺諸藥不能治者，烏頭桂枝湯主之。"},{"v":"桂","t":"病人睾丸，偏有大小，時有上下，此為狐疝，宜先刺厥陰之俞，後與蜘蛛散。"},{"v":"桂","t":"寸口脈浮而遲，浮則為虛，遲則為勞；虛則衛氣不足，勞則榮氣竭。"},{"v":"桂","t":"趺陽脈浮而數，浮則為氣，數則消穀而大堅；氣盛則溲數，溲數則堅。堅數相搏，即為消渴。"},{"v":"桂","t":"消渴，小便多，飲一斗，小便亦一斗者，腎氣丸主之。"},{"v":"桂","t":"消渴，脈浮有微熱，小便不利者，五苓散主之。"},{"v":"桂","t":"消渴，欲飲水，胃反而吐者，茯苓澤瀉湯主之。"},{"v":"桂","t":"消渴，欲得水，而食飲不休者，文蛤湯主之。"},{"v":"桂","t":"小便痛閟，下如粟狀，少腹弦急，痛引臍中，其名曰淋，此熱結在下焦也，小柴胡加茯苓湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨霍亂吐利病脈證並治"},{"v":"康","t":"辨厥陰病    霍亂"}]},{"num":386,"t":"霍亂，頭痛，發熱身疼痛，熱多欲飲水者，五苓散主之。寒多不用水者，理中丸主之。"},{"num":398,"t":"病人脈已解，而日暮微煩。以病新差，人強與穀，脾胃氣尚弱，不能消穀，故令微煩，損穀則愈。","d":[{"v":"桂","t":"大病已解，而日暮微煩者，以病新差，人強與穀，脾胃之氣尚弱，不能消穀，故令微煩，損穀則愈。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨百合狐惑陰陽毒病脈證並治"},{"v":"桂","t":"百合病者，百脈一宗，悉致其病也。意欲食，複不能食，常默默，欲臥不能臥，欲行不能行，飲食或有美時，或有不欲聞食臭時，如寒無寒，如熱無熱，口苦，小便赤，諸藥不能治，得藥則劇吐利，如有神靈者，身形如和，其脈微數。每溺時頭痛者，六十日乃愈；若溺時頭不痛，淅淅然者，四十日愈；若溺時快然，但頭眩者，二十日愈。其證或未病而預見，或病四、五日始見，或病至二十日，或一月後見者，各隨其證，依法治之。"},{"v":"桂","t":"百合病，見於發汗之後者，百合知母湯主之。"},{"v":"桂","t":"百合病，見於下之後者，百合滑石代赭湯主之。"},{"v":"桂","t":"百合病，見於吐之後者，百合雞子黃湯主之。"},{"v":"桂","t":"百合病，不經發汗、吐下，病形如初者，百合地黃湯主之。"},{"v":"桂","t":"百合病一月不解，變成渴者，百合洗方主之。不差，栝蔞牡蠣散主之。"},{"v":"桂","t":"百合病變發熱者，百合滑石散主之。"},{"v":"桂","t":"百合病，見於陰者，以陽法救之；見於陽者，以陰法救之。見陽攻陰，復發其汗，此為逆；見陰攻陽，乃複下之，此亦為逆。"},{"v":"桂","t":"狐惑之為病，狀如傷寒，默默欲眠，目不得閉，臥起不安。蝕於喉為惑，蝕于陰為狐。不欲飲食，惡聞食臭，其面目乍赤、乍黑、乍白。蝕於上部則聲嗄，甘草瀉心湯主之；蝕於下部則咽乾，苦參湯洗之；蝕於肛者，雄黃薰之。"},{"v":"桂","t":"病者脈數，無熱，微煩，默默但欲臥，汗出。初得之三、四日，目赤如鳩眼；七、八日，目四眥黑。若能食者，膿已成也，赤豆當歸散主之。"},{"v":"桂","t":"陽毒之為病，面赤斑斑如錦紋，咽喉痛，唾膿血。五日可治，七日不可治，升麻鱉甲湯主之。"},{"v":"桂","t":"陰毒之為病，面目青，身痛如被杖，咽喉痛。五日可治，七日不可治。升麻鱉甲湯去雄黃蜀椒主之。"},{"v":"桂","t":"傷寒雜病論卷第十二·辨瘧病脈證並治"},{"v":"桂","t":"師曰：瘧病，其脈弦數者，熱多寒少；其脈弦遲者，寒多熱少。脈弦而小緊者，可下之；弦遲者，可溫之；弦緊者，可汗之、針之、灸之；浮大者，可吐之；弦數者，風發也，當於少陽中求之。"},{"v":"桂","t":"問曰：瘧病以月一日發者，當以十五日愈，甚者當月盡解。如其不差，當云何？師曰：此結為癥瘕，必有瘧母，急治之，宜鱉甲煎丸。"},{"v":"桂","t":"師曰：陰氣孤絕，陽氣獨發，則熱而少氣煩悗，手足熱而欲嘔，此名疸瘧，白虎加桂枝人參湯主之。"},{"v":"桂","t":"瘧病，其病如平，身無寒，但熱，骨節疼煩，時作嘔，此名溫瘧，宜白虎加桂枝湯。"},{"v":"桂","t":"瘧病，多寒，或但寒不熱者，此名牡瘧，蜀漆散主之，柴胡桂薑湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十三·辨血痹虛勞病脈證並治"},{"v":"桂","t":"問曰：血痹之病，從何得之？師曰：夫尊榮之人，骨弱肌膚盛，重因疲勞汗出，臥不時動搖，加被微風，遂得之。但以脈寸口微澀，關上小緊，宜針引陽氣，令脈和、緊去則愈。"},{"v":"桂","t":"血痹，陰陽俱微，或寸口關上微，尺中小緊，外證身體不仁，如風痹狀，黃耆桂枝五物湯主之。"},{"v":"桂","t":"男子平人，脈大為勞，極虛亦為勞。"},{"v":"桂","t":"男子面色薄者，主渴及亡血。卒喘悸，脈浮者，裡虛也。"},{"v":"桂","t":"男子脈虛沉弦，無寒熱，短氣裡急，小便不利，面色白，時目瞑兼衄，少腹滿，此為勞使之然。"},{"v":"桂","t":"勞之為病，其脈浮大，手足煩，春夏劇，秋冬差，陰寒精自出，酸削不能行。"},{"v":"桂","t":"男子脈浮弱澀，為無子，精氣清冷。"},{"v":"桂","t":"失精家，少陰脈弦急，陰頭寒，目眩，發落。脈極虛芤遲者，為清穀、亡血、失精；脈得諸芤動微緊者，男子則失精，女子則夢交。桂枝龍骨牡蠣湯主之。天雄散亦主之。"},{"v":"桂","t":"男子平人，脈虛弱細微者，喜盜汗也。"},{"v":"桂","t":"人年五、六十，其脈大者，病痹挾背行；若腸鳴，馬刀挾癭者，皆為勞得之也。其脈小沉遲者，病脫氣，疾行則喘渴；手足逆寒者，亦勞之為病也。"},{"v":"桂","t":"虛勞裡急，悸，衄，腹中痛，夢失精，四肢酸疼，手足煩熱，咽乾口燥者，小建中湯主之。"},{"v":"桂","t":"虛勞裡急，諸不足者，黃耆建中湯主之。"},{"v":"桂","t":"虛勞腰痛，少腹拘急，小便不利者，腎氣丸主之。"},{"v":"桂","t":"虛勞虛煩不得眠，酸棗仁湯主之。"},{"v":"桂","t":"五勞虛極羸瘦，腹滿不能飲食，食傷，憂傷，飲傷，房室傷，饑傷，勞傷，經絡榮衛氣傷，內有乾血，肌膚甲錯，兩目黯黑，緩中補虛，大黃.蟲丸主之。"},{"v":"桂","t":"女勞，膀胱急，少腹滿，身盡黃，額上黑，足下熱，其腹脹如水狀，大便溏而黑，胸滿者難治。硝石礬石散主之。"},{"v":"桂","t":"傷寒雜病論卷第十四·辨咳嗽水飲黃汗歷節病脈證並治"},{"v":"桂","t":"師曰：咳嗽發於肺，不專屬於肺病也，五臟六腑感受客邪皆能致咳。"},{"v":"桂","t":"肺咳，脈短而澀。假令浮而澀，知受風邪；緊短而澀，知受寒邪；數短而澀，知受熱邪；急短而澀，知受燥邪；濡短而澀，知受濕邪。此肺咳之因也。其狀則喘息有音，甚則唾血。"},{"v":"桂","t":"心咳，脈大而散。假令浮大而散，知受風邪；緊大而散，知受寒邪；數大而散，知受熱邪；急大而散，知受燥邪；濡大而散，知受濕邪。此心咳之因也。其狀則心痛，喉仲介介如梗，甚則咽腫喉痹。"},{"v":"桂","t":"肝咳，脈弦而澀。假令浮弦而澀，知受風邪；弦緊而澀，知受寒邪；弦數而澀，知受熱邪；弦急而澀，知受燥邪；弦濡而澀，知受濕邪。此肝咳之因也。其狀則兩脅下痛，甚則不可以轉，轉則兩胠下滿。"},{"v":"桂","t":"脾咳，脈濡而澀。假令浮濡而澀，知受風邪；沉濡而澀，知受寒邪；數濡而澀，知受熱邪；急濡而澀，知受燥邪；遲濡而澀，知受濕邪。此脾咳之因也。其狀則右肋下痛，隱隱引背，甚則不可以動，動則咳劇。"},{"v":"桂","t":"腎咳，脈沉而濡。假令沉弦而濡，知受風邪；沉緊而濡，知受寒邪；沉數而濡，知受熱邪；沉急而濡，知受燥邪；沉滯而濡，知受濕邪。此腎咳之因也。其狀則肩背相引而痛，甚則咳涎。"},{"v":"桂","t":"肺咳不已，則流於大腸，脈與肺同，其狀則咳而遺矢也。"},{"v":"桂","t":"心咳不已，則流於小腸，脈與心同，其狀則咳而失氣，氣與咳俱失也。"},{"v":"桂","t":"肝咳不已，則流於膽，脈與肝同，其狀則嘔苦汁也。"},{"v":"桂","t":"脾咳不已，則流於胃，脈與脾同，其狀則嘔，嘔甚則長蟲出也。"},{"v":"桂","t":"腎咳不已，則流於膀胱，脈與腎同，其狀則咳而遺溺也。"},{"v":"桂","t":"久咳不已，則移于三焦，脈隨證易，其狀則咳而腹滿，不欲食飲也。"},{"v":"桂","t":"咳而有飲者，咳不得臥，臥則氣急，此為實；咳不能言，言則氣短，此為虛。咳病多端，治各異法。謹守其道，庶可萬全。"},{"v":"桂","t":"咳家其脈弦者，此為有水，十棗湯主之。"},{"v":"桂","t":"咳而氣逆，喉中作水雞聲者，射干麻黃湯主之。"},{"v":"桂","t":"咳逆上氣，時唾濁痰，但坐不得眠者，皂莢丸主之。"},{"v":"桂","t":"咳而脈浮者，厚朴麻黃湯主之。"},{"v":"桂","t":"咳而脈沉者，澤漆湯主之。"},{"v":"桂","t":"咳而上氣，咽喉不利，脈數者，麥門冬湯主之。"},{"v":"桂","t":"咳逆倚息，不得臥，脈浮弦者，小青龍湯主之。"},{"v":"桂","t":"咳而胸滿，振寒脈數，咽乾不渴，時出濁唾腥臭，久久吐膿，如米粥者，此為肺癰，桔梗湯主之。"},{"v":"桂","t":"咳而氣喘，目如脫狀，脈浮大者，此為肺脹，越婢加半夏湯主之；小青龍加石膏湯亦主之。"},{"v":"桂","t":"咳而氣逆，迫塞，胸滿而脹，一身面目浮腫，鼻出清涕，不聞香臭，此為肺脹，葶藶大棗瀉肺湯主之。"},{"v":"桂","t":"似咳非咳，唾多涎沫，其人不渴，此為肺冷，甘草乾薑湯主之。"},{"v":"桂","t":"咳而唾涎沫不止，咽燥，口渴，其脈浮細而數者，此為肺痿，炙甘草湯主之。"},{"v":"桂","t":"問曰：飲病奈何？師曰：飲病有四，曰痰飲，曰懸飲，曰溢飲，曰支飲。其人素盛今瘦，水走腸間，瀝瀝有聲，為痰飲；水流脅下，咳唾引痛，為懸飲；水歸四肢，當汗不汗，身體疼重，為溢飲；水停膈下，咳逆倚息，短氣不得臥，其形如腫，為支飲。"},{"v":"桂","t":"水在心，則心下堅築，短氣，惡水不欲飲；水在肺，必吐涎沫，欲飲水；水在脾，則少氣身重；水在肝，則脅下支滿，嚏則脅痛；水在腎，則心下悸。"},{"v":"桂","t":"心下有留飲，其人必背寒冷如掌大，咳則肋下痛引缺盆。"},{"v":"桂","t":"胸中有留飲，其人必短氣而渴，四肢歷節痛。"},{"v":"桂","t":"夫平人食少飲多，水停心下，久久成病。甚者則悸，微者短氣。脈雙弦者寒也，脈偏弦者飲也。"},{"v":"桂","t":"夫短氣有微飲者，當從小便去之。"},{"v":"桂","t":"病者脈伏，其人欲自利，利反快，雖利，心下續堅滿，此為留飲，甘遂半夏湯主之。"},{"v":"桂","t":"心下有痰飲，胸脅支滿，目眩，脈沉弦者，茯苓桂枝白朮甘草湯主之。"},{"v":"桂","t":"懸飲內痛，脈沉而弦者，十棗湯主之。（方見前）"},{"v":"桂","t":"病溢飲者，當發其汗，大青龍湯主之；小青龍湯亦主之。（方見前）"},{"v":"桂","t":"膈間支飲，其人喘滿，心下痞堅，面色黧黑，其脈沉緊，得之數十日，醫吐下之不愈者，木防己湯主之；不差，木防己去石膏加茯苓芒硝湯主之。"},{"v":"桂","t":"心下有支飲，其人苦冒眩，澤瀉湯主之。"},{"v":"桂","t":"支飲，胸滿者，厚朴大黃湯主之。"},{"v":"桂","t":"支飲，不得息，葶藶大棗瀉肺湯主之。（方見前）"},{"v":"桂","t":"支飲，口不渴，作嘔者，或吐水者，小半夏湯主之。"},{"v":"桂","t":"腹滿，口舌乾燥，腸間有水氣者，防己椒目葶藶大黃丸主之。"},{"v":"桂","t":"膈間有水氣，嘔吐眩悸者，小半夏加茯苓湯主之。"},{"v":"桂","t":"病人臍下悸，吐涎沫而頭眩者，此有水也，五苓散主之。"},{"v":"桂","t":"師曰：病有風水，有皮水，有正水，有石水，有黃汗。"},{"v":"桂","t":"風水其脈自浮，其證骨節疼痛，惡風。皮水其脈亦浮，其證胕腫，按之沒指，不惡風，腹如鼓，不渴，當發其汗。正水其脈沉遲，其證為喘。石水其脈自沉，其證腹滿不喘，當利其小便。黃汗其脈沉遲，其證發熱，胸滿，四肢頭面腫，久不愈，必致癰膿。"},{"v":"桂","t":"脈浮而洪，浮則為風，洪則為氣。風氣相搏，風強則為癮疹，身體為癢，癢者為瀉風，久為痂癩；氣強則為水，難以俯仰，身體洪腫，汗出乃愈。惡風則虛，此為風水；不惡風者，小便通利，上焦有寒，其口多涎，此為黃汗。"},{"v":"桂","t":"寸口脈沉滑者，中有水氣，面目腫大，有熱，名曰風水。其人之目窠上微腫，如蠶新臥起狀，其頸脈動，時時咳，按其手足上，陷而不起者，亦曰風水。"},{"v":"桂","t":"太陽病，脈浮而緊，法當骨節疼痛，今反不痛，體重而酸，其人不渴，此為風水，汗出即愈；惡寒者此為極虛，發汗得之。渴而不惡寒者，此為皮水。身腫而冷，狀如周痹，胸中窒，不能食，反聚痛，躁不得眠，此為黃汗。痛在骨節，咳而喘，不渴者，此為正水，其狀如腫，發汗則愈。然諸病此者，若渴而下利、小便數者，皆不可發汗，但當利其小便。"},{"v":"桂","t":"心水為病，其身重而少氣，不得臥，煩躁，陰腫。"},{"v":"桂","t":"肝水為病，其腹大，不能自轉側，脅下痛，津液微生，小便續通。"},{"v":"桂","t":"肺水為病，其身腫，小便難，時時鴨溏。"},{"v":"桂","t":"脾水為病，其腹大，四肢苦重，津液不生，但苦少氣，小便難。"},{"v":"桂","t":"腎水為病，其腹大，臍腫，腰痛，不行溺，陰下濕如牛鼻上汗，其足逆冷，面反瘦。"},{"v":"桂","t":"諸有水者，腰以下腫，當利小便；腰以上腫，當發汗乃愈。"},{"v":"桂","t":"寸口脈沉而遲，沉則為水，遲則為寒。寒水相搏，脾氣衰則鶩溏，胃氣衰則身腫，名曰水分。"},{"v":"桂","t":"少陽脈卑，少陰脈細，男子則小便不利，婦人則經水不利，名曰血分。"},{"v":"桂","t":"婦人經水，前斷後病水者，名曰血分，此病難治；先病水，後經水斷，名曰水分，此病易治，水去則經自下也。"},{"v":"桂","t":"寸口脈沉而數，數則為出，沉則為入，出為陽實，入為陰結；趺陽脈微而弦，微則無胃氣，弦則不得息；少陰脈沉而滑，沉為在裡，滑則為實，沉滑相搏，血結胞門，其瘕不瀉，經絡不通，名曰血分。"},{"v":"桂","t":"問曰：病者苦水，面目身體皆腫，四肢亦腫，小便不利，脈之，不言水，反言胸中痛，氣上沖咽，狀如炙肉，當微咳喘，審如師言，其脈何類？師曰：寸口脈沉而緊，沉為水，緊為寒，沉緊相搏，結在關元。"},{"v":"桂","t":"水之為病，其脈沉小者，屬少陰為石水；沉遲者，屬少陰為正水；浮而惡風者，為風水，屬太陽；浮而不惡風者，為皮水，屬太陽。虛腫者，屬氣分，發其汗即已；脈沉者，麻黃附子甘草湯主之；脈浮者，麻黃加朮湯主之。"},{"v":"桂","t":"風水，脈浮身重，汗出惡風者，防己黃耆湯主之。"},{"v":"桂","t":"風水，惡風，一身悉腫，脈浮不渴，續自汗出，無大熱者，越婢湯主之。"},{"v":"桂","t":"皮水，四肢腫，水氣在皮膚中，四肢聶聶動者，防己茯苓湯主之。"},{"v":"桂","t":"裡水，一身面目黃腫，其脈沉，小便不利，甘草麻黃湯主之；越婢加朮湯亦主之。"},{"v":"桂","t":"問曰：黃汗之為病，身體腫，若重汗出而發熱口渴，狀如風水，汗沾衣，色正黃如柏汁，脈自沉，從何得之？師曰：以汗出入水中浴，水從汗孔入得之，宜黃耆芍藥桂枝湯。"},{"v":"桂","t":"黃汗之為病，兩脛自冷；假令發熱，此屬歷節。食已汗出，暮常盜汗，此榮氣熱也；若汗出已，反發熱者，久久身必甲錯；若發熱不止者，久久必生惡瘡；若身重，汗出已，輒輕者，久久身必瞤，瞤即胸痛；"},{"v":"桂","t":"寸口脈沉而弱，沉即主骨，弱即主筋，沉即為腎，弱即為肝，汗出入水中，如水傷心，歷節痛，黃汗出，故曰歷節。"},{"v":"桂","t":"味酸則傷筋，筋傷則緩，名曰泄；鹹則傷骨，骨傷則痿，名曰枯；枯泄相搏，名曰斷泄。榮氣不通，衛不獨行，榮衛俱微，三焦無禦，四屬斷絕，身體羸瘦，獨足腫大，黃汗出，兩脛熱，便為歷節。"},{"v":"桂","t":"少陰脈浮而弱，弱則血不足，浮則為風，風血相搏，即疼痛如掣。"},{"v":"桂","t":"肥盛之人，脈澀小，短氣，自汗出，歷節疼，不可屈伸，此皆飲酒汗出當風所致也。"},{"v":"桂","t":"諸肢節疼痛，身體羸瘦，腳腫如脫，頭眩短氣，溫溫欲吐者，桂枝芍藥知母甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛不可屈伸，脈沉弱者，烏頭麻黃黃耆芍藥甘草湯主之。"},{"v":"桂","t":"病歷節，疼痛，兩足腫，大小便不利，脈沉緊者，甘草麻黃湯主之；脈沉而細數者，越婢加白朮湯主之。（二方俱見前）"},{"v":"桂","t":"師曰：寸口脈遲而澀，遲則為寒，澀為血不足；趺陽脈微而遲，微則為氣，遲則為寒。胃氣不足，則手足逆冷；榮衛不利，則腹滿腸鳴相逐，氣轉膀胱，榮衛俱勞。陽氣不通即身冷，陰氣不通即骨疼。陽前通則惡寒，陰前通則痹不仁。陰陽相得，其氣乃行。大氣一轉，寒氣乃散。實則失氣，虛則遺溺，名曰氣分。"},{"v":"桂","t":"氣分，心下堅，大如盤，邊如旋杯，桂枝甘草麻黃生薑大棗細辛附子湯主之。"},{"v":"桂","t":"水飲，心下堅，大如盤，邊如旋杯，枳實白朮湯主之。"},{"v":"桂","t":"小便不利，其人有水氣，若渴者，栝蔞瞿麥薯蕷丸主之。"},{"v":"桂","t":"小便不利，其人有水氣在血分者，滑石亂髮白魚散主之；茯苓白朮戎鹽湯亦主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨瘀血吐衄下血瘡癰病脈證並治"},{"v":"桂","t":"病人胸滿、唇痿、舌青、口燥，但欲漱水，不欲咽，無寒熱，脈微大來遲，腹不滿，其言我滿，此為有瘀血。"},{"v":"桂","t":"病人如有熱狀，煩滿，口乾燥而渴，其脈反無熱，此為陰伏，是瘀血也，當下之，宜下瘀血湯。"},{"v":"桂","t":"膈間停留瘀血，若吐血色黑者，桔梗湯主之。"},{"v":"桂","t":"吐血不止者，柏葉湯主之；黃土湯亦主之。"},{"v":"桂","t":"心氣不足，吐血，若衄血者，瀉心湯主之。"},{"v":"桂","t":"下血，先便而後血者，此遠血也，黃土湯主之。（方見前）"},{"v":"桂","t":"下血，先血而便者，此近血也，赤豆當歸散主之。"},{"v":"桂","t":"師曰：病人面無色，無寒熱，脈沉弦者，必衄血；脈浮而弱，按之則絕者，必下血；煩而咳者，必吐血。"},{"v":"桂","t":"從春至夏衄血者，屬太陽也；從秋至冬衄血者，屬陽明也。"},{"v":"桂","t":"尺脈浮，目睛暈黃者，衄未止也；黃去睛慧了者，知衄已止。"},{"v":"桂","t":"問曰：寸口脈微浮而澀，法當亡血，若汗出，設不汗出者云何？師曰：若身有瘡，被刀斧所傷，亡血故也，此名金瘡。無膿者，王不留行散主之；有膿者，排膿散主之，排膿湯亦主之。"},{"v":"桂","t":"浸淫瘡，從口流向四肢者，可治；從四肢流來入口者，不可治。"},{"v":"桂","t":"浸淫瘡，黃連粉主之。"},{"v":"桂","t":"諸脈浮數，法當發熱，而反灑淅惡寒，若有痛處，當發其癰。"},{"v":"桂","t":"師曰：諸癰腫者，欲知有膿無膿，以手掩腫上，熱者，為有膿；不熱者，為無膿也。"},{"v":"桂","t":"腸癰之為病，其身甲錯，腹皮急，按之濡，如腫狀，腹無積聚，身無熱，脈數，此為腸內有癰也，薏苡附子敗醬散主之。"},{"v":"桂","t":"少腹腫痞，按之即痛如淋，小便自調，時時發熱，自汗出，複惡寒，此為腸外有癰也。其脈沉緊者，膿未成也，下之當有血；脈洪數者，膿已成也，可下之，大黃牡丹湯主之。"},{"v":"桂","t":"傷寒雜病論卷第十五·辨胸痹病脈證並治"},{"v":"桂","t":"師曰：夫脈當取太過不及，陽微陰弦，即胸痹而痛；所以然者，責其極虛也。今陽虛，知在上焦，胸痹而痛者，以其陰弦故也。"},{"v":"桂","t":"平人無寒熱，胸痹，短氣不足以息者，實也。"},{"v":"桂","t":"胸痹，喘息、咳唾、胸背痛，寸脈沉遲，關上小緊數者，栝蔞薤白白酒湯主之。"},{"v":"桂","t":"胸痹不得臥，心痛徹背者，栝蔞薤白半夏湯主之。"},{"v":"桂","t":"胸痹，心中痞，留氣結在胸，胸滿，脅下逆搶心者，枳實薤白桂枝厚朴栝蔞湯主之；桂枝人參湯亦主之。"},{"v":"桂","t":"胸痹，胸中氣塞或短氣者，此胸中有水氣也，茯苓杏仁甘草湯主之；橘皮枳實生薑湯亦主之。"},{"v":"桂","t":"胸痹，時緩時急者，薏苡附子散主之。"},{"v":"桂","t":"胸痹，心中懸痛者，桂枝生薑枳實湯主之。"},{"v":"桂","t":"胸痹，胸痛徹背，背痛徹胸者，烏頭赤石脂丸主之。"},{"v":"桂","t":"胸痹，其人常欲蹈其胸上，先未苦時，但欲飲熱者，旋覆花湯主之。"},{"v":"桂","t":"胸痹，心下悸者，責其有痰也，半夏麻黃丸主之。"},{"v":"桂","t":"胸痹，心下痛，或有惡血積冷者，九痛丸主之。"},{"v":"桂","t":"傷寒雜病論卷第十六·辨婦人各病脈證並治"},{"v":"桂","t":"師曰：婦人得平脈，陰脈小弱，其人嘔，不能食，無寒熱，此為妊娠，桂枝湯主之。於法六十日當有此證。設有醫治逆者，卻一月加吐下者，則絕之。"},{"v":"桂","t":"婦人宿有癥病，經斷未及三月，而得漏下不止，胎動在臍上者，此為癥痼害。妊娠六月動者，前三月經水利時，胎也。下血者，斷後三月衄也。所以血不止者，其癥不去故也，當下其癥，桂枝茯苓丸主之。"},{"v":"桂","t":"婦人懷孕六七月，脈弦，發熱，其胎愈脹，腹痛，惡寒，少腹如扇，所以然者，子藏開故也，當以附子湯溫之。"},{"v":"桂","t":"師曰：婦人有漏下者；有半產後續下血都不絕者；假令妊娠腹中痛者，此為胞阻，膠艾湯主之。"},{"v":"桂","t":"婦人懷妊，腹中.痛，當歸芍藥散主之。"},{"v":"桂","t":"妊娠，嘔吐不止，乾薑人參半夏丸主之。"},{"v":"桂","t":"妊娠，小便難，飲食如故，當歸貝母苦參丸主之。"},{"v":"桂","t":"妊娠，有水氣，小便不利，灑淅惡寒，起即頭眩，葵子茯苓散主之。"},{"v":"桂","t":"婦人妊娠，身無他病，宜常服當歸散，則臨產不難，產後亦免生他病。"},{"v":"桂","t":"妊娠，身有寒濕，或腹痛，或心煩心痛，不能飲食，其胎躍躍動者，宜養之，白朮散主之。"},{"v":"桂","t":"婦人懷身七月，腹滿不得小便，從腰以下如有水狀，此太陰當養不養，心氣實也，宜瀉勞宮、關元，小便利則愈。"},{"v":"桂","t":"問曰：新產婦人有三病，一者病痙，二者郁冒，三者大便難，何謂也？"},{"v":"桂","t":"產婦郁冒，其脈微弱，嘔不能食，大便反堅，但頭汗出。所以然者，血虛而厥，厥則必冒，冒家欲解，必大汗出，以血虛下厥，孤陽上出，故頭汗出也。所以產婦喜汗出者，亡陰血虛，陽氣獨盛，故當汗出，陰陽乃複。大便堅，嘔不能食者，小柴胡湯主之。"},{"v":"桂","t":"郁冒病解，能食，七八日更發熱者，此為胃實，大承氣湯主之。"},{"v":"桂","t":"產後腹中絞痛，若虛寒不足者，當歸生薑羊肉湯主之。"},{"v":"桂","t":"產後腹痛，煩滿不得臥，不可下也，宜枳實芍藥散和之。"},{"v":"桂","t":"師曰：產後腹痛，法當以枳實芍藥散；假令不愈，必腹中有瘀血著臍下也，下瘀血湯主之。"},{"v":"桂","t":"產後七八日，無太陽證，少腹堅痛，此惡露不盡也；若不大便，煩躁發熱，脈微實者，宜和之；若日晡所煩躁，食則譫語，至夜即愈者，大承氣湯主之。（方見前）"},{"v":"桂","t":"產後中風，數十日不解，頭痛，惡寒，發熱，心下滿，乾嘔，續自微汗出，小柴胡湯主之。（方見前）"},{"v":"桂","t":"產後中風，發熱，面赤，頭痛，汗出而喘，脈弦數者，竹葉湯主之。"},{"v":"桂","t":"產後煩亂，嘔逆，無外證者，此乳中虛也，竹皮大丸主之。"},{"v":"桂","t":"產後下利，脈虛極者，白頭翁加甘草阿膠湯主之。"},{"v":"桂","t":"婦人咽中如有炙臠者，半夏厚朴茯苓生薑湯主之。"},{"v":"桂","t":"婦人臟燥，悲傷欲哭，數欠伸，象如神靈所作者，甘草小麥大棗湯主之。"},{"v":"桂","t":"婦人吐涎沫，醫反下之，心下即痞，當先治其吐涎沫，後治其痞。治吐宜桔梗甘草茯苓澤瀉湯，治痞宜瀉心湯。"},{"v":"桂","t":"婦人之病，因虛積冷結，為諸經水斷絕，血結胞門。或繞臍疼痛，狀如寒疝；或痛在關元，肌若魚鱗；或陰中掣痛，少腹惡寒；或引腰脊，或下氣街；此皆帶下。萬病一言，察其寒、熱、虛、實、緊、弦，行其針藥，各探其源。子當辨記，勿謂不然。"},{"v":"桂","t":"問曰：婦人年五十所，病下血數十日不止，暮即發熱，少腹裡急，腹滿，手掌煩熱，唇口乾燥，何也？師曰：此病屬帶下，何以知之？曾經半產，瘀血在少腹不去，故唇口乾燥也，溫經湯主之。"},{"v":"桂","t":"經水不利，少腹滿痛，或一月再經者，王瓜根散主之。陰腫者，亦主之。"},{"v":"桂","t":"婦人半產，若漏下者，旋覆花湯主之；脈虛弱者，黃耆當歸湯主之。"},{"v":"桂","t":"婦人陷經漏下，色黑如塊者，膠薑湯主之。"},{"v":"桂","t":"婦人少腹滿如敦狀，小便微難而不渴，或經後產後者，此為水與血俱結在血室也，大黃甘遂阿膠湯主之。"},{"v":"桂","t":"婦人時腹痛，經水時行時止，止而複行者，抵當湯主之。"},{"v":"桂","t":"婦人經水閉，臟堅癖，下白物不止，此中有乾血也，礬石丸主之。"},{"v":"桂","t":"婦人六十二種風證，腹中氣血如刺痛者，紅藍花酒主之。"},{"v":"桂","t":"婦人腹中諸病痛者，當歸芍藥散主之，小建中湯亦主之。（當歸芍藥散見前）"},{"v":"桂","t":"問曰：婦人病，飲食如故，煩熱不得臥，而反倚息者，何也？師曰：此名轉胞，不得溺也，以胞系了戾，故致此病，但利小便則愈，腎氣丸主之。"},{"v":"桂","t":"婦人陰寒，蛇床子散主之。"},{"v":"桂","t":"少陰脈滑而數者，陰中瘡也，蝕爛者，狼牙湯主之。"},{"v":"桂","t":"胃氣下泄，陰吹而喧，如失氣者，此穀道實也，豬膏髮煎主之。"},{"v":"康","t":"凡療治之方有奇恆之理奧毒藥之化機又經旨之所秘多傳方文字傳法□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□□中之學先講家傳之論說而後可令逅四部之教習□也"},{"v":"康","t":"康平三年二月十七日"}]}],"hl":"豬苓（十八銖，去皮）　澤瀉（一兩六銖）　白朮（十八銖）　茯苓（十八銖）　桂枝（半兩，去皮）","cm":"右五味，搗為散，以白飲和服方寸匕，日三服。多飲暖水，汗出愈。如法將息。"},{"n":"茯苓甘草湯","c":"太陽病","tw":8,"fp":{"甘":62.5,"辛":62.5},"pf":"甘","fr":["甘","辛"],"ns":0.88,"nt":"偏溫","ng":{"寒涼":0.0,"溫熱":62.5,"平":37.5},"hd":[{"n":"茯苓","w":2,"f":["甘"],"t":"平","bt":"茯苓　味甘平。主治胸脅逆氣，憂恚驚恐，心下結痛，寒熱煩滿咳逆，口焦舌乾，利小便。久服安魂養神，不饑延年。一名伏兔。生山谷。"},{"n":"桂枝","w":2,"f":["辛","甘"],"t":"溫","bt":"牡桂　味辛溫。主治上氣咳逆、結氣，喉痺吐吸，利關節，補中益氣。久服通神，輕身不老。生山谷。\n【按】桂枝為牡桂之嫩枝。本研究取辛甘溫。"},{"n":"甘草","w":1,"f":["甘"],"t":"平","bt":"甘草　味甘平。主治五臟六腑寒熱邪氣，堅筋骨，長肌肉，倍力，金創，尰，解毒，久服輕身延年。生川谷。"},{"n":"生薑","w":3,"f":["辛"],"t":"微溫","bt":"乾姜　味辛溫。主治胸滿咳逆上氣，溫中、止血，出汗，逐風濕痺，腸澼下利，生者尤良。\n【按】生薑為鮮品，本研究設辛微溫，以區別乾姜辛溫。"}],"cl":[{"num":73,"t":"傷寒，汗出而渴者，五苓散主之；不渴者，茯苓甘草湯主之。","d":[{"v":"桂","t":"傷寒，汗出而渴，小便不利者，五苓散主之；不渴者，茯苓甘草湯主之。"},{"v":"康","t":"傷寒汗出而渴者，五苓散主之，小渴者，茯苓甘草湯主之"}]},{"num":356,"t":"傷寒，厥而心下悸，宜先治水，當服茯苓甘草湯，卻治其厥。不爾，水漬入胃，必作利也。","d":[{"v":"桂","t":"傷寒，厥而心下悸者，宜先治水，當服茯苓甘草湯，卻治其厥。不爾，水漬入胃，必作利也。"}]}],"hl":"茯苓（二兩）　桂枝（二兩，去皮）　甘草（一兩，炙）　生薑（三兩，切）","cm":"右四味，以水四升，煮取二升，去滓，分溫三服。"},{"n":"梔子豉湯","c":"太陽病","tw":3.4,"fp":{"苦":100.0},"pf":"苦","fr":["苦"],"ns":-2.0,"nt":"大寒","ng":{"寒涼":100.0,"溫熱":0.0,"平":0.0},"hd":[{"n":"梔子","w":1.4,"f":["苦"],"t":"寒","bt":"支子　味苦寒。主治五內邪氣，胃中熱氣，面赤酒皰皶鼻，白癩赤癩瘡瘍。一名木丹。生川谷。"},{"n":"香豉","w":2.0,"f":["苦"],"t":"寒","bt":"【按】食物加工品，本草經未收錄。苦寒。"}],"cl":[{"num":76,"t":"發汗後，水藥不得入口為逆。若更發汗，必吐下不止。發汗吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹，梔子豉湯主之。若少氣者，梔子甘草豉湯主之；若嘔者，梔子生薑豉湯主之。","d":[{"v":"桂","t":"發汗後，水藥不得入口為逆。若更發汗，必吐下不止。"},{"v":"桂","t":"發汗後及吐下後，虛煩不得眠，若劇者，必反復顛倒，心中懊憹。梔子乾薑湯主之。若少氣者，梔子甘草豉湯主之。若嘔者，梔子生薑豉湯主之。"},{"v":"康","t":"發汗後，水藥不得入口（為逆），若更發汗，必吐下不止，發汗吐下後，虛煩不得眠，若劇者，必反覆顛倒，心中懊憹，梔子豉湯主之，若少氣者梔子甘草豉湯主之，若嘔者梔子生薑豉湯主之"}]},{"num":77,"t":"發汗，若下之，而煩熱，胸中窒者，梔子豉湯主之。"},{"num":78,"t":"傷寒五六日，大下之後，身熱不去，心中結痛者，未欲解也，梔子豉湯主之。","d":[{"v":"桂","t":"傷寒五六日，大下之後，身熱不去、心中結痛者，未欲解也，梔子豉湯主之。（方見上）"}]},{"num":221,"t":"陽明病，脈浮而緊，咽燥，口苦，腹滿而喘，發熱汗出，不惡寒反惡熱，身重。若發汗則躁，心憒憒，反譫語。若加溫針，必怵惕，煩躁不得眠。若下之，則胃中空虛，客氣動膈，心中懊憹。舌上胎者，梔子豉湯主之。"},{"num":375,"t":"下利後，更煩，按之心下濡者，為虛煩也，宜梔子豉湯。"},{"num":393,"t":"大病差後，勞復者，枳實梔子豉湯主之。","d":[{"v":"桂","t":"大病差後，勞複者，枳實梔子豉湯主之；若有宿食者
